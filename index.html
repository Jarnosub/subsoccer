<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Subsoccer Pro - The Hub</title>
    
    <!-- Open Graph / Social Media Cover Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://subsoccer-sandbox.netlify.app/">
    <meta property="og:title" content="Subsoccer Pro - The Hub">
    <meta property="og:description" content="Create your player profile, climb the global leaderboards, and join Subsoccer tournaments.">
    <meta property="og:image" content="https://subsoccer-sandbox.netlify.app/Subsoccer_tournament_2.jpg">
    <meta name="twitter:card" content="summary_large_image">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="the-forge.css?v=2">
    <!-- Leaflet Kartta CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Supabase tietokanta -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: var(--sub-black);
            font-family: var(--sub-name-font);
        }

        /* 1. KANNEKUVA / HERO BACKGROUND */
        .hero-background {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('Subsoccer_tournament_2.jpg');
            background-size: cover;
            background-position: center top;
            z-index: 0;
            filter: brightness(0.65) contrast(1.1); /* Hienokseltaan kirkkaampi nyt kun hahmoja ei ole blokkaamassa valmentajia */
        }

        /* GRADIENTTI ALHAALTA YLÖS, JOTTA NAPIT EROTTUVAT TÄYDELLISESTI */
        .hero-vignette {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, transparent 20%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.75) 100%);
            z-index: 1;
        }

        /* 3. LOGO YLHÄÄLLÄ KESKELLÄ */
        .top-header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            /* Lasketaan logoa tuomalla lisää ylä-paddingia */
            padding: calc(20px + env(safe-area-inset-top, 20px)) 20px 20px;
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            justify-content: space-between; /* Laitettu tilaa korteille */
            align-items: center;
        }

        .main-logo {
            height: 55px; /* Kasvatettu selvästi alkuperäisestä 35px tasosta */
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8));
        }

        /* 4. ALAREUNAN MASSIIVINEN NAVIGAATIO "HUB" */
        .hub-menu {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            /* Pudotettu valikko aivan alas, jotta taustakuvassa olevat pelaajat näkyvät paremmin */
            padding: 20px 20px calc(30px + env(safe-area-inset-bottom, 20px));
            box-sizing: border-box;
            z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; gap: 16px;
        }

        /* TOIMINTO 1: PÖYDÄN LUONA */
        .btn-play-now {
            width: 100%; max-width: 400px;
            background: linear-gradient(135deg, var(--sub-red), #900000);
            color: #fff;
            border: none;
            padding: 25px;
            border-radius: 16px;
            font-family: 'Subsoccer', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 40px rgba(227, 6, 19, 0.4), inset 0 0 15px rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-play-now:active { transform: scale(0.97); }
        .btn-play-subtext {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-top: 5px;
            color: rgba(255,255,255,0.8);
        }

        /* TOIMINTO 2: ETSIMÄSSÄ PÖYTÄÄ */
        .btn-find-table {
            width: 100%; max-width: 400px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: var(--sub-gold);
            padding: 16px;
            border-radius: 12px;
            font-family: 'Resolve', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
        }
        .btn-find-table:active { transform: scale(0.97); }
        .btn-find-table:hover { background: rgba(30, 30, 30, 0.95); }

        /* TOIMINTO 3: KAUPPA */
        .shop-link {
            font-family: 'Resolve', sans-serif;
            color: #888;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: underline;
            text-decoration-color: #444;
            text-underline-offset: 4px;
            cursor: pointer;
            margin-top: 5px;
            display: flex; align-items: center; gap: 6px;
        }
        .shop-link:hover { color: #fff; text-decoration-color: var(--sub-gold); }

    /* Leaflet overrides */
    .leaflet-popup-tip { background: #111; border-top: 1px solid #D4AF37; border-left: 1px solid #D4AF37; }
    .leaflet-top { top: 70px !important; }
    .leaflet-left { left: 10px !important; }

    </style>
</head>
<body>

    <!-- TAUSTA -->
    <div class="hero-background"></div>
    <div class="hero-vignette"></div>

    <!-- Ei enää erillisiä kelluvia PNG kuvia -->

    <!-- YLÄPALKKI / LOGO JA PELAAJAKORTTI -->
    <div class="top-header">
        
        <!-- LOGIN-nappi (vierailijat) -->
        <div id="hub-login-btn" style="display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.8); padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer;" onclick="window.location.href='login.html?source=go&redirect=index.html#login'">
            <i class="fa-solid fa-right-to-bracket" style="color: #D4AF37; font-size: 0.8rem;"></i>
            <span style="color: #fff; font-family: 'Resolve', sans-serif; font-size: 0.65rem; letter-spacing: 1px;">LOG IN</span>
        </div>

        <!-- Pelaajakortti (kirjautuneet) - piilotettu oletuksena -->
        <div id="hub-player-card" class="player-mini-card" style="display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.8); padding: 5px 12px 5px 5px; border-radius: 20px; border: 1px solid rgba(255,215,0,0.3); backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer;" onclick="window.location.href='player-card.html'">
            <div style="width: 32px; height: 32px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; color: var(--sub-gold); border: 1px solid var(--sub-gold);">
                <i class="fa-solid fa-user" style="font-size: 0.8rem;"></i>
            </div>
            <div style="display: flex; flex-direction: column;">
                <span id="hub-player-name" style="color: #fff; font-family: 'Subsoccer', sans-serif; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: -2px;">PLAYER</span>
                <span id="hub-player-elo" style="color: var(--sub-gold); font-family: 'Resolve', sans-serif; font-size: 0.55rem; letter-spacing: 1px;"><i class="fa-solid fa-bolt"></i> PRO 1500</span>
            </div>
        </div>

        <!-- Keskitetty Logo ja BETA Teksti -->
        <div style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 10;">
            <img src="subsoccer_logo.svg" class="main-logo" alt="Subsoccer" style="margin-bottom: 2px;">
            <span style="color: #D4AF37; font-family: 'Resolve', sans-serif; font-size: 0.55rem; font-weight: 800; letter-spacing: 2px;">V1.0.0 BETA</span>
        </div>
        
        <!-- Tyhjä div pitämään logo keskellä space-between asettelulla -->
        <!-- Logout-nappi (kirjautuneet) / tyhjä spacer (vieraat) -->
        <div id="hub-logout-btn" style="display: none; width: 100px; text-align: right;">
            <button onclick="hubLogout()" style="background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 0.75rem; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
        <div id="hub-spacer" style="width: 100px;"></div>
    </div>

    <!-- PÄÄVALIKKO / TARINAN VALINTA -->
    <div class="hub-menu">
        
        <!-- YKKÖSVALINTA: LUO TURNAUS (itsenäinen mobiiliturnaus) -->
        <button class="btn-play-now" onclick="window.location.href='mobile-game.html'">
            <i class="fa-solid fa-trophy" style="font-size: 1.4rem; margin-bottom: 5px;"></i>
            CREATE TOURNAMENT
            <span class="btn-play-subtext">PLAY WITH FRIENDS AT A TABLE</span>
        </button>

        <!-- KAKKOSVALINTA: OLEN PÖYDÄN LUONA / LIITY -->
        <button class="btn-find-table" onclick="window.location.href='scan-code.html'">
            <i class="fa-solid fa-qrcode"></i> SCAN CODE / JOIN GAME
        </button>

        <!-- KOLMOSVALINTA: ETSIN PÖYTÄÄ -->
        <button class="btn-find-table" style="background: rgba(10, 10, 10, 0.7);" onclick="openMapOverlay()">
            <i class="fa-solid fa-map-location-dot"></i> FIND A TABLE NEAR YOU
        </button>

        <!-- NELOSVALINTA: KAUPPA -->
        <div class="shop-link" onclick="window.open('https://subsoccer.com', '_blank')">
            <i class="fa-solid fa-cart-shopping"></i> BUY YOUR OWN SUBSOCCER
        </div>

    </div>

    <!-- KARTTANÄKYMÄ (Piilotettu oletuksena) -->
    <div id="map-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; background: #0a0a0a;">
        <div id="public-game-map" style="width: 100%; height: 100%;"></div>
        
        <!-- BACK-NAPPI -->
        <button onclick="closeMapOverlay()" style="position: absolute; top: calc(20px + env(safe-area-inset-top, 20px)); left: 20px; z-index: 2100; background: rgba(0,0,0,0.8); border: 1px solid var(--sub-gold); color: var(--sub-gold); border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <i class="fa-solid fa-arrow-left" style="font-size: 1.2rem;"></i>
        </button>
    </div>

    <script>
        // ============================================================
        // AUTH STATE: LOG IN vs. PLAYER CARD
        // ============================================================
        (async function checkAuth() {
            try {
                const SUPA_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
                const SUPA_KEY = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';
                const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
                const { data: { session } } = await sb.auth.getSession();
                
                if (session && session.user) {
                    // Fetch player profile from DB
                    const { data: player } = await sb.from('players').select('username, elo').eq('id', session.user.id).single();
                    
                    if (player) {
                        showPlayerCard(player.username, player.elo);
                        return;
                    }
                }

                // Fallback: check localStorage (set by index.html's auth.js on login)
                const cached = localStorage.getItem('subsoccer-user');
                if (cached) {
                    try {
                        const user = JSON.parse(cached);
                        if (user && user.username) {
                            showPlayerCard(user.username, user.elo);
                            return;
                        }
                    } catch(e) {}
                }
            } catch(e) {
                console.log('Auth check:', e.message);
                // Still try localStorage fallback
                const cached = localStorage.getItem('subsoccer-user');
                if (cached) {
                    try {
                        const user = JSON.parse(cached);
                        if (user && user.username) {
                            showPlayerCard(user.username, user.elo);
                        }
                    } catch(e2) {}
                }
            }
        })();

        function showPlayerCard(name, elo) {
            document.getElementById('hub-player-name').innerText = name || 'PLAYER';
            document.getElementById('hub-player-elo').innerHTML = '<i class="fa-solid fa-bolt"></i> ' + (elo || 1500);
            document.getElementById('hub-login-btn').style.display = 'none';
            document.getElementById('hub-player-card').style.display = 'flex';
            document.getElementById('hub-logout-btn').style.display = 'block';
            document.getElementById('hub-spacer').style.display = 'none';
        }

        async function hubLogout() {
            if (!confirm('Log out?')) return;
            try {
                const sb = supabase.createClient('https://ujxmmrsmdwrgcwatdhvx.supabase.co', 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t');
                await sb.auth.signOut();
            } catch(e) {}
            localStorage.removeItem('subsoccer-user');
            location.reload();
        }

        let hubMap = null;

        function openMapOverlay() {
            document.getElementById('map-overlay').style.display = 'block';
            
            if (hubMap) {
                setTimeout(() => hubMap.invalidateSize(), 100);
                return;
            }

            // Init Leaflet map
            hubMap = L.map('public-game-map').setView([60.1699, 24.9384], 5);
            hubMap.attributionControl.setPrefix(false);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(hubMap);

            // Gold icon for tables
            const goldIcon = L.divIcon({
                className: '',
                html: '<div style="background:#D4AF37; width:14px; height:14px; border-radius:50%; border:2px solid #000; box-shadow:0 0 10px rgba(212,175,55,0.6);"></div>',
                iconSize: [14, 14],
                iconAnchor: [7, 7]
            });

            // Fetch tables from Supabase
            const SUPABASE_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
            const SUPABASE_ANON = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';

            fetch(`${SUPABASE_URL}/rest/v1/games?select=id,game_name,latitude,longitude,location,is_public&is_public=eq.true&latitude=not.is.null`, {
                headers: {
                    'apikey': SUPABASE_ANON,
                    'Authorization': `Bearer ${SUPABASE_ANON}`
                }
            })
            .then(r => r.json())
            .then(tables => {
                if (!tables || !Array.isArray(tables)) return;
                
                tables.forEach(t => {
                    if (!t.latitude || !t.longitude) return;
                    const marker = L.marker([t.latitude, t.longitude], { icon: goldIcon }).addTo(hubMap);
                    marker.bindPopup(`
                        <div style="font-family: sans-serif; color: #fff; background: #111; padding: 12px; border-radius: 8px; border: 1px solid #D4AF37; min-width: 160px;">
                            <div style="font-weight: 700; font-size: 0.9rem; margin-bottom: 4px;">${t.game_name || 'Subsoccer Table'}</div>
                            <div style="color: #888; font-size: 0.75rem;">${t.location || ''}</div>
                            <div style="color: #D4AF37; font-size: 0.7rem; margin-top: 6px; text-transform: uppercase;">TABLE</div>
                        </div>
                    `, { className: 'dark-popup' });
                });
            })
            .catch(e => console.error('Map data error:', e));

            // Try to show user location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const userIcon = L.divIcon({
                        className: '',
                        html: '<div style="background:#3b82f6; width:12px; height:12px; border-radius:50%; border:3px solid rgba(59,130,246,0.3); box-shadow:0 0 15px rgba(59,130,246,0.5);"></div>',
                        iconSize: [12, 12],
                        iconAnchor: [6, 6]
                    });
                    L.marker([pos.coords.latitude, pos.coords.longitude], { icon: userIcon }).addTo(hubMap)
                        .bindPopup('<div style="font-family:sans-serif; color:#fff; background:#111; padding:8px; border-radius:6px;">📍 You are here</div>', { className: 'dark-popup' });
                }, () => {}, { timeout: 5000 });
            }

            setTimeout(() => hubMap.invalidateSize(), 200);
        }

        function closeMapOverlay() {
            document.getElementById('map-overlay').style.display = 'none';
        }
    </script>

    <style>
        /* Leaflet popup dark theme */
        .dark-popup .leaflet-popup-content-wrapper {
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
        }
        .dark-popup .leaflet-popup-tip {
            background: #111 !important;
        }
        .dark-popup .leaflet-popup-content {
            margin: 0 !important;
        }
    </style>
</body>
</html>
