    <script>
        // ============================================================
        // AUTH STATE: LOG IN vs. PLAYER CARD
        // ============================================================
        // ============================================================
        // AUTH STATE: LOG IN vs. PLAYER CARD
        // ============================================================
        async function initAuth() {
            try {
                // 1. Fallback: check localStorage immediately for instantaneous UI update before network
                const cached = localStorage.getItem('subsoccer-user');
                if (cached) {
                    try {
                        const user = JSON.parse(cached);
                        if (user && user.username) {
                            showPlayerCard(user);
                        }
                    } catch (e) { }
                }

                // 2. Setup Supabase listener for authoritative state and sync
                const SUPA_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
                const SUPA_KEY = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';
                const sb = window.supabase ? supabase.createClient(SUPA_URL, SUPA_KEY) : null;

                let hasCachedUser = false;
                if (cached) {
                    try {
                        const user = JSON.parse(cached);
                        if (user && user.username) hasCachedUser = true;
                    } catch (e) { }
                }

                if (sb) {
                    // Check explicitly and await it on load (solves async bfcache bugs)
                    const { data: { session } } = await sb.auth.getSession();
                    if (session && session.user) {
                        const { data: player } = await sb.from('players').select('username, elo, is_admin').eq('id', session.user.id).single();
                        if (player) {
                            showPlayerCard(player);
                            localStorage.setItem('subsoccer-user', JSON.stringify(player));
                        } else if (!hasCachedUser) {
                            document.getElementById('hub-login-btn').style.display = 'flex';
                        }
                    } else if (!hasCachedUser) {
                        document.getElementById('hub-login-btn').style.display = 'flex';
                    }

                    // Background listener for future sign out / parallel sign in
                    sb.auth.onAuthStateChange(async (event, currentSession) => {
                        if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && currentSession && currentSession.user) {
                            const { data: p } = await sb.from('players').select('username, elo, is_admin').eq('id', currentSession.user.id).single();
                            if (p) {
                                showPlayerCard(p);
                                localStorage.setItem('subsoccer-user', JSON.stringify(p));
                            } else {
                                document.getElementById('hub-login-btn').style.display = 'flex';
                            }
                        } else if (event === 'SIGNED_OUT') {
                            localStorage.removeItem('subsoccer-user');
                            document.getElementById('hub-login-btn').style.display = 'flex';
                            document.getElementById('hub-player-card').style.display = 'none';
                            document.getElementById('menu-profile-link').style.display = 'none';
                            document.getElementById('menu-league-link').style.display = 'none';
                            document.getElementById('menu-logout-link').style.display = 'none';
                            document.getElementById('menu-owner-link').style.display = 'none';
                            document.getElementById('menu-mod-link').style.display = 'none';
                        }
                    });
                } else if (!hasCachedUser) {
                    document.getElementById('hub-login-btn').style.display = 'flex';
                }
            } catch (e) {
                console.log('Auth check error:', e);
                const cached = localStorage.getItem('subsoccer-user');
                if (!cached) document.getElementById('hub-login-btn').style.display = 'flex';
            }
        }

        initAuth(); // Run immediately on load

        // Handle Safari/Mobile BFCache restores
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                initAuth();
            }
        });

        function showPlayerCard(player) {
            // Updated UI doesn't have names, just shows the check icon
            document.getElementById('hub-login-btn').style.display = 'none';
            document.getElementById('hub-player-card').style.display = 'flex';

            // Menu toggles
            document.getElementById('menu-profile-link').style.display = 'flex';
            document.getElementById('menu-logout-link').style.display = 'flex';

            // My Collection is visible to every registered user
            document.getElementById('menu-owner-link').style.display = 'flex';

            // Pro Leagues - grayed out for standard users (only admins can click)
            const leagueLink = document.getElementById('menu-league-link');
            leagueLink.style.display = 'flex';
            if (player.is_admin || player.is_owner) {
                leagueLink.style.opacity = '1';
                leagueLink.onclick = null;
            } else {
                leagueLink.style.opacity = '0.3';
                leagueLink.onclick = (e) => {
                    e.preventDefault();
                    alert("Pro Leagues is currently in closed beta. Only verified organizers can host tournaments.");
                };
            }

            if (player.is_admin) {
                document.getElementById('menu-mod-link').style.display = 'flex';
            }
        }

        async function hubLogout() {
            if (!confirm('Log out?')) return;
            try {
                const sb = supabase.createClient('https://ujxmmrsmdwrgcwatdhvx.supabase.co', 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t');
                await sb.auth.signOut();
            } catch (e) { }
            localStorage.removeItem('subsoccer-user');
            location.reload();
        }

        let hubMap = null;

        function openMapOverlay() {
            document.getElementById('map-overlay').style.display = 'block';

            if (hubMap) {
                setTimeout(() => hubMap.invalidateSize(), 100);
                return;
            }

            // Init Leaflet map
            hubMap = L.map('public-game-map').setView([60.1699, 24.9384], 5);
            hubMap.attributionControl.setPrefix(false);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(hubMap);

            // Red icon for tables
            const redIcon = L.divIcon({
                className: '',
                html: '<div style="background:#c41e2a; width:14px; height:14px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 10px rgba(196,30,42,0.4);"></div>',
                iconSize: [14, 14],
                iconAnchor: [7, 7]
            });

            // Fetch tables from Supabase
            const SUPABASE_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
            const SUPABASE_ANON = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';

            fetch(`${SUPABASE_URL}/rest/v1/games?select=id,game_name,latitude,longitude,location,is_public&is_public=eq.true&latitude=not.is.null`, {
                headers: {
                    'apikey': SUPABASE_ANON,
                    'Authorization': `Bearer ${SUPABASE_ANON}`
                }
            })
                .then(r => r.json())
                .then(tables => {
                    if (!tables || !Array.isArray(tables)) return;

                    tables.forEach(t => {
                        if (!t.latitude || !t.longitude) return;
                        const marker = L.marker([t.latitude, t.longitude], { icon: redIcon }).addTo(hubMap);
                        marker.bindPopup(`
                        <div style="font-family: sans-serif; color: #111; background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #e0e0e0; min-width: 160px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                            <div style="font-weight: 700; font-size: 0.9rem; margin-bottom: 4px;">${t.game_name || 'Subsoccer Table'}</div>
                            <div style="color: #666; font-size: 0.75rem;">${t.location || ''}</div>
                            <div style="color: #c41e2a; font-size: 0.7rem; margin-top: 6px; text-transform: uppercase; font-weight: bold;">TABLE</div>
                        </div>
                    `, { className: 'light-popup' });
                    });
                })
                .catch(e => console.error('Map data error:', e));

            // Try to show user location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const userIcon = L.divIcon({
                        className: '',
                        html: '<div style="background:#3b82f6; width:12px; height:12px; border-radius:50%; border:3px solid rgba(59,130,246,0.3); box-shadow:0 0 15px rgba(59,130,246,0.5);"></div>',
                        iconSize: [12, 12],
                        iconAnchor: [6, 6]
                    });
                    L.marker([pos.coords.latitude, pos.coords.longitude], { icon: userIcon }).addTo(hubMap)
                        .bindPopup('<div style="font-family:sans-serif; color:#fff; background:#111; padding:8px; border-radius:6px;">📍 You are here</div>', { className: 'dark-popup' });
                }, () => { }, { timeout: 5000 });
            }

            setTimeout(() => hubMap.invalidateSize(), 200);
        }

        function closeMapOverlay() {
            document.getElementById('map-overlay').style.display = 'none';
        }
    </script>

    <style>
        /* Leaflet popup dark theme */
        .dark-popup .leaflet-popup-content-wrapper {
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
        }

        .dark-popup .leaflet-popup-tip {
            background: #111 !important;
        }

        .dark-popup .leaflet-popup-content {
            margin: 0 !important;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const SUPABASE_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
            const SUPABASE_ANON = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';
            
            fetch(`${SUPABASE_URL}/rest/v1/public_tracking?select=location&location=not.is.null&order=client_time.desc&limit=25`, {
                headers: {
                    'apikey': SUPABASE_ANON,
                    'Authorization': `Bearer ${SUPABASE_ANON}`
                }
            })
            .then(r => r.json())
            .then(data => {
                if (data && data.length > 0) {
                    const cities = [...new Set(data.map(ev => {
                        if (!ev.location) return null;
                        const parts = ev.location.split('/');
                        let city = parts.length > 1 ? parts[parts.length - 1] : ev.location;
                        // Timezone locations often have underscores, e.g., Los_Angeles
                        return city.replace(/_/g, ' ').toUpperCase();
                    }).filter(Boolean))];
                    
                    if (cities.length > 0) {
                        const tc = document.getElementById('ticker-cities');
                        if (tc) {
                            tc.innerHTML = `&nbsp;·&nbsp; RECENT GLOBAL ACTIVITY FEED: <span style="color:#ffffff;">${cities.join(' &nbsp;·&nbsp; ')}</span>`;
                            // Force animation reset so iOS Safari recalculates the -100% width correctly
                            const tickerNode = document.getElementById('top-ticker');
                            if (tickerNode) {
                                tickerNode.style.animation = 'none';
                                tickerNode.offsetHeight; // trigger reflow
                                tickerNode.style.animation = '';
                            }
                        }
                    }
                }
            })
            .catch(e => console.error('Ticker data error:', e));
        });
    </script>
</body>

</html>
