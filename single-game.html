<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Subsoccer - Single Player Arcade</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Russo+One&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Subsoccer';
            src: url('fonts/subsoccer-bold.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --sub-red: #E30613;
            --sub-black: #0A0A0A;
            --sub-gold: #FFD700;
            --sub-neon: #00FFCC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--sub-black);
            color: #fff;
            font-family: 'Russo One', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Arcade UI */
        .arcade-container {
            text-align: center;
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            height: 40px;
            margin-bottom: 20px;
        }

        .header-title {
            color: var(--sub-red);
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(227, 6, 19, 0.5);
        }

        /* Displays */
        .display-panel {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .stat-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 4rem;
            line-height: 1;
            text-shadow: 0 0 15px currentColor;
        }

        #timer-value {
            color: var(--sub-gold);
        }

        #score-value {
            color: #fff;
        }

        /* Combo indicator */
        .combo-container {
            height: 60px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .combo-text {
            font-size: 2rem;
            color: var(--sub-neon);
            text-shadow: 0 0 20px var(--sub-neon);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .combo-text.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Start Button */
        .start-btn {
            background: linear-gradient(135deg, var(--sub-red) 0%, #a00 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 2rem;
            font-family: 'Subsoccer', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(227, 6, 19, 0.5);
            transition: transform 0.1s;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        /* End Screen Overlay */
        #end-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .final-score-label {
            color: var(--sub-gold);
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .final-score-value {
            font-size: 6rem;
            color: #fff;
            margin-bottom: 40px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* Mic indicator */
        #mic-status {
            position: absolute;
            bottom: 20px;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.8rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mic-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #444;
        }

        .mic-dot.active {
            background: var(--sub-red);
            box-shadow: 0 0 10px var(--sub-red);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes hitFlash {
            0% {
                background-color: rgba(255, 255, 255, 0.2);
            }

            100% {
                background-color: transparent;
            }
        }

        .hit-flash {
            animation: hitFlash 0.3s ease-out;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> LOBBY</a>
    </div>

    <!-- Camera Status -->
    <div id="camera-status"
        style="position: absolute; bottom: 20px; left: 20px; font-family: 'Open Sans', sans-serif; font-size: 0.8rem; color: #666; display: flex; align-items: center; gap: 10px; z-index: 100;">
        <div id="cam-indicator" class="mic-dot"></div>
        <span id="cam-text">Camera standby</span>
    </div>

    <div class="arcade-container">
        <img src="subsoccer_logo.svg" alt="Subsoccer" class="logo">
        <div class="header-title">SINGLE PLAYER CHALLENGE</div>

        <div class="display-panel" id="main-panel">
            <div class="stat-box">
                <div class="stat-label">TIME LEFT</div>
                <div class="stat-value" id="timer-value">45</div>
            </div>
            <div class="stat-box" style="border-left: 2px solid #333;">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score-value">0</div>
            </div>
        </div>

        <div class="combo-container">
            <div id="combo-display" class="combo-text">2X COMBO!</div>
        </div>

        <button id="btn-start" class="start-btn">START</button>
    </div>

    <!-- Game Over Screen -->
    <div id="end-overlay">
        <div class="final-score-label">TIME IS UP!</div>
        <div class="final-score-label" style="font-size: 1rem; color:#888;">FINAL SCORE</div>
        <div class="final-score-value" id="final-score">0</div>

        <div style="display:flex; gap:20px;">
            <button id="btn-restart" class="start-btn"
                style="font-size:1.2rem; padding: 15px 40px; background: #333;">TRY AGAIN</button>
            <button onclick="window.location.href='index.html'" class="start-btn"
                style="font-size:1.2rem; padding: 15px 40px;">EXIT</button>
        </div>
    </div>

    <!-- Game dependencies -->
    <script src="vision-engine.js"></script>
    <script src="single-game.js"></script>

</body>

</html>
