<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- PWA / Fullscreen App Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <title>Subsoccer - Single Player Arcade</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Russo+One&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Subsoccer';
            src: url('fonts/subsoccer-bold.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --sub-red: #E30613;
            --sub-black: #0A0A0A;
            --sub-gold: #FFD700;
            --sub-neon: #00FFCC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--sub-black);
            color: #fff;
            font-family: 'Russo One', sans-serif;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Arcade UI */
        .arcade-container {
            text-align: center;
            position: relative;
            margin: auto;
            padding: 60px 20px 20px 20px;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            pointer-events: none;
            /* Allows clicks to pass through if needed, though buttons need pointer-events */
        }

        .arcade-container>* {
            pointer-events: auto;
            /* Enable clicks on internal elements */
        }

        .logo {
            height: 40px;
            margin-bottom: 20px;
        }

        .header-title {
            color: var(--sub-red);
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(227, 6, 19, 0.5);
        }

        /* Displays (HUD Style) */
        .display-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        .stat-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 4rem;
            line-height: 1;
            text-shadow: 0 0 15px currentColor;
        }

        #timer-value {
            color: var(--sub-gold);
        }

        #score-value {
            color: #fff;
        }

        /* Combo indicator */
        .combo-container {
            height: 60px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .combo-text {
            font-size: 2rem;
            color: var(--sub-neon);
            text-shadow: 0 0 20px var(--sub-neon);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .combo-text.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Start Button */
        .start-btn {
            background: linear-gradient(135deg, var(--sub-red) 0%, #a00 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'SubsoccerLogo', sans-serif;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(227, 6, 19, 0.4);
            transition: transform 0.1s;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        #victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 17, 21, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 200;
            padding: 20px;
            overflow-y: auto;
        }

        .winner-content-box {
            text-align: center;
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: max(env(safe-area-inset-top), 10px) 10px 10px 10px;
            margin: auto;
        }

        .w-title {
            font-family: 'SubsoccerLogo', sans-serif;
            font-size: 4rem;
            color: var(--sub-gold);
            text-transform: uppercase;
            margin-bottom: 5px;
            opacity: 0;
            animation: victorySlideUp 0.8s ease-out 0.1s forwards;
            text-align: center;
            line-height: 1.1;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .w-elo {
            font-family: 'SubsoccerLogo', sans-serif;
            color: var(--sub-neon);
            font-size: 2.5rem;
            margin-bottom: 20px;
            opacity: 0;
            animation: victorySlideUp 0.8s ease-out 0.3s forwards;
        }

        .w-card {
            background: linear-gradient(135deg, #111, #222);
            border: 1px dashed var(--sub-gold);
            border-radius: 10px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
            opacity: 0;
            animation: victorySlideUp 0.8s ease-out 0.6s forwards;
        }

        .w-card-title {
            font-family: 'SubsoccerLogo', sans-serif;
            color: var(--sub-gold);
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .w-card-desc {
            color: #aaa;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 0;
            font-family: 'Open Sans', sans-serif;
        }

        .w-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 320px;
            opacity: 0;
            animation: victorySlideUp 0.8s ease-out 1s forwards;
        }

        .w-actions button {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-family: 'SubsoccerLogo', sans-serif;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .w-actions button:active {
            transform: scale(0.95);
        }

        @keyframes victoryPop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes victorySlideUp {
            0% {
                transform: translateY(30px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes shimmer {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* Mic indicator */
        #mic-status {
            position: absolute;
            bottom: 20px;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.8rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mic-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #444;
        }

        .mic-dot.active {
            background: var(--sub-red);
            box-shadow: 0 0 10px var(--sub-red);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes hitFlash {
            0% {
                background-color: rgba(255, 255, 255, 0.2);
            }

            100% {
                background-color: transparent;
            }
        }

        .hit-flash {
            animation: hitFlash 0.3s ease-out;
        }

        /* Specific overrides for HUD */
        .hud-side-box {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .hud-left {
            left: max(15px, env(safe-area-inset-left));
        }

        .hud-right {
            right: max(15px, env(safe-area-inset-right));
        }

        @media (max-width: 800px) {
            .hud-side-box {
                padding: 10px 15px !important;
            }

            .hud-side-box .stat-value {
                font-size: 2.5rem !important;
            }

            #main-panel .stat-box {
                padding: 10px 20px !important;
            }

            #main-panel .stat-value {
                font-size: 2.5rem !important;
            }
        }

        /* Landscape / Small screen adjustments */
        @media (max-height: 500px) {
            .arcade-container {
                padding: 60px 10px 20px 10px;
                transform: scale(0.85);
            }

            .logo {
                height: 20px;
                margin-bottom: 5px;
            }

            .header-title {
                font-size: 1.1rem;
                margin-bottom: 10px;
            }

            .display-panel {
                margin-bottom: 10px;
                gap: 10px;
            }

            .stat-box {
                padding: 5px 30px;
            }

            .stat-value {
                font-size: 2.2rem;
            }

            .combo-container {
                height: 40px;
                margin-bottom: 10px;
            }

            .combo-text {
                font-size: 1.5rem;
            }

            .top-bar {
                top: 10px;
                left: 10px;
                right: 10px;
            }

            #camera-status {
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> LOBBY</a>
    </div>

    <!-- Camera Status -->
    <div id="camera-status"
        style="position: absolute; bottom: 20px; left: 20px; font-family: 'Open Sans', sans-serif; font-size: 0.8rem; color: #666; display: flex; align-items: center; gap: 10px; z-index: 100;">
        <div id="cam-indicator" class="mic-dot"></div>
        <span id="cam-text">Camera standby</span>
    </div>

    <!-- HUD Pinned Score Boxes -->
    <div class="stat-box hud-side-box hud-left"
        style="padding: 15px 20px; border-color: var(--sub-neon); background: rgba(0,0,0,0.8);">
        <div class="stat-label">SCORE</div>
        <div class="stat-value" id="score-value">0</div>
    </div>

    <div class="arcade-container">
        <img src="subsoccer_logo.svg" alt="Subsoccer" class="logo">
        <div class="header-title">SINGLE PLAYER<br>CHALLENGE</div>

        <div class="display-panel" id="main-panel"
            style="flex-direction: column; justify-content: center; align-items: center;">
            <div class="stat-box" style="padding: 10px 40px; background: rgba(0,0,0,0.8);">
                <div class="stat-label" style="color: var(--sub-gold);">TIME LEFT</div>
                <div class="stat-value" id="timer-value" style="font-size: 3.5rem; color: var(--sub-gold);">45</div>
            </div>
        </div>

        <div class="combo-container">
            <div id="combo-display" class="combo-text">2X COMBO!</div>
        </div>

        <button id="btn-start" class="start-btn">START</button>
    </div>

    <!-- Victory Screen (replaces end-overlay) -->
    <div id="victory-overlay">
        <!-- Lasers Canvas (Renders behind UI) -->
        <canvas id="lasers-canvas"
            style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; display:none;"></canvas>

        <div class="winner-content-box">
            <div class="w-title" id="victory-player-name">TIME IS UP!</div>

            <!-- We can use this to show final score or ELO gain in Single Player -->
            <div id="victory-elo-gain" class="w-elo">+0 POINTS</div>

            <!-- Gamified "Locked Card" Graphic -->
            <div id="winner-card-container" class="w-card">
                <!-- Glint effect -->
                <div id="winner-card-glint"
                    style="position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:linear-gradient(45deg, transparent 40%, rgba(255,215,0,0.2) 50%, transparent 60%); animation: shimmer 3s infinite;">
                </div>

                <div
                    style="font-size: 0.9rem; color: #888; margin-bottom: 5px; font-family: 'Open Sans', sans-serif; letter-spacing: 2px;">
                    FINAL SCORE</div>
                <h3 id="victory-elo-count" class="w-card-title"
                    style="font-size: 3.5rem; font-family: 'SubsoccerLogo', sans-serif; text-shadow: 0 0 20px rgba(255,215,0,0.3); margin-top: 5px; margin-bottom: 10px;">
                    0</h3>
                <p id="winner-card-desc" class="w-card-desc">Your arcade challenge score has been recorded.</p>
            </div>

            <div class="w-actions">
                <button id="btn-victory-new-game" onclick="window.location.reload();"
                    style="background: linear-gradient(135deg, var(--sub-red) 0%, #a00 100%); color: #fff; box-shadow: 0 5px 20px rgba(227, 6, 19, 0.4); border: none;">
                    TRY AGAIN
                </button>
                <button id="btn-victory-end-game" onclick="window.location.href='index.html'"
                    style="background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff;">
                    EXIT TO LOBBY
                </button>
            </div>
        </div>
    </div>

    <!-- Game dependencies -->
    <script src="sound-effects.js"></script>
    <script src="vision-engine.js"></script>
    <script src="single-game.js"></script>

</body>

</html>
