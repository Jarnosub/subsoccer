<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subsoccer Tracking Analytics</title>
    <!-- Include Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jockey+One&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #111; color: #fff; padding: 20px; font-family: 'Open Sans', sans-serif; }
        h1 { font-family: 'Jockey One', sans-serif; color: var(--sub-gold); text-align: center; font-size: 3rem; margin-bottom: 20px;}
        .dashboard-container { max-width: 1000px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px;}
        .stat-card { background: #222; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #333;}
        .stat-value { font-size: 2.5rem; font-family: 'Jockey One', sans-serif; color: #E30613; margin: 10px 0;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem;}
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        th { background: #1a1500; color: var(--sub-gold); font-family: 'Jockey One', sans-serif; font-size: 1.2rem;}
        tr:hover { background: #222; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; background: #333;}
        .badge.finished { background: #E30613; color: #fff;}
        .badge.opened { background: #4CAF50; color: #fff;}
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>SOCIAL TRACKING DASHBOARD</h1>
        <p style="text-align:center; color:#888;">Live feed of anonymous QR scans and games played around the world.</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div>Total App Opens</div>
                <div class="stat-value" id="total-opens">...</div>
            </div>
            <div class="stat-card">
                <div>Games Finished</div>
                <div class="stat-value" id="total-finished">...</div>
            </div>
            <div class="stat-card">
                <div>Most Active Code</div>
                <div class="stat-value" id="top-code">...</div>
            </div>
        </div>

        <div style="display:flex; justify-content: space-between; align-items: center; margin-top:40px;">
            <h2 style="font-family: 'Jockey One', sans-serif; margin: 0;">RECENT ACTIVITY LOG</h2>
            <button onclick="fetchData()" class="primary-btn" style="padding: 5px 15px; font-size:0.9rem;">Refresh</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Event</th>
                    <th>Code / Table ID</th>
                    <th>Player</th>
                    <th>Lang</th>
                    <th>Location</th>
                    <th>Length</th>
                    <th>Score</th>
                    <th>Device</th>
                </tr>
            </thead>
            <tbody id="log-body">
                <tr><td colspan="10" style="text-align:center; padding: 30px;">Loading data from Supabase...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { _supabase } from './config.js';

        window.fetchData = async function() {
            if (!_supabase) {
                alert("Database connection not initialized.");
                return;
            }

            try {
                // Fetch the latest 500 events
                let { data: events, error } = await _supabase
                    .from('public_tracking')
                    .select('*')
                    .order('client_time', { ascending: false })
                    .limit(500);

                if (error) throw error;

                if (!events || events.length === 0) {
                    document.getElementById('log-body').innerHTML = '<tr><td colspan="10" style="text-align:center;">No tracking data found yet. Scan a code to test!</td></tr>';
                    return;
                }

                // Calculate stats
                let opens = 0;
                let finished = 0;
                let codeCounts = {};

                let html = '';
                events.forEach(ev => {
                    if (ev.event_type === 'app_opened') opens++;
                    if (ev.event_type === 'game_finished') finished++;

                    const code = ev.game_code || 'Unknown';
                    codeCounts[code] = (codeCounts[code] || 0) + 1;

                    let badgeClass = ev.event_type === 'game_finished' ? 'finished' : 'opened';
                    let typeLabel = ev.event_type === 'game_finished' ? 'GAME FINISHED' : 'APP OPENED';
                    let returningBadge = ev.is_returning ? '<span style="color:#00FFCC; font-weight:bold;">PRO RE-SCAN</span>' : '<span style="color:#888;">NEW USER</span>';
                    let durationText = ev.session_duration ? Math.floor(ev.session_duration / 60) + 'm ' + (ev.session_duration % 60) + 's' : '-';

                    html += `
                        <tr>
                            <td style="color:#888;">${dateStr}</td>
                            <td><span class="badge ${badgeClass}">${typeLabel}</span></td>
                            <td style="font-weight:bold; color:var(--sub-gold);">${code}</td>
                            <td>${returningBadge}</td>
                            <td><span style="font-size:0.8rem; background:#333; padding:2px 5px; border-radius:3px;">${ev.browser_lang || '-'}</span></td>
                            <td style="color:#00FFCC;">${ev.location || 'Unknown'}</td>
                            <td style="color:#FFD700; font-family:'Jockey One', sans-serif;">${durationText}</td>
                            <td>${ev.match_score || '-'}</td>
                            <td style="font-size:0.7rem; color:#666; max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${ev.user_agent}">${ev.user_agent}</td>
                        </tr>
                    `;
                });

                document.getElementById('log-body').innerHTML = html;
                document.getElementById('total-opens').textContent = opens;
                document.getElementById('total-finished').textContent = finished;

                // Find top code
                let topCode = 'N/A';
                let maxCount = 0;
                for (const [code, count] of Object.entries(codeCounts)) {
                    if (count > maxCount) {
                        maxCount = count;
                        topCode = code;
                    }
                }
                document.getElementById('top-code').textContent = topCode;

            } catch (err) {
                console.error(err);
                document.getElementById('log-body').innerHTML = `<tr><td colspan="10" style="color:red; text-align:center;">Error loading data: ${err.message}. Ensure the SQL table is created.</td></tr>`;
            }
        }

        // Auto load
        fetchData();
    </script>
</body>
</html>
