<!DOCTYPE html>
<html lang="en" class="bg-[#050505]">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Subsoccer Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="the-forge.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="remote-mode bg-[#050505] min-h-screen text-white m-0 flex justify-center items-center overflow-hidden">
    <div class="phone-container w-full max-w-[400px] flex flex-col justify-center items-center text-center p-6 mt-16">
        
        <div id="loading" class="flex flex-col items-center">
            <i class="fas fa-spinner fa-spin text-5xl mb-6 text-[#c41e2a]"></i>
            <h2 class="font-bold text-2xl" id="status-title">CHECKING VOUCHER...</h2>
        </div>

        <div id="success" style="display: none;" class="flex flex-col items-center animate-[kenBurns_3s_ease-out]">
            <img src="subsoccer_logo.svg" alt="Subsoccer" class="h-8 mb-12">
            <div class="w-32 h-32 bg-gradient-to-tr from-[#a0161f] to-[#c41e2a] rounded-full flex justify-center items-center shadow-[0_0_50px_rgba(196,30,42,0.4)] mb-8">
                <i class="fas fa-ticket-alt text-black text-6xl shadow-inner"></i>
            </div>
            
            <h1 class="text-3xl font-bold mb-3 tracking-widest text-shadow-sm uppercase" style="font-family: 'Subsoccer', sans-serif;">FREE GAME CLAIMED!</h1>
            <div class="bg-[#111] border border-[#333] rounded-lg p-4 mb-6 shadow-xl w-full">
                <p class="text-gray-400 text-sm mb-2">Saved to your digital wallet</p>
                <div class="font-mono text-[#c41e2a] font-bold text-xl tracking-[4px]" id="claimed-code"></div>
            </div>
            
            <p class="text-gray-300 text-sm leading-relaxed mb-8 px-4">
                You can now put your phone away.<br><br>
                When you are ready to play, walk up to <b>any Subsoccer Arcade</b> machine and scan the QR code on the big screen!
            </p>
            
            <div class="animate-bounce">
                <i class="fas fa-arrow-down text-[#c41e2a] text-2xl"></i>
            </div>
        </div>

        <div id="error" style="display: none;" class="flex flex-col items-center">
            <i class="fas fa-exclamation-triangle text-red-500 text-6xl mb-6 shadow-[0_0_50px_rgba(227,6,19,0.3)] rounded-full"></i>
            <h1 class="text-2xl font-bold mb-2">VOUCHER INVALID</h1>
            <p class="text-gray-400 text-sm mb-6" id="error-desc">This code could not be found or has already been used.</p>
        </div>
        
    </div>

    <script type="module">
        import { _supabase } from './config.js';

        // Read voucher from URL
        const urlParams = new URLSearchParams(window.location.search);
        const promoCode = (urlParams.get('promo') || '').trim().toUpperCase();

        async function verifyAndSave() {
            if (!promoCode) {
                showError("No promo code provided in URL.");
                return;
            }

            // Free2Play version: No master code bypass needed.
            // Voucher verification proceeds through DB only.

            try {
                // Verify with DB
                const { data: voucher, error } = await _supabase
                    .from('gift_cards')
                    .select('*')
                    .eq('code', promoCode)
                    .single();

                if (error || !voucher) {
                    showError("This gift card does not exist.");
                    return;
                }

                if (voucher.is_redeemed) {
                    showError("This gift card has already been used!");
                    return;
                }

                saveSuccess(promoCode);

            } catch (err) {
                console.error("Verification error", err);
                showError("Network error while checking voucher.");
            }
        }

        function saveSuccess(code) {
            try {
                localStorage.setItem('subsoccer_saved_promo', code);
            } catch(e) {
                showError("Your browser's privacy settings blocked saving the card. Please open in normal Safari window.");
                return;
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'flex';
            document.getElementById('claimed-code').innerText = code;
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'flex';
            document.getElementById('error-desc').innerText = msg;
        }

        setTimeout(verifyAndSave, 800);
    </script>
</body>
</html>
