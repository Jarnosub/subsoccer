<!DOCTYPE html>
<html lang="en" class="bg-[#050505]">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subsoccer Remote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="the-forge.css">
</head>

<body class="remote-mode bg-[#050505] min-h-screen text-white m-0 flex justify-center overflow-x-hidden">

    <div class="phone-container w-full max-w-[400px] bg-[#0a0a0a] flex flex-col mx-auto relative" style="height: 100dvh; max-height: 100dvh; overflow: hidden;">
        <div class="header">
            <img src="subsoccer_logo.svg" alt="Subsoccer" onerror="this.style.display='none'">
        </div>

        <!-- SCREEN SETUP -->
        <div class="screen" id="s-tourny-setup">
            <h2 id="setup-title" class="text-2xl font-bold mb-2 text-center mt-4 text-white"
                style="font-family: 'Subsoccer', sans-serif;">TOURNAMENT</h2>
            <p id="setup-subtitle" class="text-gray-400 text-center text-sm mb-4">Add players to calculate price.</p>

            <div id="tourny-players-list" class="space-y-3 mb-4 relative overflow-y-auto pr-2" style="flex: 1; min-height: 0;">
                <div class="flex items-center bg-[#111] p-2 rounded-lg border border-[#333] player-row relative">
                    <span class="player-num text-gray-500 font-bold px-2 w-8">#1</span>
                    <input type="text" onfocus="this.select()" oninput="broadcastRoster()" value="PLAYER 1"
                        autocomplete="off"
                        class="player-input text-white w-full p-2 font-bold bg-transparent focus:outline-none placeholder-gray-600">
                    <button onclick="removePlayer(this)" class="text-red-500 px-3 py-1"><i
                            class="fas fa-times"></i></button>
                </div>
                <div class="flex items-center bg-[#111] p-2 rounded-lg border border-[#333] player-row relative">
                    <span class="player-num text-gray-500 font-bold px-2 w-8">#2</span>
                    <input type="text" onfocus="this.select()" oninput="broadcastRoster()" value="PLAYER 2"
                        autocomplete="off"
                        class="player-input text-white w-full p-2 font-bold bg-transparent focus:outline-none placeholder-gray-600">
                    <button onclick="removePlayer(this)" class="text-red-500 px-3 py-1"><i
                            class="fas fa-times"></i></button>
                </div>
            </div>

            <!-- Pinned Bottom Buttons -->
            <div class="mt-auto pt-2">
                <button id="btn-add-player" onclick="addPlayerInput()"
                    class="w-full bg-[#111] text-gray-400 font-bold py-3 rounded-lg border border-[#333] mb-4 active:bg-[#1a1a1a]">
                    + ADD PLAYER
                </button>

                <!-- Dynamic Payment Button -->
                <button id="btn-use-ticket" style="display: none;"
                    class="w-full bg-gradient-to-r from-[#D4AF37] to-[#B8860B] text-black font-bold py-4 rounded-xl flex justify-between items-center px-6 hover:opacity-90 transition-all shadow-[0_0_20px_rgba(212,175,55,0.4)] mb-3"
                    onclick="window.useFreeTicket()">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-ticket-alt text-xl"></i>
                        <span class="tracking-widest uppercase text-sm">Play using Ticket</span>
                    </div>
                    <span id="ticket-badge" class="font-bold text-xs bg-black text-[#D4AF37] px-2 py-1 rounded" style="font-family: 'Subsoccer', sans-serif;"></span>
                </button>

                <button id="btn-checkout"
                    class="w-full bg-white text-black font-bold py-4 rounded-xl flex justify-between items-center px-6 hover:bg-gray-200 transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)]"
                    onclick="startDynamicCheckout()">
                    <div class="flex items-center gap-2">
                        <i class="fab fa-apple text-xl"></i>
                        <span class="tracking-widest uppercase text-sm">Pay & Start</span>
                    </div>
                    <span id="dynamic-price" class="font-bold text-2xl tracking-wider"
                        style="font-family: 'Subsoccer', sans-serif;">2.00 €</span>
                </button>
                <div class="text-center text-[10px] text-gray-600 mt-3 font-mono flex justify-center items-center gap-1 uppercase tracking-wider mb-2">
                    <i class="fas fa-lock text-[8px]"></i> Powered by Stripe
                </div>

                <div class="text-center mt-2">
                    <button onclick="const c=prompt('Enter Promo or Voucher Code:'); if(c) window.useFreeTicketCode(c);" class="text-sm text-gray-400 underline decoration-gray-600 hover:text-white transition-colors tracking-wide" style="font-family: 'Resolve', sans-serif;">
                        Have a Promo Code?
                    </button>
                </div>

                <div style="text-align: center; margin-top: 10px;">
                    <button onclick="forceTVReload()" class="text-[10px] text-[#222] bg-transparent rounded mt-4">Force
                        Refresh TV</button>
                </div>
            </div>
        </div>

        <!-- SCREEN TOURNAMENT HUB -->
        <div class="screen" id="s-tourny-hub">
            <h2 class="text-2xl font-bold mb-2 text-center mt-4 text-white">MATCH SETUP
            </h2>
            <p class="text-gray-400 text-center text-sm mb-6">Check the TV to view the bracket tree.</p>

            <div class="bg-[#111] border border-[#222] p-6 rounded-xl mb-6 text-center">
                <p class="text-sm font-bold text-gray-500" id="tourny-round-name">SEMIFINAL 1</p>
                <p class="text-2xl font-bold mt-2 text-white" id="tourny-matchup">PLAYER 1<br><span
                        class="text-xs text-red-500">VS</span><br>PLAYER 2</p>
            </div>

            <button class="primary-btn mt-auto" style="background:#E30613;" id="btn-start-tourny-match"
                onclick="startTournyMatch()">START MATCH</button>
        </div>

        <!-- SCREEN ONBOARDING -->
        <div class="screen" id="s-onboarding" style="overflow-y: auto;">
            <h2 class="text-3xl font-bold mb-4 text-center mt-6 text-white" style="font-family: 'Subsoccer', sans-serif;">HOW TO PLAY</h2>
            
            <div class="bg-[#111] border border-[#333] p-6 rounded-xl mb-6 text-center space-y-6">
                <div>
                    <i class="fas fa-users text-4xl mb-3 text-white"></i>
                    <p class="text-white font-bold text-lg">1. SELECT PLAYERS & PAY</p>
                </div>
                
                <div class="h-px bg-[#333] w-full"></div>
                
                <div>
                    <i class="fas fa-eye text-4xl mb-3 text-blue-500"></i>
                    <p class="text-white font-bold text-lg">2. TABLE TURNS TRANSPARENT</p>
                </div>
                
                <div class="h-px bg-[#333] w-full"></div>
                
                <div>
                    <i class="fas fa-stopwatch text-4xl mb-3 text-red-500"></i>
                    <p class="text-white font-bold text-lg">3. MOST GOALS IN 90s WINS</p>
                </div>
            </div>

            <button class="primary-btn mt-auto" style="background:#E30613;" onclick="startOnboardingSequence()">CONTINUE</button>
        </div>

        <!-- SCREEN 3: CONTROLLER -->
        <div class="screen" id="s-controller">
            <div class="flex justify-between items-center mb-4 px-2">
                <div class="text-sm text-gray-500 font-bold">1VS1 MATCH</div>
                <div class="text-red-500 font-bold" id="remote-timer"><i class="fas fa-clock mr-1"></i> 15:00</div>
            </div>

            <div class="goal-btn p1 relative overflow-hidden" onclick="sendGoal(1)">
                <div class="absolute inset-0 flex items-center justify-center text-[150px] sm:text-[180px] font-bold opacity-[0.15] pointer-events-none" id="lbl-score-p1" style="font-family: sans-serif;">0</div>
                <div class="z-10 tracking-[4px]">GOAL</div>
                <div class="player-label z-10" id="lbl-p1">JARNO</div>
            </div>

            <div class="goal-btn p2 relative overflow-hidden" onclick="sendGoal(2)">
                <div class="absolute inset-0 flex items-center justify-center text-[150px] sm:text-[180px] font-bold opacity-[0.15] pointer-events-none" id="lbl-score-p2" style="font-family: sans-serif;">0</div>
                <div class="z-10 tracking-[4px]">GOAL</div>
                <div class="player-label z-10" id="lbl-p2">MATTI</div>
            </div>

            <!-- SKIP/WALKOVER BUTTONS -->
            <div class="flex justify-between mt-2 gap-2" style="height: 40px;">
                <button onclick="skipMatch(2)"
                    class="flex-1 bg-transparent border border-[#333] text-gray-500 rounded-lg text-[10px] font-bold uppercase tracking-wide hover:bg-[#111]">
                    WALKOUT: P2 WINS
                </button>
                <button onclick="skipMatch(1)"
                    class="flex-1 bg-transparent border border-[#333] text-gray-500 rounded-lg text-[10px] font-bold uppercase tracking-wide hover:bg-[#111]">
                    WALKOUT: P1 WINS
                </button>
            </div>
        </div>

    </div>

    <script type="module" src="lounge-logic.js?v=5"></script>
</body>

</html>
