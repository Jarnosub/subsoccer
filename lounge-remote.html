<!DOCTYPE html>
<html lang="en" class="bg-[#050505]">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subsoccer Remote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="the-forge.css">
</head>

<body class="remote-mode bg-[#050505] min-h-screen text-white m-0 flex justify-center overflow-x-hidden">
    <!-- ERROR DISPLAY LAYER -->
    <div id="debug-error" style="display:none; position:fixed; z-index:9999; top:10px; left:10px; background:red; color:white; padding:10px; font-size:12px; pointer-events:none;"></div>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            const el = document.getElementById('debug-error');
            if(el) { el.style.display = 'block'; el.innerText = "JS Error: " + msg + " at " + line + ":" + col; }
        };
        window.addEventListener('unhandledrejection', function(event) {
            const el = document.getElementById('debug-error');
            if(el) { el.style.display = 'block'; el.innerText = "Async Error: " + (event.reason ? event.reason.message : "Promise rejected"); }
        });
    </script>
    <div class="phone-container w-full max-w-[400px] bg-[#0a0a0a] flex flex-col mx-auto relative" style="height: 100dvh; max-height: 100dvh; overflow: hidden;">
        <div class="header">
            <img src="subsoccer_logo.svg" alt="Subsoccer" onerror="this.style.display='none'">
        </div>

        <!-- SCREEN SETUP -->
        <div class="screen flex-col h-full w-full overflow-y-auto pb-12" id="s-tourny-setup">
            <h2 id="setup-title" class="text-2xl font-bold mb-2 text-center mt-4 text-white"
                style="font-family: 'Subsoccer', sans-serif;">TOURNAMENT</h2>
            <p id="setup-subtitle" class="text-gray-400 text-center text-sm mb-4">Add players to calculate price.</p>

            <div class="w-full mb-4">
                <div id="tourny-players-list" class="space-y-3 relative pr-2 pb-1">
                    <div class="flex items-center bg-[#111] p-2 rounded-lg border border-[#333] player-row relative">
                        <span class="player-num text-gray-500 font-bold px-2 w-8">#1</span>
                        <input type="text" onfocus="this.select()" oninput="broadcastRoster()" value="PLAYER 1" autocomplete="off" class="player-input text-white w-full p-2 text-lg uppercase font-bold bg-transparent focus:outline-none placeholder-gray-600">
                        <button onclick="removePlayer(this)" class="text-red-500 px-3 py-1"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="flex items-center bg-[#111] p-2 rounded-lg border border-[#333] player-row relative">
                        <span class="player-num text-gray-500 font-bold px-2 w-8">#2</span>
                        <input type="text" onfocus="this.select()" oninput="broadcastRoster()" value="PLAYER 2" autocomplete="off" class="player-input text-white w-full p-2 text-lg uppercase font-bold bg-transparent focus:outline-none placeholder-gray-600">
                        <button onclick="removePlayer(this)" class="text-red-500 px-3 py-1"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <button id="btn-add-player" onclick="addPlayerInput()"
                    class="w-full bg-[#111] text-gray-400 font-bold py-3 rounded-lg border border-[#333] mt-2 shrink-0 active:bg-[#1a1a1a]">
                    + ADD PLAYER
                </button>
            </div>

            <!-- Bottom Buttons -->
            <div class="mt-4">
                <button id="btn-start-free"
                    class="w-full bg-[#E30613] text-white font-bold py-4 mt-6 rounded-lg flex justify-center items-center px-6 hover:opacity-90 transition-all shadow-[0_0_15px_rgba(227,6,19,0.4)] tracking-widest text-lg"
                    onclick="window.startFreeTournament()">
                    <i class="fas fa-play mr-2"></i> START TOURNAMENT
                </button>

                <div style="text-align: center; margin-top: 20px;">
                    <button onclick="forceTVReload()" class="text-[10px] text-[#444] bg-transparent rounded mt-4">
                        Force Refresh TV
                    </button>
                </div>
            </div>
        </div>

        <!-- SCREEN TOURNAMENT HUB -->
        <div class="screen" id="s-tourny-hub">
            <h2 class="text-2xl font-bold mb-2 text-center mt-4 text-white">MATCH SETUP
            </h2>
            <p class="text-gray-400 text-center text-sm mb-6">Check the TV to view the bracket tree.</p>

            <div class="bg-[#111] border border-[#222] p-6 rounded-xl mb-6 text-center">
                <p class="text-sm font-bold text-gray-500" id="tourny-round-name">SEMIFINAL 1</p>
                <p class="text-2xl font-bold mt-2 text-white" id="tourny-matchup">PLAYER 1<br><span
                        class="text-xs text-red-500">VS</span><br>PLAYER 2</p>
            </div>

            <button class="primary-btn mt-auto" style="background:#E30613;" id="btn-start-tourny-match"
                onclick="startTournyMatch()">START MATCH</button>
        </div>

        <!-- SCREEN ONBOARDING -->
        <div class="screen" id="s-onboarding" style="overflow-y: auto;">
            <h2 class="text-2xl font-bold mb-3 text-center mt-3 text-white" style="font-family: 'Subsoccer', sans-serif;">HOW TO PLAY</h2>
            
            <div class="bg-[#111] border border-[#333] p-4 rounded-xl mb-4 text-center space-y-4">
                <div>
                    <i class="fas fa-users text-3xl mb-1 text-white"></i>
                    <p id="onboarding-step-1" class="text-white font-bold text-base">1. SELECT PLAYERS & PAY</p>
                </div>
                
                <div class="h-px bg-[#333] w-full"></div>
                
                <div>
                    <i class="fas fa-eye text-3xl mb-1 text-blue-500"></i>
                    <p class="text-white font-bold text-base">2. TABLE TURNS TRANSPARENT</p>
                </div>
                
                <div class="h-px bg-[#333] w-full"></div>
                
                <div>
                    <i class="fas fa-stopwatch text-3xl mb-1 text-red-500"></i>
                    <p class="text-white font-bold text-base">3. MOST GOALS IN 90s WINS</p>
                </div>
            </div>

            <button class="primary-btn mt-auto" style="background:#E30613;" onclick="startOnboardingSequence()">CONTINUE</button>
        </div>

        <!-- SCREEN 3: CONTROLLER -->
        <div class="screen" id="s-controller">
            <div class="flex justify-between items-center mb-4 px-2">
                <div class="text-sm text-gray-500 font-bold">1VS1 MATCH</div>
                <div class="text-red-500 font-bold" id="remote-timer"><i class="fas fa-clock mr-1"></i> 00:00</div>
            </div>

            <div class="goal-btn p1 relative overflow-hidden" onclick="sendGoal(1)">
                <div class="absolute inset-0 flex items-center justify-center text-[150px] sm:text-[180px] font-bold opacity-[0.15] pointer-events-none" id="lbl-score-p1" style="font-family: sans-serif;">0</div>
                <div class="z-10 tracking-[4px]">GOAL</div>
                <div class="remote-player-label z-10" id="lbl-p1">JARNO</div>
            </div>

            <div class="goal-btn p2 relative overflow-hidden" onclick="sendGoal(2)">
                <div class="absolute inset-0 flex items-center justify-center text-[150px] sm:text-[180px] font-bold opacity-[0.15] pointer-events-none" id="lbl-score-p2" style="font-family: sans-serif;">0</div>
                <div class="z-10 tracking-[4px]">GOAL</div>
                <div class="remote-player-label z-10" id="lbl-p2">MATTI</div>
            </div>

            <!-- SKIP/WALKOVER BUTTONS -->
            <div class="flex justify-between mt-2 gap-2" style="height: 40px;">
                <button onclick="skipMatch(2)"
                    class="flex-1 bg-transparent border border-[#333] text-gray-500 rounded-lg text-[10px] font-bold uppercase tracking-wide hover:bg-[#111]">
                    WALKOUT: P2 WINS
                </button>
                <button onclick="skipMatch(1)"
                    class="flex-1 bg-transparent border border-[#333] text-gray-500 rounded-lg text-[10px] font-bold uppercase tracking-wide hover:bg-[#111]">
                    WALKOUT: P1 WINS
                </button>
            </div>
        </div>

    </div>

    <script type="module" src="lounge-logic.js?v=25"></script>
</body>

</html>
