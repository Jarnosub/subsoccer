<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subsoccer LIVE</title>
    <!-- Use the same Supabase client and styles -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #fff;
            font-family: 'Subsoccer', 'Russo One', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Ambient animated background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(227, 6, 19, 0.15) 0%, rgba(20, 15, 0, 0.2) 30%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 40%);
            animation: pulseBg 15s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes pulseBg {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.1) translate(-2%, 2%);
            }
        }

        #waiting-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            animation: fadeIn 2s ease-out;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 215, 0, 0.1);
            border-top-color: var(--sub-gold);
            border-right-color: var(--sub-red);
            border-radius: 50%;
            animation: spin 1.2s infinite cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #scoreboard {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .brand-logo {
            width: 20vw;
            min-width: 150px;
            max-width: 280px;
            margin-bottom: 2vh;
            opacity: 0.9;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.1));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .score-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4vw;
            width: 70%;
        }

        .player-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 35vw;
        }

        .player-name {
            font-size: 2vw;
            font-family: 'Resolve', sans-serif;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 15px;
            text-align: center;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .score-box {
            font-size: 11vw;
            line-height: 1;
            /* Premium Glassmorphism */
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2vw 4vw;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-top: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8),
                inset 0 0 40px rgba(0, 0, 0, 0.5),
                inset 0 2px 20px rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        /* Subtle pulse on score change */
        .score-update {
            transform: scale(1.1);
            border-color: var(--sub-gold) !important;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.4), inset 0 0 20px rgba(255, 215, 0, 0.2) !important;
            color: var(--sub-gold) !important;
        }

        .divider {
            font-size: 6vw;
            color: var(--sub-red);
            font-weight: 900;
            text-shadow: 0 0 20px rgba(227, 6, 19, 0.5);
            margin-top: 3vw;
        }

        /* Broadcast Indicator */
        .live-indicator {
            margin-top: 4vh;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Resolve', sans-serif;
            letter-spacing: 3px;
            font-size: 1rem;
            color: #fff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .live-dot {
            width: 12px;
            height: 12px;
            background: var(--sub-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--sub-red);
            animation: pulse-dot 1.5s infinite alternate;
        }

        @keyframes pulse-dot {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.2);
                opacity: 1;
                box-shadow: 0 0 20px var(--sub-red);
            }
        }

        /* Portrait mobile specific layout fixes */
        @media (orientation: portrait) {
            .brand-logo {
                top: 20px;
                width: 220px;
            }

            .score-container {
                flex-direction: column;
                gap: 2vw;
                margin-top: 60px;
            }

            .player-side {
                width: 60vw;
                margin-bottom: 20px;
            }

            .divider {
                display: none;
            }

            /* Hide dash on vertical layout */
            .player-name {
                font-size: 7vw;
                margin-bottom: 10px;
            }

            .score-box {
                font-size: 25vw;
                padding: 20px 8vw;
            }

            .live-indicator {
                bottom: 20px;
                padding: 8px 20px;
                font-size: 0.8rem;
            }

            #vip-box {
                width: 30vw !important;
                height: 40vw !important;
                min-width: 120px !important;
                min-height: 160px !important;
                top: 10px !important;
                right: 10px !important;
                border-radius: 10px !important;
            }
        }

        /* SPLIT LAYOUT MODE (For VIP Hosts) */
        body.layout-split {
            flex-direction: row;
            justify-content: flex-start;
        }

        body.layout-split #scoreboard {
            width: 50vw;
            height: 100vh;
        }

        body.layout-split .brand-logo {
            top: 30px;
            width: 200px;
        }

        body.layout-split .score-container {
            flex-direction: column;
            gap: 20px;
            margin-top: 80px;
        }

        body.layout-split .player-side {
            width: 40vw;
        }

        body.layout-split .divider {
            display: none;
        }

        body.layout-split .score-box {
            font-size: 15vw;
            padding: 20px 4vw;
        }

        body.layout-split #vip-box {
            position: relative;
            top: 0 !important;
            right: 0 !important;
            width: 50vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            border: none;
            border-left: 2px solid var(--sub-gold);
            box-shadow: -10px 0 50px rgba(0, 0, 0, 0.8);
            margin: 0;
            cursor: pointer;
        }

        #vip-box {
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #vip-box:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.3);
        }

        /* Goal Explosion Animation */
        #goal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.15) 0%, rgba(0, 0, 0, 0.9) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #goal-overlay.active {
            opacity: 1;
            animation: flash 3s ease-out forwards;
        }

        .goal-text {
            font-size: 18vw;
            color: transparent;
            -webkit-text-stroke: 4px var(--sub-gold);
            text-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            transform: scale(0.2) translateY(50px);
            opacity: 0;
            font-style: italic;
        }

        .goal-scorer {
            font-family: 'Resolve', sans-serif;
            font-size: 3vw;
            color: #fff;
            margin-top: -2vw;
            letter-spacing: 12px;
            opacity: 0;
            transform: translateY(30px);
            background: var(--sub-gold);
            color: #000;
            padding: 10px 40px;
            border-radius: 50px;
            font-weight: 900;
        }

        #goal-overlay.active .goal-text {
            animation: smashText 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #goal-overlay.active .goal-scorer {
            animation: slideUpFade 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
        }

        @keyframes smashText {
            0% {
                transform: scale(0.2) translateY(50px);
                opacity: 0;
            }

            10% {
                transform: scale(1.1) translateY(0);
                opacity: 1;
                -webkit-text-stroke: 0px;
                color: var(--sub-gold);
                text-shadow: 0 0 100px rgba(255, 215, 0, 1);
            }

            15% {
                transform: scale(1) translateY(0);
                color: #fff;
                -webkit-text-stroke: 4px var(--sub-gold);
            }

            80% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }

            100% {
                transform: scale(1.05) translateY(-20px);
                opacity: 0;
            }
        }

        @keyframes slideUpFade {
            0% {
                transform: translateY(30px);
                opacity: 0;
            }

            10% {
                transform: translateY(0);
                opacity: 1;
                box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
            }

            80% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-20px);
                opacity: 0;
            }
        }

        @keyframes flash {
            0% {
                background: radial-gradient(circle at center, rgba(255, 215, 0, 0.3) 0%, rgba(227, 6, 19, 0.2) 50%, rgba(0, 0, 0, 0.9) 100%);
            }

            10% {
                background: radial-gradient(circle at center, rgba(255, 215, 0, 0.1) 0%, rgba(0, 0, 0, 0.8) 100%);
            }

            100% {
                background: rgba(0, 0, 0, 0);
            }
        }
    </style>
</head>

<body>

    <!-- Waiting Screen -->
    <div id="waiting-screen">
        <img src="logo.png" style="width: 200px; margin-bottom: 20px;">
        <div class="spinner"></div>
        <h2 style="font-family:'Resolve'; color:#888; letter-spacing:3px;">CONNECTING TO ARENA...</h2>
        <div id="room-id-display" style="color:var(--sub-gold); font-size:1.5rem; margin-top:10px;"></div>
    </div>

    <!-- Background Arena Video (Table Camera feed) -->
    <video id="arena-video" playsinline autoplay muted
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-2;"></video>
    <div id="arena-overlay"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:-1; pointer-events:none;">
    </div>

    <!-- Main Scoreboard -->
    <div id="scoreboard">
        <img src="logo.png" class="brand-logo">

        <div class="score-container">
            <div class="player-side">
                <div class="player-name" id="p1-name">PLAYER 1</div>
                <div class="score-box" id="p1-score">0</div>
            </div>

            <div class="divider">-</div>

            <div class="player-side">
                <div class="player-name" id="p2-name">PLAYER 2</div>
                <div class="score-box" id="p2-score">0</div>
            </div>
        </div>

        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>LIVE BROADCAST</span>
        </div>
    </div>

    <!-- Goal Explosion -->
    <div id="goal-overlay">
        <div class="goal-text">GOAL!</div>
        <div class="goal-scorer" id="goal-scorer-name">PLAYER SCORES!</div>
    </div>

    <!-- VIP Caster PIP Box -->
    <div id="vip-box" title="Click to toggle Fullscreen Host mode"
        onclick="document.body.classList.toggle('layout-split')"
        style="display:none; position:fixed; right:2vw; top:2vw; width:15vw; height:20vw; min-width:140px; min-height:190px; border-radius:20px; overflow:hidden; border:2px solid rgba(255,215,0,0.6); box-shadow:0 20px 50px rgba(0,0,0,0.9), 0 0 30px rgba(255,215,0,0.2); z-index:200; background:#000; backdrop-filter:blur(10px);">
        <div
            style="position:absolute; top:12px; left:12px; background:var(--sub-red); color:#fff; padding:6px 12px; border-radius:6px; font-size:0.8rem; font-family:'Russo One'; z-index:10; letter-spacing:2px; box-shadow:0 4px 15px rgba(227,6,19,0.5); display:flex; align-items:center; gap:8px;">
            <div
                style="width:8px; height:8px; background:#fff; border-radius:50%; animation:pulse-dot 1s infinite alternate;">
            </div>
            VIP CASTER
        </div>
        <!-- Subtle inner glow to embed the video nicely -->
        <div
            style="position:absolute; inset:0; box-shadow:inset 0 0 20px rgba(0,0,0,0.8); z-index:5; pointer-events:none;">
        </div>
        <video id="vip-video" autoplay playsinline
            style="width:100%; height:100%; object-fit:cover; filter: contrast(1.1) saturate(1.1); pointer-events:none;"></video>
    </div>

    <!-- We need config.js for the Supabase keys -->
    <script type="module" src="tv-app.js"></script>
</body>

</html>
