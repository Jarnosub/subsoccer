<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Subsoccer - Pro Leagues</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="the-forge.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background-color: var(--sub-black);
            color: #fff;
            font-family: 'Resolve', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: calc(15px + env(safe-area-inset-top, 15px)) 20px 15px;
            background: rgba(10,10,10,0.95);
            border-bottom: 1px solid #222;
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            background: none; border: none; color: #fff;
            font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        .page-title {
            font-family: 'Subsoccer', sans-serif;
            font-size: 1.2rem; letter-spacing: 2px;
            color: var(--sub-gold); text-align: center;
            margin: 0;
            text-transform: uppercase;
        }

        .league-container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #888;
        }

        .empty-state i {
            font-size: 4rem;
            color: #333;
            margin-bottom: 20px;
        }

        .panel {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn-gold {
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            color: #000;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-family: 'Resolve', sans-serif;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-gold:active { transform: scale(0.98); }

        .btn-outline {
            background: transparent;
            color: #fff;
            border: 1px solid #444;
            padding: 15px 20px;
            border-radius: 8px;
            font-family: 'Resolve', sans-serif;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h1 class="page-title"><i class="fa-solid fa-crown" style="margin-right: 5px;"></i> PRO LEAGUES</h1>
        <div style="width: 24px;"></div> <!-- Spacer -->
    </div>

    <div class="league-container" id="main-content">
        <!-- Auth check placeholder -->
        <div style="text-align: center; color: #666; margin-top: 50px;" id="loading-txt">Loading Pro Leagues...</div>
    </div>

    <!-- MAIN LEAGUE MODULE TEMPLATE -->
    <template id="tpl-league-dashboard">
        <div class="panel" style="text-align: center;">
            <h2 style="font-family: 'Subsoccer', sans-serif; letter-spacing: 2px; color: #fff; margin-top: 0;">CREATE A LEAGUE</h2>
            <p style="color: #bbb; font-size: 0.9rem; line-height: 1.5; margin-bottom: 25px;">
                Organize massive events using the Group Stage to Playoffs framework. 
                Divide players into 8-player groups automatically, and cross-pair their winners in the grand finals.
            </p>
            <button class="btn-gold" onclick="createNewLeague()">
                <i class="fa-solid fa-plus"></i> NEW PRO LEAGUE
            </button>
        </div>

        <div id="active-leagues-list">
            <div class="empty-state" style="margin-top: 40px;">
                <i class="fa-solid fa-trophy" style="color: #1a1a1a;"></i>
                <h3>No Active Leagues</h3>
                <p style="font-size: 0.85rem;">Leagues you create will appear here.</p>
            </div>
        </div>
    </template>

    <script src="league-engine.js"></script>
    <script>
        const SUPA_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
        const SUPA_KEY = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';
        const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
        let currentUser = null;

        async function initPage() {
            const cached = localStorage.getItem('subsoccer-user');
            if (!cached) {
                window.location.href = 'login.html?redirect=pro-leagues.html';
                return;
            }
            
            currentUser = JSON.parse(cached);
            if (!currentUser) {
                window.location.href = 'login.html?redirect=pro-leagues.html';
                return;
            }

            loadLeaguesDashboard();
        }

        async function loadLeaguesDashboard() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';
            
            const tpl = document.getElementById('tpl-league-dashboard').content.cloneNode(true);
            container.appendChild(tpl);

            const { data: { session } } = await sb.auth.getSession();
            if (!session) return;

            // Fetch active leagues for this user
            const { data, error } = await sb.from('pro_leagues')
                                            .select('*')
                                            .eq('organizer_id', session.user.id)
                                            .order('created_at', { ascending: false });

            const listContainer = document.getElementById('active-leagues-list');
            if (data && data.length > 0) {
                listContainer.innerHTML = '';
                data.forEach(league => {
                    listContainer.innerHTML += `
                        <div class="panel" style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <h3 style="margin:0; font-family:'Subsoccer', sans-serif;">${league.league_name}</h3>
                                <div style="font-size:0.8rem; color:#888; margin-top:5px;">STATUS: ${league.status.toUpperCase()}</div>
                            </div>
                            <button class="btn-outline" style="width:auto; margin:0;" onclick="openLeagueLobby('${league.id}', '${league.league_name}')">OPEN LOBBY</button>
                        </div>
                    `;
                });
            }
        }

        async function createNewLeague() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                alert("Session expired. Please log in again.");
                return;
            }

            const name = prompt("Enter a name for your new Pro League (e.g. Helsinki Open):");
            if (!name) return;

            // Use the isolated pro_leagues table
            const { data, error } = await sb.from('pro_leagues').insert({
                league_name: name,
                organizer_id: session.user.id,
                status: 'enrolling',
                group_size: 8
            }).select().single();

            if (error) {
                alert("Failed to create league: " + error.message);
                return;
            }

            alert(`League "${name}" created successfully!`);
            loadLeaguesDashboard();
        }

        async function openLeagueLobby(leagueId, leagueName) {
            const container = document.getElementById('main-content');
            
            // First check the state of the league!
            const { data: leagueInfo } = await sb.from('pro_leagues').select('*').eq('id', leagueId).single();
            if (leagueInfo && (leagueInfo.status === 'group_stage' || leagueInfo.status === 'playoffs')) {
                if (leagueInfo.groups_data) {
                    renderLeagueGroups(leagueId, leagueInfo.groups_data);
                    return;
                }
            }
            
            // Cleanup previous listener
            if (window.activeLobbyChannel) {
                sb.removeChannel(window.activeLobbyChannel);
            }
            
            const joinUrl = `https://subsoccer.pro/join-league.html?id=${leagueId}`;
            const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&color=ffffff&bgcolor=0a0a0a&data=${encodeURIComponent(joinUrl)}`;

            container.innerHTML = `
                <div class="panel" style="text-align: center; padding: 40px 20px;">
                    <h2 style="font-family: 'Subsoccer', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: #fff; margin-top: 0; margin-bottom: 25px;">${leagueName}</h2>
                    
                    <p style="color: #bbb; font-size: 0.9rem; margin-bottom: 20px; text-transform: uppercase;">Scan to join this Pro League</p>
                    
                    <img src="${qrSrc}" style="width: 250px; height: 250px; border: 2px solid var(--sub-gold); border-radius: 12px; padding: 10px; background: #0a0a0a; margin-bottom: 20px;">
                    
                    <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                        <div style="font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;">Or Add List / Excel Manually</div>
                        <div style="display: flex; gap: 10px;">
                            <textarea id="manual-player-name" placeholder="Paste names separated by comma, tab, or new line..." style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Resolve', sans-serif; resize: vertical; min-height: 45px;"></textarea>
                            <button class="btn-gold" style="width: auto; padding: 0 20px;" onclick="addManualLeaguePlayer('${leagueId}')">
                                <i class="fa-solid fa-plus"></i> ADD
                            </button>
                        </div>
                    </div>

                    <div style="font-family: 'Subsoccer', sans-serif; font-size: 4rem; color: #fff; margin-bottom: 5px; transition: all 0.2s;" id="lobby-player-count">0</div>
                    <div style="font-size: 0.8rem; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px;">Players Joined</div>
                    
                    <button class="btn-gold" style="padding: 20px;" onclick="generateLeagueGroups('${leagueId}')">
                        <i class="fa-solid fa-layer-group"></i> GENERATE GROUPS
                    </button>
                    <button class="btn-outline" onclick="loadLeaguesDashboard()">
                        <i class="fa-solid fa-arrow-left"></i> BACK TO DASHBOARD
                    </button>
                </div>
            `;

            // Start listening to Supabase for newly joined players using realtime
            window.activeLobbyChannel = sb.channel('league-lobby-' + leagueId)
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'league_participants', 
                    filter: `league_id=eq.${leagueId}` 
                }, payload => {
                    const countEl = document.getElementById('lobby-player-count');
                    if (countEl) {
                        let current = parseInt(countEl.innerText) || 0;
                        countEl.innerText = current + 1;
                        countEl.style.transform = 'scale(1.2)';
                        countEl.style.color = 'var(--sub-gold)';
                        setTimeout(() => {
                            countEl.style.transform = 'scale(1)';
                            countEl.style.color = '#fff';
                        }, 250);
                    }
                })
                .subscribe();

            // Initial fetch to get already joined players count
            const { count } = await sb.from('league_participants')
                                      .select('id', { count: 'exact', head: true })
                                      .eq('league_id', leagueId);
            
            const countEl = document.getElementById('lobby-player-count');
            if (countEl) countEl.innerText = count || 0;
        }

        async function addManualLeaguePlayer(leagueId) {
            const input = document.getElementById('manual-player-name');
            const rawVal = input.value;
            if (!rawVal.trim()) return;

            // Split by comma, semicolon, tab, and newline. Filter empty inputs.
            const names = rawVal.split(/[,\;\t\n]+/).map(n => n.trim()).filter(n => n.length > 0);
            
            if (names.length === 0) return;
            
            input.disabled = true;
            input.placeholder = `Adding ${names.length} players... Please wait...`;

            let successCount = 0;
            for (let name of names) {
                const { error } = await sb.from('league_participants').insert({
                    league_id: leagueId,
                    guest_name: name
                });

                if (!error) {
                    successCount++;
                } else {
                    console.error("Failed to add player: " + name, error);
                }
            }

            input.disabled = false;
            input.placeholder = 'Paste names separated by comma, tab, or new line...';
            input.value = ''; // clear field on success

            // Force an explicit sync of the total count in case realtime missed rapid events
            const { count } = await sb.from('league_participants')
                                      .select('id', { count: 'exact', head: true })
                                      .eq('league_id', leagueId);
            
            const countEl = document.getElementById('lobby-player-count');
            if (countEl) countEl.innerText = count || 0;

            if (successCount > 0) {
                alert(`Successfully added ${successCount} players!`);
            }
        }

        async function generateLeagueGroups(leagueId) {
            const { data, error } = await sb.from('league_participants')
                                        .select('id, guest_name, player_id, players(username)')
                                        .eq('league_id', leagueId);
            
            if (error) {
                alert("Failed to fetch players: " + error.message);
                return;
            }

            if (!data || data.length < 2) {
                alert("Not enough players! Add at least 2 players to draw groups.");
                return;
            }

            // Extract names (mixing manually written guests and app-registered users)
            const playerNames = data.map(row => {
                if (row.guest_name) return row.guest_name;
                if (row.players && row.players.username) return row.players.username;
                return "Unknown Player";
            });

            // Use the League Engine to dynamically shuffle and bracket them
            const maxPerGroup = 8;
            const groups = window.LeagueEngine.assignGroups(playerNames, maxPerGroup);
            
            // Mark the league as officially in the group stage AND save the group structure to the DB
            await sb.from('pro_leagues').update({ 
                status: 'group_stage',
                groups_data: groups 
            }).eq('id', leagueId);

            renderLeagueGroups(leagueId, groups);
        }

        let currentLeagueId = null;
        let activeGroupSessionsListener = null;

        async function renderLeagueGroups(leagueId, groups) {
            const container = document.getElementById('main-content');
            currentLeagueId = leagueId;
            window.currentLeagueGroups = groups;
            
            if (activeGroupSessionsListener) {
                sb.removeChannel(activeGroupSessionsListener);
            }
            if (window.activeLobbyChannel) {
                sb.removeChannel(window.activeLobbyChannel);
            }

            // Fetch table sessions for this league to know which groups are dispatched/finished
            const { data: tableSessions } = await sb.from('pro_table_sessions').select('*').eq('league_id', leagueId);
            const sessionMap = {};
            if (tableSessions) {
                tableSessions.forEach(ts => {
                    sessionMap[ts.group_name] = ts;
                });
            }
            
            let groupsHtml = '';
            groups.forEach((g, idx) => {
                let pList = g.players.map(p => `
                    <div style="padding: 12px; background: rgba(255,255,255,0.03); margin-bottom: 5px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); font-family: 'Resolve', sans-serif;">
                        ${p}
                    </div>`).join('');
                
                const session = sessionMap[g.groupName];
                let controlsHtml = '';

                if (session && session.status === 'completed') {
                    // Lock in the winner to the master participants table
                    saveGroupAdvance(leagueId, session.group_winner);
                    
                    controlsHtml = `
                        <div style="margin-top: 15px; background: rgba(76, 175, 80, 0.1); border: 1px solid #4CAF50; padding: 15px; border-radius: 8px;">
                            <h4 style="color: #4CAF50; margin: 0 0 5px 0;"><i class="fa-solid fa-check-circle"></i> GROUP COMPLETED</h4>
                            <div style="color: #fff;">Winner Advancing: <b style="color: var(--sub-gold);">${session.group_winner}</b></div>
                        </div>
                    `;
                } else if (session) {
                    controlsHtml = `
                        <div style="margin-top: 15px; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 8px;">
                            <div style="color: var(--sub-gold); margin-bottom: 10px;"><i class="fa-solid fa-tablet-screen-button"></i> Playing on Table ${session.table_number}...</div>
                            <button class="btn-outline" style="border-color: #333;" onclick="playGroupBracket(${idx})">
                                <i class="fa-solid fa-eye" style="color: #666; margin-right: 5px;"></i> MONITOR MANUAL BRACKET
                            </button>
                        </div>
                    `;
                } else {
                    controlsHtml = `
                        <button class="btn-outline" style="margin-top: 15px;" onclick="showGroupDispatchModal(${idx})">
                            <i class="fa-solid fa-gamepad" style="color: #fff; margin-right: 5px;"></i> DISPATCH GROUP TO TABLE
                        </button>
                        <button class="btn-outline" style="margin-top: 15px; border-color: #333; margin-left: 10px;" onclick="playGroupBracket(${idx})">
                            <i class="fa-solid fa-eye" style="color: #666; margin-right: 5px;"></i> VIEW BRACKET
                        </button>
                    `;
                }
                    
                groupsHtml += `
                    <div class="panel" style="margin-bottom: 20px;">
                        <h3 style="color: var(--sub-gold); margin-top: 0; font-family: 'Subsoccer', sans-serif; letter-spacing: 2px;">${g.groupName}</h3>
                        ${controlsHtml}
                        <div style="margin-top: 15px;">
                            <div style="font-size: 0.8rem; color: #666; margin-bottom: 10px; text-transform: uppercase;">Players in this Group</div>
                            ${pList}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <button class="back-btn" onclick="loadLeaguesDashboard()">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <h2 style="font-family: 'Subsoccer', sans-serif; letter-spacing: 2px; color: #fff; text-align: center; margin: 0; flex: 1;">GROUP STAGE HUB</h2>
                    <div style="width: 24px;"></div>
                </div>
                
                ${groupsHtml}
                
                <div style="text-align: center; margin-top: 40px; padding-bottom: 50px;">
                    <button class="btn-gold" style="width: 100%; max-width: 400px; padding: 20px;" onclick="generateFinalPlayoffs('${leagueId}')">
                        <i class="fa-solid fa-trophy"></i> GENERATE FINAL PLAYOFFS
                    </button>
                    <div style="font-size: 0.75rem; color: #666; margin-top: 10px;">Requires all group stages to be completed</div>
                </div>
            `;
            
            // Re-mount realtime listener for automatic UI updates
            activeGroupSessionsListener = sb.channel('hub-sessions')
              .on('postgres_changes', { 
                  event: '*', 
                  schema: 'public', 
                  table: 'pro_table_sessions',
                  filter: `league_id=eq.${leagueId}`
              }, payload => {
                  // Only re-render if we are still on the group view
                  if (document.querySelector('h2') && document.querySelector('h2').innerText.includes('GROUP STAGE HUB')) {
                      // Re-render entirely to reflect new statuses cleanly
                      renderLeagueGroups(leagueId, window.currentLeagueGroups);
                  }
              })
              .subscribe();
        }

        async function playGroupBracket(groupIndex) {
            const group = window.currentLeagueGroups[groupIndex];
            const players = group.players; 
            
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <button class="back-btn" onclick="renderLeagueGroups(currentLeagueId, window.currentLeagueGroups)">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <h2 style="font-family: 'Subsoccer', sans-serif; letter-spacing: 2px; color: var(--sub-gold); text-align: center; margin: 0; flex: 1;">${group.groupName} TOURNAMENT</h2>
                    <div style="width: 24px;"></div>
                </div>
                
                <div id="pro-bracket-area" style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 12px; min-height: 400px; border: 1px solid #333; overflow-x: auto;"></div>
            `;

            // Dynamically import the existing BracketEngine
            try {
                const module = await import('./bracket-engine.js');
                const BracketEngine = module.BracketEngine;
                
                window.localEngine = new BracketEngine({
                    containerId: 'pro-bracket-area',
                    enableSaveButton: false, // We'll handle custom saving when the final match is won
                    onMatchUpdate: (match, winner) => {
                        // Check if this is the final match in the bracket
                        const isFinal = !match.nextMatchId;
                        if (isFinal && winner) {
                            setTimeout(() => {
                                const confirmWin = confirm(`🏆 ${winner} has won ${group.groupName}! Save this result and advance them to the Playoffs?`);
                                if (confirmWin) {
                                    saveGroupAdvance(currentLeagueId, winner).then(() => {
                                        alert(winner + " has secured their spot in the Playoffs!");
                                        renderLeagueGroups(currentLeagueId, window.currentLeagueGroups);
                                    });
                                }
                            }, 500);
                        }
                    }
                });
                
                window.localEngine.generateBracket(players, true); // true = shuffle seeds randomly
                window.localEngine.render();
            } catch(e) {
                console.error("Failed to load BracketEngine", e);
                alert("Failed to load Bracket Engine. See console.");
            }
        }

        function showGroupDispatchModal(groupIndex) {
            const group = window.currentLeagueGroups[groupIndex];
            
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px;';
            
            const box = document.createElement('div');
            box.style.cssText = 'background: #111; border: 1px solid var(--sub-gold); padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; text-align: center; font-family: "Resolve", sans-serif;';

            let buttonsHtml = '';
            for (let i = 1; i <= 8; i++) {
                buttonsHtml += `<button onclick="dispatchGroupToTable(${i}, ${groupIndex}, this)" style="background: #222; color: #fff; border: 1px solid #444; padding: 15px; margin: 5px; width: 20%; border-radius: 8px; cursor: pointer; font-size: 1.1rem;">TAB ${i}</button>`;
            }

            box.innerHTML = `
                <h2 style="color: #fff; font-family: 'Subsoccer', sans-serif; letter-spacing: 2px; margin-top: 0;">DISPATCH GROUP</h2>
                <h3 style="color: var(--sub-gold); margin-bottom: 20px;">${group.groupName}</h3>
                <div style="font-size: 0.9rem; color: #888; margin-bottom: 30px;">Select the physical table where this 8-player group will play. The tablet at that table will automatically load their full tournament bracket!</div>
                <div style="display: flex; flex-wrap: wrap; justify-content: center;">
                    ${buttonsHtml}
                </div>
                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #333;">
                    <button onclick="this.closest('div').parentElement.parentElement.remove()" style="background: transparent; color: #888; border: none; cursor: pointer; text-decoration: underline;">CANCEL</button>
                </div>
            `;
            
            overlay.appendChild(box);
            document.body.appendChild(overlay);
        }

        async function dispatchGroupToTable(tableNumber, groupIndex, btn) {
            const group = window.currentLeagueGroups[groupIndex];
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            const { data: existing } = await sb.from('pro_table_sessions')
                .select('id')
                .eq('league_id', currentLeagueId)
                .eq('table_number', tableNumber);
                
            if (existing && existing.length > 0) {
                // Clean up previous assignment for this table MVP
                await sb.from('pro_table_sessions').delete().eq('league_id', currentLeagueId).eq('table_number', tableNumber);
            }

            const { error } = await sb.from('pro_table_sessions').insert({
                league_id: currentLeagueId,
                table_number: tableNumber,
                group_name: group.groupName,
                group_players: group.players,
                status: 'bracket_view'
            });

            if (error) {
                alert("Database error: " + error.message);
                btn.innerHTML = 'TAB ' + tableNumber;
                btn.disabled = false;
                return;
            }

            alert(`${group.groupName} successfully dispatched to TABLE ${tableNumber}!\\n\\nTheir full bracket is now running on that iPad.`);
            btn.closest('div').parentElement.parentElement.remove();
        }

        async function saveGroupAdvance(leagueId, winnerName) {
            // Find the UUID of the participant (could be guest or registered user)
            const { data, error } = await sb.from('league_participants')
                                     .select('id, guest_name, players(username)')
                                     .eq('league_id', leagueId);
            
            if (error) {
                console.error("Failed to fetch participant for saving.", error);
                return;
            }

            let participantId = null;
            for (let row of data) {
                if (row.guest_name === winnerName) participantId = row.id;
                if (row.players && row.players.username === winnerName) participantId = row.id;
            }

            if (participantId) {
                await sb.from('league_participants')
                        .update({ advanced_to_playoffs: true })
                        .eq('id', participantId);
            } else {
                console.warn("Could not match winner string to a participant row", winnerName);
            }
        }

        async function generateFinalPlayoffs(leagueId) {
            // Fetch all players who advanced
            const { data, error } = await sb.from('league_participants')
                                            .select('guest_name, players(username)')
                                            .eq('league_id', leagueId)
                                            .eq('advanced_to_playoffs', true);
            
            if (error) {
                alert("Error fetching playoff data: " + error.message);
                return;
            }

            if (!data || data.length < 2) {
                alert(`Not enough playoff participants yet (only ${data ? data.length : 0} found). Please finish at least 2 Group Stage brackets first!`);
                return;
            }

            const playoffNames = data.map(row => {
                if (row.guest_name) return row.guest_name;
                if (row.players && row.players.username) return row.players.username;
                return "Unknown Player";
            });

            // Mark league status as playoffs
            await sb.from('pro_leagues').update({ status: 'playoffs' }).eq('id', leagueId);

            // Render it!
            playGrandFinalsBracket(playoffNames, leagueId);
        }



        async function playGrandFinalsBracket(players, leagueId) {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <button class="back-btn" onclick="renderLeagueGroups(currentLeagueId, window.currentLeagueGroups)">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <h2 style="font-family: 'Subsoccer', sans-serif; letter-spacing: 2px; color: #ffeb3b; text-align: center; margin: 0; flex: 1;">👑 GRAND FINALS PLAYOFFS 👑</h2>
                    <div style="width: 24px;"></div>
                </div>
                
                <div id="final-bracket-area" style="background: rgba(20,15,0,0.8); padding: 20px; border-radius: 12px; min-height: 400px; border: 1px solid #cca300; overflow-x: auto; box-shadow: 0 0 30px rgba(204, 163, 0, 0.1);"></div>
            `;

            try {
                const module = await import('./bracket-engine.js');
                const BracketEngine = module.BracketEngine;
                
                window.localEngine = new BracketEngine({
                    containerId: 'final-bracket-area',
                    enableSaveButton: false,
                    onMatchUpdate: (match, winner) => {
                        const isFinal = !match.nextMatchId;
                        if (isFinal && winner) {
                            setTimeout(() => {
                                const confirmWin = confirm(`🏆 ${winner} IS THE GRAND CHAMPION! End tournament?`);
                                if (confirmWin) {
                                    finishLeagueTournament(leagueId, winner);
                                }
                            }, 500);
                        }
                    }
                });
                
                
                window.localEngine.generateBracket(players, true);
                window.localEngine.render();
            } catch(e) {
                console.error("Failed to load BracketEngine", e);
            }
        }

        async function finishLeagueTournament(leagueId, championName) {
            await sb.from('pro_leagues').update({ status: 'completed' }).eq('id', leagueId);
            
            // Show massive victory text
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <i class="fa-solid fa-trophy" style="font-size: 6rem; color: #D4AF37; margin-bottom: 30px; filter: drop-shadow(0 0 20px rgba(212,175,55,0.5));"></i>
                    <h1 style="font-family: 'Subsoccer', sans-serif; font-size: 3rem; color: #fff; margin: 0; letter-spacing: 3px;">${championName}</h1>
                    <h3 style="color: #D4AF37; font-size: 1.5rem; letter-spacing: 5px; margin-top: 10px; margin-bottom: 50px;">IS THE PRO LEAGUE CHAMPION</h3>
                    
                    <button class="btn-gold" style="padding: 20px; width: 100%; max-width: 300px;" onclick="loadLeaguesDashboard()">
                        FINISH EVENT
                    </button>
                </div>
            `;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
