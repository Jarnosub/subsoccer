<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Subsoccer GO</title>
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Inline only the fonts + variables from style.css (no layout conflicts) -->
    <style>
        @font-face {
            font-family: 'SubsoccerLogo';
            src: url('../fonts/Subsoccer-2-Regular.woff2') format('woff2'), url('../fonts/Subsoccer-2-Regular.woff') format('woff'), url('../fonts/Subsoccer-2-Regular.otf') format('opentype');
        }
        @font-face {
            font-family: 'Resolve';
            src: url('../fonts/Resolve-BoldNrw.otf') format('opentype');
        }
        @font-face {
            font-family: 'ResolveRegular';
            src: url('../fonts/Resolve-RegularCn.otf') format('opentype');
        }
        @font-face {
            font-family: 'Open Sans';
            src: url('https://fonts.gstatic.com/s/opensans/v34/memvYaGs126MiZpBA-UvWbX2vVnXBbObj2OVTS-muw.woff2') format('woff2');
        }
        :root {
            --sub-red: #C1272D;
            --sub-gold: #FFD700;
            --sub-black: #000000;
            --sub-white: #FFFFFF;
        }
    </style>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Resolve', sans-serif;
        }

        /* ============ PASSWORD GATE ============ */
        #password-gate {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #0a0a0a;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        #gate-logo { height: 50px; margin-bottom: 10px; }
        #gate-subtitle {
            color: #555;
            font-family: 'Resolve', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        }
        #password-gate input {
            width: 260px;
            padding: 14px 20px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            font-family: 'Resolve', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            text-align: center;
            outline: none;
        }
        #password-gate input:focus { border-color: var(--sub-gold); }
        #password-gate button {
            width: 260px;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--sub-red), #900000);
            color: #fff;
            font-family: 'SubsoccerLogo', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .error-msg {
            color: var(--sub-red);
            font-family: 'Resolve', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            height: 16px;
        }

        /* ============ LOADING ============ */
        #brand-loading {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #0a0a0a;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }
        #brand-loading .spinner { color: #333; font-size: 1.5rem; }
        #brand-loading .loading-text {
            color: #444;
            font-family: 'Resolve', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
        #brand-loading.loaded { display: none; }

        /* ============ NOT FOUND ============ */
        #brand-not-found {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #0a0a0a;
            z-index: 99998;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* ============ HERO ============ */
        .hero-background {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center top;
            z-index: 0;
            filter: brightness(0.65) contrast(1.1);
        }
        .hero-vignette {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, transparent 20%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.75) 100%);
            z-index: 1;
        }

        /* ============ HEADER ============ */
        .top-header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: calc(20px + env(safe-area-inset-top, 20px)) 20px 20px;
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-direction: row;
            max-width: 100%;
            margin: 0;
            order: initial;
        }
        .brand-logo { height: 40px; width: auto; }

        /* ============ HUB MENU ============ */
        .hub-menu {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 20px 20px calc(30px + env(safe-area-inset-bottom, 20px));
            box-sizing: border-box;
            z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; gap: 16px;
        }
        .btn-play-now {
            width: 100%; max-width: 400px;
            background: linear-gradient(135deg, var(--sub-red), #900000);
            color: #fff;
            border: none;
            padding: 22px;
            border-radius: 16px;
            font-family: 'Resolve', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 8px 30px rgba(193, 39, 45, 0.4);
        }
        .btn-play-now i { font-size: 1.2rem; margin-bottom: 4px; }
        .btn-play-now:active { transform: scale(0.97); }
        .btn-secondary {
            width: 100%; max-width: 400px;
            background: rgba(8, 55, 75, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Resolve', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
        }
        .btn-secondary:active { transform: scale(0.97); }
        .btn-dark {
            width: 100%; max-width: 400px;
            background: rgba(5, 40, 55, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Resolve', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
        }
        .btn-dark:active { transform: scale(0.97); }

        /* Powered by */
        .powered-by {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .powered-by:hover { opacity: 0.8; }
        .powered-by span {
            color: #888;
            font-family: 'Resolve', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .powered-by img { height: 16px; }
    </style>
</head>
<body>

    <!-- LOADING -->
    <div id="brand-loading">
        <i class="fas fa-circle-notch fa-spin spinner"></i>
        <div class="loading-text">LOADING...</div>
    </div>

    <!-- NOT FOUND -->
    <div id="brand-not-found">
        <i class="fas fa-exclamation-triangle" style="color: #E30613; font-size: 2rem;"></i>
        <div style="color: #666; font-family: 'Resolve', sans-serif; font-size: 0.8rem; letter-spacing: 2px;">BRAND NOT FOUND</div>
        <a href="/" style="color: #D4AF37; font-family: 'Resolve', sans-serif; font-size: 0.7rem; letter-spacing: 1px; margin-top: 10px;">← BACK TO HUB</a>
    </div>

    <!-- PASSWORD GATE -->
    <div id="password-gate">
        <img id="gate-logo" src="" alt="Brand">
        <div id="gate-subtitle"></div>
        <input type="password" id="gate-password" placeholder="Enter password" autocomplete="off" onkeydown="if(event.key==='Enter') checkPassword()">
        <button onclick="checkPassword()">ENTER</button>
        <div class="error-msg" id="gate-error"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content" style="display: none;">
        <div class="hero-background" id="hero-bg"></div>
        <div class="hero-vignette"></div>

        <div class="top-header">
            <!-- Login button -->
            <button id="hub-login-btn" style="display: flex; align-items: center; gap: 6px; background: rgba(8, 55, 75, 0.9); padding: 0 14px; height: 42px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.25); backdrop-filter: blur(5px); cursor: pointer; margin-top: 4px;" onclick="window.location.href='../login.html?source=go&redirect=brands/'+brandSlug+'/'">
                <i class="fa-solid fa-right-to-bracket" style="color: #fff; font-size: 0.8rem; pointer-events: none;"></i>
                <span style="color: #fff; font-family: 'Resolve', sans-serif; font-size: 0.65rem; letter-spacing: 1px; pointer-events: none;">LOG IN</span>
            </button>

            <!-- Center logo -->
            <div style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 10;">
                <img id="header-logo" class="brand-logo" src="" alt="Brand">
            </div>

            <!-- Hamburger -->
            <div style="height: 42px; width: 50px; display: flex; align-items: center; justify-content: flex-end; z-index: 100; margin-top: 4px;">
                <button style="background: transparent; border: none; color: #fff; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">
                    <i class="fa-solid fa-bars" style="font-size: 2.2rem; transform: scaleX(1.1);"></i>
                </button>
            </div>
        </div>

        <div class="hub-menu">
            <button class="btn-play-now" id="btn-tournament">
                <i class="fa-solid fa-trophy" style="font-size: 1.4rem; margin-bottom: 5px;"></i>
                CREATE TOURNAMENT
            </button>

            <button class="btn-secondary" id="btn-scan">
                <i class="fa-solid fa-qrcode"></i> SCAN TO JOIN
            </button>

            <button class="btn-dark" onclick="alert('Coming soon')">
                <i class="fa-solid fa-map-location-dot"></i> FIND A PUBLIC GAME
            </button>

            <!-- Powered by Subsoccer -->
            <a href="https://subsoccer.com" target="_blank" class="powered-by" style="text-decoration: none;">
                <span>Powered by</span>
                <img src="../subsoccer_logo.svg" alt="Subsoccer">
            </a>
        </div>
    </div>

    <script>
        // ============================================================
        // BRAND ENGINE — Reads brand from Supabase
        // ============================================================
        const SUPA_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
        const SUPA_KEY = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';
        let brandConfig = {};
        const brandSlug = location.pathname.split('/brands/')[1]?.split('/')[0] || '';

        async function loadBrand() {
            if (!brandSlug) {
                showNotFound();
                return;
            }

            try {
                const res = await fetch(
                    `${SUPA_URL}/rest/v1/brands?slug=eq.${brandSlug}&is_active=eq.true&select=*&limit=1`,
                    { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }
                );
                const brands = await res.json();

                if (!brands || !brands.length) {
                    showNotFound();
                    return;
                }

                brandConfig = brands[0];
            } catch (e) {
                console.error('Brand load failed:', e);
                showNotFound();
                return;
            }

            // Apply brand
            document.title = `${brandConfig.name} × Subsoccer GO`;

            // Gate
            document.getElementById('gate-logo').src = brandConfig.logo_url;
            document.getElementById('gate-subtitle').innerText = brandConfig.subtitle || '';

            // Main
            document.getElementById('hero-bg').style.backgroundImage = `url('${brandConfig.hero_url}')`;
            document.getElementById('header-logo').src = brandConfig.logo_url;

            // Navigation
            const gameUrl = `../mobile-game.html?brand=${brandSlug}`;
            document.getElementById('btn-tournament').onclick = () => location.href = gameUrl;
            document.getElementById('btn-scan').onclick = () => location.href = '../scan-code.html';

            // Hide loading
            document.getElementById('brand-loading').classList.add('loaded');

            // Show gate or content
            if (brandConfig.password) {
                const authKey = `brand-auth-${brandSlug}`;
                if (sessionStorage.getItem(authKey) === 'true') {
                    document.getElementById('main-content').style.display = 'block';
                } else {
                    document.getElementById('password-gate').style.display = 'flex';
                }
            } else {
                document.getElementById('main-content').style.display = 'block';
            }
        }

        function checkPassword() {
            const input = document.getElementById('gate-password');
            if (input.value === brandConfig.password) {
                const authKey = `brand-auth-${brandSlug}`;
                sessionStorage.setItem(authKey, 'true');
                document.getElementById('password-gate').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                document.getElementById('gate-error').innerText = 'INCORRECT PASSWORD';
                input.value = '';
                input.focus();
            }
        }

        function showNotFound() {
            document.getElementById('brand-loading').classList.add('loaded');
            document.getElementById('brand-not-found').style.display = 'flex';
        }

        loadBrand();
    </script>

</body>
</html>
