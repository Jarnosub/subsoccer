<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Subsoccer - My Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="translations.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Open Sans', sans-serif; 
            background: var(--global-bg) no-repeat center center fixed;
            background-size: cover;
            color: #111; 
            min-height: 100dvh; 
            margin: 0; 
        }
        .page-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; padding-top: calc(15px + env(safe-area-inset-top, 20px)); background: #ffffff; border-bottom: 1px solid #e0e0e0; }
        .page-title { font-family: 'Resolve', sans-serif; font-size: 0.8rem; letter-spacing: 2px; color: #111; }
        
        .back-btn { background: none; border: none; color: #111; font-size: 1.2rem; cursor: pointer; width: 30px; text-align: left; }
        
        .collection-grid { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 800px; margin: 0 auto; }
        
        .collection-card { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 20px; position: relative; overflow: hidden; }
        .collection-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #c41e2a;
        }
        
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .card-icon { width: 40px; height: 40px; border-radius: 8px; background: rgba(196, 30, 42, 0.08); display: flex; align-items: center; justify-content: center; color: #c41e2a; font-size: 1.2rem; }
        
        .card-footer { display: flex; gap: 10px; border-top: 1px solid #f0f0f0; padding-top: 15px; margin-top: 15px; }
        .btn-configure { flex: 1; background: #f5f5f5; border: 1px solid #e0e0e0; color: #111; padding: 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .btn-stats { background: transparent; border: 1px solid #e0e0e0; color: #666; width: 40px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; }
        .card-description { font-size: 0.85rem; color: #666; margin-bottom: 15px; }
        .btn-view-card { background: rgba(74, 158, 255, 0.1); border: 1px solid rgba(74, 158, 255, 0.3); color: #4a9eff; padding: 10px 15px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        
        .empty-state { text-align: center; padding: 40px 20px; border: 1px dashed #ccc; border-radius: 4px; margin-top: 20px; }
        .empty-state i { font-size: 3rem; color: #ccc; margin-bottom: 15px; }

        /* Dark mode overrides */
        body.dark-mode { 
            background: #111111 !important; 
            color: #ffffff !important; 
        }
        body.dark-mode .page-header {
            background: #111111 !important;
            border-bottom: 1px solid #222222 !important;
        }
        body.dark-mode .back-btn {
            color: #ffffff !important;
        }
        body.dark-mode .page-title {
            color: #ffffff !important;
        }
        body.dark-mode .collection-card {
            background: #1a1a1a !important;
            border-color: #2a2a2a !important;
            color: #ffffff !important;
        }
        body.dark-mode .card-footer {
            border-top: 1px solid #2a2a2a !important;
        }
        body.dark-mode .btn-configure {
            background: #262626 !important;
            border: 1px solid #333333 !important;
            color: #ffffff !important;
        }
        body.dark-mode .btn-configure:hover {
            background: #333333 !important;
        }
        body.dark-mode .btn-stats {
            border: 1px solid #333333 !important;
            color: #aaaaaa !important;
        }
        body.dark-mode .btn-stats:hover {
            background: rgba(255, 255, 255, 0.05) !important;
            color: #ffffff !important;
        }
        body.dark-mode .card-description {
            color: #aaaaaa !important;
        }
        body.dark-mode .empty-state {
            border-color: #444444 !important;
        }
        body.dark-mode .empty-state i {
            color: #444444 !important;
        }
        body.dark-mode .empty-state h3 {
            color: #ffffff !important;
        }
        body.dark-mode .empty-state p {
            color: #888888 !important;
        }
    </style>
</head>
<body>
    <script>
        (function() {
            const storageVal = localStorage.getItem('subsoccer-dark-mode');
            if (storageVal === '1' || storageVal === null) {
                document.body.classList.add('dark-mode');
            }
        })();
    </script>

    <div class="page-header">
        <button onclick="window.location.href='index.html'" class="back-btn"><i class="fas fa-arrow-left"></i></button>
        <div class="page-title" data-i18n="my_games">MY GAMES</div>
        <div style="width: 30px;"></div>
    </div>

    <div class="collection-grid" id="collection-container">
        <!-- Loader -->
        <div style="text-align: center; margin-top: 50px; color: #888;">
            <i class="fas fa-circle-notch fa-spin"></i> <span data-i18n="loading_assets">Loading assets...</span>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
        const SUPABASE_ANON = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

        async function loadCollection() {
            const cachedUser = localStorage.getItem('subsoccer-user');
            if (!cachedUser) {
                window.location.href = 'index.html';
                return;
            }

            const { data: { session } } = await sb.auth.getSession();
            if(!session) {
                window.location.href = 'index.html';
                return;
            }

            const container = document.getElementById('collection-container');

            // Fetch hardware explicitly tied to this user (e.g., from 'games' table acting as hardware nodes)
            const { data: hardware, error } = await sb.from('games').select('*').limit(5); // Adjust for real owner_id filtering

            let html = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div style="font-family: 'Resolve', sans-serif; font-size: 0.7rem; color: #888; letter-spacing: 2px;">${t('physical_games')}</div>
                    <button onclick="window.location.href='register.html'" style="background: none; border: none; color: #c41e2a; font-size: 0.8rem; cursor: pointer; font-weight: bold;"><i class="fas fa-plus"></i> ${t('add_new')}</button>
                </div>
            `;

            if (hardware && hardware.length > 0) {
                // In a real scenario, we'd filter by owner_id or user.id
                // For MVP display purposes, we list them nicely
                hardware.forEach(hw => {
                    html += `
                        <div class="collection-card">
                            <div class="card-header">
                                <div class="card-icon"><i class="fas fa-table"></i></div>
                                <div>
                                    <div style="font-weight: bold; font-size: 1.1rem;">${hw.game_name}</div>
                                    <div style="font-size: 0.8rem; color: #888; font-family: 'Open Sans', sans-serif;">Arcade Node • ${hw.location || 'Unknown Location'}</div>
                                </div>
                            </div>
                            <div class="card-footer">
                                <button onclick="openEditModal('${hw.id}', '${hw.game_name.replace(/'/g, "\\'")}', '${(hw.location || '').replace(/'/g, "\\'")}')" class="btn-configure">EDIT GAME</button>
                                <button onclick="alert('Feature coming soon: View physical asset stats.')" class="btn-stats"><i class="fas fa-chart-bar"></i></button>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3 style="margin-bottom: 10px;">${t('empty_no_games_title')}</h3>
                        <p style="font-size: 0.85rem; color: #888; margin-bottom: 20px;">${t('empty_no_games_desc')}</p>
                        <button onclick="window.location.href='register.html'" style="background: #c41e2a; color: #fff; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; letter-spacing: 1px; font-size: 0.8rem;">${t('register_gear_btn')}</button>
                    </div>
                `;
            }

            // Digital Assets Section MVP Placeholder
            html += `
                <div style="font-family: 'Resolve', sans-serif; font-size: 0.7rem; color: #888; letter-spacing: 2px; margin-top: 30px; margin-bottom: 10px;">${t('digital_assets')}</div>
                
                <div class="collection-card" style="border-left: 4px solid #4a9eff;">
                    <div class="card-header">
                        <div class="card-icon" style="background: rgba(74, 158, 255, 0.1); color: #4a9eff;"><i class="fas fa-id-card"></i></div>
                        <div>
                            <div style="font-weight: bold; font-size: 1.1rem;">${t('digital_pro_card')}</div>
                            <div style="font-size: 0.8rem; color: #888;">${t('active_subscription')}</div>
                        </div>
                    </div>
                    <div class="card-description">${t('digital_card_desc')}</div>
                    <button onclick="window.location.href='player-card.html'" class="btn-view-card">${t('view_card')}</button>
                </div>
            `;

            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', loadCollection);

        // --- Edit Modal Logic ---
        let currentEditId = null;

        function openEditModal(id, name, location) {
            currentEditId = id;
            document.getElementById('edit-game-name').value = name || '';
            document.getElementById('edit-game-location').value = location || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
            currentEditId = null;
        }

        async function saveEditModal() {
            if (!currentEditId) return;
            const newName = document.getElementById('edit-game-name').value.trim();
            const newLoc = document.getElementById('edit-game-location').value.trim();
            
            if (!newName) {
                alert('Name cannot be empty.');
                return;
            }

            const btn = document.getElementById('btn-save-edit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                let lat = undefined;
                let lon = undefined;
                if (newLoc) {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(newLoc)}`);
                        const data = await res.json();
                        if (data && data.length > 0) {
                            lat = parseFloat(data[0].lat);
                            lon = parseFloat(data[0].lon);
                        }
                    } catch (e) {
                        console.warn("Geocoding failed:", e);
                    }
                }

                const updatePayload = {
                    game_name: newName,
                    location: newLoc
                };
                if (lat !== undefined && lon !== undefined) {
                    updatePayload.latitude = lat;
                    updatePayload.longitude = lon;
                }

                const { error } = await sb.from('games').update(updatePayload).eq('id', currentEditId);

                if (error) throw error;
                
                closeEditModal();
                loadCollection(); // Refresh list
            } catch (err) {
                alert('Error updating game: ' + err.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function deleteGameModal() {
            if (!currentEditId) return;
            if (!confirm('Are you sure you want to delete this game? This cannot be undone.')) return;

            try {
                const { error } = await sb.from('games').delete().eq('id', currentEditId);
                if (error) throw error;
                
                closeEditModal();
                loadCollection(); // Refresh list
            } catch (err) {
                alert('Error deleting game: ' + err.message);
            }
        }
    </script>

    <!-- Edit Modal -->
    <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(5px);">
        <div style="background:var(--card-bg, #fff); padding:25px; border-radius:12px; width:90%; max-width:400px; color:var(--text-color, #111); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h3 style="margin-top:0; font-family: 'Resolve', sans-serif; font-size: 1.2rem; margin-bottom: 20px;">EDIT GAME</h3>
            
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #888;">GAME NAME</label>
                <input type="text" id="edit-game-name" style="width:100%; padding:12px; border:1px solid #444; background: transparent; color: inherit; border-radius:6px; box-sizing: border-box;" placeholder="e.g. Kallio Bar">
            </div>
            
            <div style="margin-bottom: 25px;">
                <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #888;">LOCATION</label>
                <input type="text" id="edit-game-location" style="width:100%; padding:12px; border:1px solid #444; background: transparent; color: inherit; border-radius:6px; box-sizing: border-box;" placeholder="e.g. Helsinki, Finland">
            </div>
            
            <div style="display:flex; justify-content:space-between; gap: 15px; margin-bottom: 15px;">
                <button onclick="closeEditModal()" style="flex:1; padding:12px; border:1px solid #444; background:transparent; color:inherit; border-radius:6px; font-weight:bold; cursor:pointer;">CANCEL</button>
                <button id="btn-save-edit" onclick="saveEditModal()" style="flex:1; padding:12px; border:none; background:#c41e2a; color:#fff; border-radius:6px; font-weight:bold; cursor:pointer;">SAVE CHANGES</button>
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <button onclick="deleteGameModal()" style="background: none; border: none; color: var(--sub-red, #c41e2a); font-size: 0.8rem; text-decoration: underline; cursor: pointer;">Delete this game</button>
            </div>
        </div>
    </div>
</body>
</html>
