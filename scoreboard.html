<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Subsoccer - Table Scoreboard</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="the-forge.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: var(--sub-black); 
            color: #fff; 
            font-family: 'Subsoccer', sans-serif; 
            margin: 0; 
            padding: 0; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }
        
        .header {
            text-align: center;
            padding: 15px;
            background: #000;
            border-bottom: 2px solid var(--sub-gold);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #waiting-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #match-view {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .score-container {
            display: flex;
            flex: 1;
        }

        .player-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            text-align: center;
            border-right: 1px solid #333;
            transition: background 0.2s;
        }
        .player-side:last-child { border: none; }
        .player-side:active { background: rgba(255,255,255,0.05); }

        .player-name {
            font-size: 2.5rem;
            color: #aaa;
            letter-spacing: 2px;
            font-family: 'Resolve', sans-serif;
            text-transform: uppercase;
        }

        .score-number {
            font-size: 15rem;
            line-height: 1;
            margin: auto 0;
            cursor: pointer;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            color: #fff;
        }

        .score-number.gold {
            color: var(--sub-gold);
        }

        .controls {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #0a0a0a;
            border-top: 1px solid #222;
        }

        .btn-control {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Resolve', sans-serif;
        }

        .btn-finish {
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            color: #000;
            border: none;
            font-weight: bold;
            padding: 15px 40px;
        }
    </style>
</head>
<body>

    <div class="header">
        <span id="table-label">TABLE ?</span>
    </div>

    <!-- Idle View -->
    <div id="waiting-view">
        <i class="fa-solid fa-hourglass-empty fa-spin-pulse" style="font-size: 4rem; color: #444; margin-bottom: 20px;"></i>
        <h2 style="color: #666; letter-spacing: 2px;">WAITING FOR NEXT MATCH</h2>
    </div>

    <div id="bracket-area" style="padding: 20px; overflow-x: auto; flex: 1;"></div>

    <script>
        const SUPA_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
        const SUPA_KEY = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';
        const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

        const params = new URLSearchParams(window.location.search);
        let leagueId = params.get('league');
        let tableNumber = parseInt(params.get('table') || '1');
        
        let currentSession = null;
        let localEngine = null;

        document.getElementById('table-label').innerText = "TABLE " + tableNumber;

        async function init() {
            if (!leagueId) {
                document.getElementById('waiting-view').innerHTML = "<h2 style='color:red;'>Missing League ID</h2>";
                return;
            }
            
            // Subscribe to table assignments
            sb.channel('table-listen')
              .on('postgres_changes', { 
                  event: 'INSERT', 
                  schema: 'public', 
                  table: 'pro_table_sessions',
                  filter: `league_id=eq.${leagueId}`
              }, payload => {
                  const data = payload.new;
                  if (data && data.table_number === tableNumber) {
                      loadGroupToTable(data);
                  }
              })
              .subscribe();

            fetchCurrentSession();
        }

        async function fetchCurrentSession() {
            const { data, error } = await sb.from('pro_table_sessions')
                .select('*')
                .eq('league_id', leagueId)
                .eq('table_number', tableNumber)
                .order('created_at', { ascending: false })
                .limit(1)
                .maybeSingle();

            if (data && data.status === 'bracket_view') {
                loadGroupToTable(data);
            } else {
                showWaiting();
            }
        }

        function showWaiting() {
            document.getElementById('waiting-view').style.display = 'flex';
            document.getElementById('bracket-area').style.display = 'none';
        }

        async function loadGroupToTable(data) {
            currentSession = data;
            document.getElementById('waiting-view').style.display = 'none';
            document.getElementById('bracket-area').style.display = 'block';
            
            document.getElementById('table-label').innerHTML = `TABLE ${tableNumber} <span style="color:#666; margin:0 10px;">|</span> <span style="color:var(--sub-gold)">${data.group_name}</span>`;

            try {
                const module = await import('./bracket-engine.js');
                const BracketEngine = module.BracketEngine;
                
                localEngine = new BracketEngine({
                    containerId: 'bracket-area',
                    enableSaveButton: false,
                    onMatchUpdate: (match, winner) => {
                        const isFinal = !match.nextMatchId;
                        if (isFinal && winner) {
                            setTimeout(() => {
                                const confirmWin = confirm(`🏆 ${winner} HAS WON THE GROUP! Finish and notify central admin?`);
                                if (confirmWin) {
                                    finishGroup(winner);
                                }
                            }, 500);
                        }
                    }
                });
                
                // Usually group players are saved as a JSON string array
                let players = typeof data.group_players === 'string' ? JSON.parse(data.group_players) : data.group_players;
                localEngine.generateBracket(players, true);
                localEngine.render();
            } catch (e) {
                console.error("Bracket load error", e);
            }
        }
        
        async function finishGroup(winnerName) {
            await sb.from('pro_table_sessions').update({ 
                status: 'completed',
                group_winner: winnerName 
            }).eq('id', currentSession.id);
            
            document.getElementById('bracket-area').innerHTML = `
                <div style="text-align:center; padding: 50px;">
                    <i class="fa-solid fa-check-circle" style="font-size: 5rem; color: #4CAF50; margin-bottom: 20px;"></i>
                    <h1 style="color:var(--sub-gold); letter-spacing: 2px;">${currentSession.group_name} FINISHED</h1>
                    <h2 style="color:#fff;">Winner: ${winnerName}</h2>
                    <p style="color:#666; margin-top:30px;">Notified central admin. You can return to your seats.</p>
                </div>
            `;
            
            // Auto reset back to waiting after some time so Table is free again
            setTimeout(() => {
                showWaiting();
                document.getElementById('table-label').innerText = "TABLE " + tableNumber;
            }, 10000); // 10 seconds viewing
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
