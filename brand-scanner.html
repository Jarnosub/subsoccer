<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subsoccer Brand Scanner V2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0f1d;
            --bg-secondary: #131b2e;
            --accent: #10b981;
            --accent-hover: #059669;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover-bg: rgba(255, 255, 255, 0.06);
            --shadow-premium: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            --glow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-primary);
            background-image:
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.08) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            line-height: 1.5;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem;
        }
        .logo-area { display: flex; align-items: center; gap: 1rem; }
        .logo-dot {
            width: 12px; height: 12px; background-color: var(--accent);
            border-radius: 50%; box-shadow: var(--glow); animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 25px rgba(16, 185, 129, 0.4); }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
        h1 {
            font-size: 1.75rem; font-weight: 800; letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-badge {
            background: rgba(16, 185, 129, 0.15); color: var(--accent);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 0.25rem 0.75rem; border-radius: 9999px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .btn {
            background-color: var(--card-bg); color: var(--text-primary);
            border: 1px solid var(--border-color); padding: 0.6rem 1.2rem;
            border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer;
            transition: all 0.2s ease; text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn:hover { background-color: var(--card-hover-bg); border-color: rgba(255, 255, 255, 0.2); }

        /* ─── Stats Bar ─── */
        .stats-bar {
            display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
        }
        .stat-chip {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 0.75rem 1.25rem;
            display: flex; align-items: center; gap: 0.6rem;
            backdrop-filter: blur(10px); flex: 1; min-width: 140px;
        }
        .stat-chip .stat-icon { font-size: 1.25rem; }
        .stat-chip .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); }
        .stat-chip .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

        /* ─── Filter Tabs ─── */
        .filter-bar {
            display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap;
        }
        .filter-btn {
            background: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--text-secondary); padding: 0.5rem 1rem; border-radius: 9999px;
            font-size: 0.8rem; font-weight: 500; cursor: pointer;
            transition: all 0.2s ease; font-family: inherit;
        }
        .filter-btn:hover { border-color: rgba(255, 255, 255, 0.2); color: var(--text-primary); }
        .filter-btn.active {
            background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.3);
            color: var(--accent); font-weight: 600;
        }

        /* ─── Info Panel ─── */
        .info-panel {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 2rem;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 1rem; backdrop-filter: blur(10px);
        }
        .info-text { color: var(--text-secondary); font-size: 0.85rem; }
        .info-text strong { color: var(--text-primary); }
        .code-box {
            background: #020617; border: 1px solid var(--border-color);
            border-radius: 6px; padding: 0.5rem 0.75rem;
            font-family: monospace; font-size: 0.8rem; color: #38bdf8; display: inline-block;
        }

        /* ─── Grid ─── */
        .mentions-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem; margin-bottom: 4rem;
        }
        .mention-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px); height: 100%;
        }
        .mention-card:hover {
            transform: translateY(-6px); border-color: rgba(16, 185, 129, 0.3);
            background: var(--card-hover-bg); box-shadow: var(--shadow-premium);
        }
        .mention-card.no-image .card-content { padding-top: 1.5rem; }

        .img-container {
            width: 100%; height: 200px; background-color: #060b13;
            position: relative; overflow: hidden; border-bottom: 1px solid var(--border-color);
        }
        .mention-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .mention-card:hover .mention-img { transform: scale(1.05); }

        .card-content { padding: 1.25rem; display: flex; flex-direction: column; flex-grow: 1; }

        .card-meta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
        .source-badge {
            padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.65rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .source-badge.google-images { background: rgba(66, 133, 244, 0.2); color: #60a5fa; }
        .source-badge.google-news { background: rgba(251, 188, 4, 0.2); color: #fbbf24; }
        .source-badge.google-web { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .source-badge.reddit { background: rgba(255, 69, 0, 0.2); color: #f97316; }

        .mention-domain {
            font-size: 0.7rem; color: var(--text-secondary); font-weight: 500;
        }
        .mention-title {
            font-size: 0.95rem; font-weight: 600; color: var(--text-primary);
            line-height: 1.4; margin-bottom: 0.75rem;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-footer {
            margin-top: auto; display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; color: var(--text-secondary);
            border-top: 1px solid var(--border-color); padding-top: 0.75rem;
        }
        .visit-link {
            color: var(--accent); text-decoration: none; font-weight: 600;
            display: inline-flex; align-items: center; gap: 0.25rem; transition: color 0.2s;
        }
        .visit-link:hover { color: var(--accent-hover); }

        /* States */
        .empty-state, .loading-state {
            grid-column: 1 / -1; text-align: center; padding: 5rem 2rem;
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; backdrop-filter: blur(10px);
        }
        .state-icon { font-size: 3rem; margin-bottom: 1.5rem; display: inline-block; }

        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .stats-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <div class="logo-dot"></div>
                <h1>Brand Scanner</h1>
                <span class="header-badge">V2 Multi-Source</span>
            </div>
            <a href="/index.html" class="btn">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Päävalikko
            </a>
        </header>

        <!-- Stats -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-chip"><span class="stat-icon">📊</span><div><div class="stat-value" id="stat-total">—</div><div class="stat-label">Yhteensä</div></div></div>
            <div class="stat-chip"><span class="stat-icon">🖼️</span><div><div class="stat-value" id="stat-images">—</div><div class="stat-label">Google Kuvat</div></div></div>
            <div class="stat-chip"><span class="stat-icon">📰</span><div><div class="stat-value" id="stat-news">—</div><div class="stat-label">Google News</div></div></div>
            <div class="stat-chip"><span class="stat-icon">🌐</span><div><div class="stat-value" id="stat-web">—</div><div class="stat-label">Google Web</div></div></div>
            <div class="stat-chip"><span class="stat-icon">💬</span><div><div class="stat-value" id="stat-reddit">—</div><div class="stat-label">Reddit</div></div></div>
        </div>

        <!-- Filters -->
        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-source="all">Kaikki</button>
            <button class="filter-btn" data-source="google-images">🖼️ Google Kuvat</button>
            <button class="filter-btn" data-source="google-news">📰 Google News</button>
            <button class="filter-btn" data-source="google-web">🌐 Google Web</button>
            <button class="filter-btn" data-source="reddit">💬 Reddit</button>
        </div>

        <!-- Info -->
        <div class="info-panel">
            <div class="info-text">
                <span id="last-scraped-time">Viimeisin skannaus: Ei ladattu</span>
            </div>
            <div class="code-box">node scripts/scan-mentions.js</div>
        </div>

        <!-- Grid -->
        <div id="mentions-container" class="mentions-grid">
            <div class="loading-state">
                <span class="state-icon">⏳</span>
                <h3>Ladataan mainintoja...</h3>
            </div>
        </div>
    </div>

    <script>
        const SOURCE_LABELS = {
            'google-images': 'Google Kuvat',
            'google-news': 'Google News',
            'google-web': 'Google Web',
            'reddit': 'Reddit'
        };
        let allData = [];

        async function loadMentions() {
            try {
                const res = await fetch('/brand-mentions.json');
                if (!res.ok) throw new Error('Ei dataa');
                allData = await res.json();
                if (!allData || allData.length === 0) { renderEmpty(); return; }

                // Stats
                const imgs = allData.filter(d => d.source === 'google-images').length;
                const news = allData.filter(d => d.source === 'google-news').length;
                const web = allData.filter(d => d.source === 'google-web').length;
                const reddit = allData.filter(d => d.source === 'reddit').length;
                document.getElementById('stat-total').textContent = allData.length;
                document.getElementById('stat-images').textContent = imgs;
                document.getElementById('stat-news').textContent = news;
                document.getElementById('stat-web').textContent = web;
                document.getElementById('stat-reddit').textContent = reddit;

                // Last scraped
                const latest = allData.find(d => d.scrapedAt);
                if (latest) {
                    document.getElementById('last-scraped-time').innerHTML =
                        `Viimeisin skannaus: <strong>${new Date(latest.scrapedAt).toLocaleString('fi-FI')}</strong>`;
                }

                renderCards(allData);
            } catch (e) {
                console.error(e);
                renderEmpty();
            }
        }

        function renderCards(data) {
            const c = document.getElementById('mentions-container');
            c.innerHTML = '';
            if (data.length === 0) { renderEmpty(); return; }

            data.forEach(item => {
                const hasImg = item.imgUrl && !item.imgUrl.startsWith('data:image/gif');
                const card = document.createElement('div');
                card.className = 'mention-card' + (hasImg ? '' : ' no-image');

                const sourceClass = (item.source || 'google-images').replace(/\s/g, '-');
                const sourceLabel = SOURCE_LABELS[item.source] || item.source || 'Tuntematon';

                const imgHtml = hasImg ? `
                    <div class="img-container">
                        <img src="${item.imgUrl}" alt="${item.title || ''}" class="mention-img" loading="lazy"
                             onerror="this.parentElement.style.display='none'">
                    </div>` : '';

                const scoreHtml = item.score !== undefined ? `<span>⬆ ${item.score}</span>` : '';

                card.innerHTML = `
                    ${imgHtml}
                    <div class="card-content">
                        <div class="card-meta">
                            <span class="source-badge ${sourceClass}">${sourceLabel}</span>
                            <span class="mention-domain">${item.domain || ''}</span>
                        </div>
                        <h2 class="mention-title" title="${item.title || ''}">${item.title || 'Subsoccer-maininta'}</h2>
                        <div class="card-footer">
                            ${scoreHtml}
                            <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="visit-link">
                                Avaa ↗
                            </a>
                        </div>
                    </div>
                `;
                c.appendChild(card);
            });
        }

        function renderEmpty() {
            document.getElementById('mentions-container').innerHTML = `
                <div class="empty-state">
                    <span class="state-icon">🔍</span>
                    <h3>Ei dataa saatavilla</h3>
                    <p>Aja skanneri: <span class="code-box">node scripts/scan-mentions.js</span></p>
                </div>`;
        }

        // Filter buttons
        document.getElementById('filter-bar').addEventListener('click', e => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const src = btn.dataset.source;
            renderCards(src === 'all' ? allData : allData.filter(d => d.source === src));
        });

        document.addEventListener('DOMContentLoaded', loadMentions);
    </script>
</body>
</html>
