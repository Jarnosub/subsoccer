<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Venue Card - Subsoccer GO Prototype</title>
    <script src="https://kit.fontawesome.com/ce31a4fb4c.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Russo+One&display=swap');
        @font-face {
            font-family: 'SubsoccerLogo';
            src: url('fonts/subsoccer-logo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --sub-red: #E30613;
            --sub-gold: #D4AF37;
            --sub-dark: #121212;
            --sub-black: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Open Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Phone mockup container for testing */
        .phone-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            max-height: 850px;
            background: var(--sub-black);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* Hero Image Area */
        .venue-hero {
            position: relative;
            width: 100%;
            height: 250px;
            background: url('https://images.unsplash.com/photo-1543007630-9710e4a00a20?auto=format&fit=crop&q=80&w=1000') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border-bottom: 2px solid var(--sub-red);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.95) 100%);
        }

        .venue-title-container {
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        .venue-badge {
            background: var(--sub-red);
            color: #fff;
            font-family: 'Russo One', sans-serif;
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 8px;
            box-shadow: 0 2px 10px rgba(227, 6, 19, 0.5);
        }

        .venue-name {
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            margin: 0;
            line-height: 1.1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .venue-location {
            color: #aaa;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
            background: var(--sub-dark);
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px 10px;
            text-align: center;
        }

        .stat-value {
            font-family: 'Russo One', sans-serif;
            font-size: 1.4rem;
            color: #fff;
        }

        .stat-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Card Section */
        .card-section {
            padding: 20px;
        }

        .section-title {
            font-family: 'Russo One', sans-serif;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* King of the Table */
        .king-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(212, 175, 55, 0.05) 100%);
            border: 1px solid var(--sub-gold);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .king-avatar {
            width: 60px;
            height: 60px;
            background: var(--sub-dark);
            border: 2px solid var(--sub-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: var(--sub-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .king-info h3 {
            margin: 0 0 5px 0;
            font-family: 'Russo One', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .king-info p {
            margin: 0;
            color: #aaa;
            font-size: 0.8rem;
        }

        .king-crown {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: rgba(212, 175, 55, 0.2);
        }

        /* History List */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-players {
            font-family: 'Russo One', sans-serif;
            font-size: 0.9rem;
        }

        .history-score {
            font-weight: bold;
            color: var(--sub-red);
            font-size: 1.1rem;
        }

        .history-time {
            color: #666;
            font-size: 0.7rem;
            margin-top: 4px;
        }
        
        /* Action Buttons */
        .action-bar {
            padding: 20px;
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-family: 'Russo One', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--sub-red);
            color: #fff;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

    </style>
</head>
<body>

    <div class="phone-container">
        
        <!-- Hero Section -->
        <div class="venue-hero">
            <div class="hero-overlay"></div>
            
            <div style="position: absolute; top: 20px; left: 20px; z-index: 10;">
                <button style="background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </div>

            <div class="venue-title-container">
                <div class="venue-badge"><i class="fa-solid fa-check-circle" style="margin-right: 4px;"></i> VERIFIED GAME</div>
                <h1 class="venue-name">Mall of Tripla</h1>
                <div class="venue-location"><i class="fa-solid fa-location-dot"></i> Pasila, Helsinki</div>
            </div>
        </div>

        <!-- Numbers / Stats -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value">142</div>
                <div class="stat-label">Games Played</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">86</div>
                <div class="stat-label">Unique Players</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">3</div>
                <div class="stat-label">Hosted Events</div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
            <button class="btn btn-primary"><i class="fa-solid fa-qrcode" style="margin-right:8px;"></i> Join Game</button>
            <button class="btn btn-secondary"><i class="fa-solid fa-share-nodes" style="margin-right:8px;"></i> Share</button>
        </div>

        <!-- Ruler of the Table -->
        <div class="card-section">
            <div class="section-title">
                <i class="fa-solid fa-crown" style="color:var(--sub-gold);"></i> KING OF THE GAME
            </div>
            
            <div class="king-card">
                <i class="fa-solid fa-chess-king king-crown"></i>
                <div class="king-avatar">
                    <i class="fa-solid fa-user-ninja"></i>
                </div>
                <div class="king-info">
                    <h3>Jarno "The Boss"</h3>
                    <p style="color: var(--sub-gold); font-weight: bold; margin-bottom: 2px;">24 Wins at this location</p>
                    <p>Current ELO: 1650</p>
                </div>
            </div>
        </div>

        <!-- Latest Matches -->
        <div class="card-section">
            <div class="section-title">
                <i class="fa-solid fa-clock-rotate-left"></i> LATEST MATCHES
            </div>
            
            <div class="history-list">
                <div class="history-item">
                    <div>
                        <div class="history-players">Markus <span style="color:#666;">vs</span> Jarno</div>
                        <div class="history-time">2 hours ago</div>
                    </div>
                    <div class="history-score">1 - 3</div>
                </div>
                
                <div class="history-item">
                    <div>
                        <div class="history-players">Anna <span style="color:#666;">vs</span> Guest</div>
                        <div class="history-time">Yesterday</div>
                    </div>
                    <div class="history-score" style="color:#fff;">3 - 0</div>
                </div>

                <div class="history-item">
                    <div>
                        <div class="history-players">Jarno <span style="color:#666;">vs</span> Ville</div>
                        <div class="history-time">2 days ago</div>
                    </div>
                    <div class="history-score">3 - 2</div>
                </div>
            </div>
            
            <button style="width: 100%; background: transparent; border: 1px solid #333; color: #888; padding: 12px; margin-top: 15px; border-radius: 8px; font-family: 'Russo One'; cursor: pointer;">VIEW FULL HISTORY</button>
        </div>

        <div style="height: 40px;"></div>
    </div>

</body>
</html>
