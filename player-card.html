<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Subsoccer - Player Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=4">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="version.js"></script>
    <script src="translations.js"></script>
    <script src="https://js-de.sentry-cdn.com/a53cdae04c9280e2611fe75c4b793913.min.js" crossorigin="anonymous"></script>
    <script src="sentry.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Override global Resolve !important from style.css line 1259 */
        .subsoccer-font {
            font-family: 'Subsoccer', 'SubsoccerLogo', sans-serif !important;
            font-weight: normal !important;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: #111111;
            
            color: #ffffff;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        /* ========================================
           HEADER
           ======================================== */
        .pc-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: #111111;
            border-bottom: 1px solid #333333;
            padding: 15px 20px;
            padding-top: calc(15px + env(safe-area-inset-top, 20px));
            position: relative;
            z-index: 99;
        }
        
        .pc-back-btn {
            background: none;
            border: none;
            color: #ffffff;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .pc-header-title {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .pc-settings-btn {
            background: none;
            border: none;
            color: #ffffff;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.05rem;
        }

        /* ========================================
           CARD SHOWCASE (stadion-tausta)
           ======================================== */
        .pc-showcase {
            width: 100%;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            position: relative;
            padding: 20px 0 0;
            background: transparent;
        }

        .pc-spotlight {
            display: none;
        }

        .pc-title-player {
            color: #ffffff;
        }

        .pro-card-flipper {
            box-shadow: none !important;
        }

        /* ========================================
           STATS DASHBOARD (alla kortin)
           ======================================== */
        .pc-stats {
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
            padding: 0 0 15px;
        }

        .pc-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 15px;
        }

        .pc-stat-card {
            background: #222222;
            border: none;
            border-radius: 2px;
            padding: 10px 4px;
            text-align: center;
        }

        .pc-stat-value {
            font-family: 'Resolve', sans-serif !important;
            font-weight: bold !important;
            font-size: 1.2rem;
            color: #ffffff;
            line-height: 1;
        }

        .pc-stat-label {
            font-family: 'Resolve', sans-serif;
            font-size: 0.5rem;
            color: #666;
            letter-spacing: 1px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* ========================================
           ACTION BUTTONS
           ======================================== */
        .pc-actions {
            max-width: 400px;
            margin: 0 auto;
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pc-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #c41e2a !important;
            border: none !important;
            border-radius: 2px;
            padding: 14px 20px;
            color: #ffffff !important;
            font-family: 'Resolve', sans-serif;
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
            text-transform: capitalize;
        }
        .pc-action-btn:active { transform: scale(0.97); }
        
        .pc-action-btn i {
            color: #ffffff !important;
        }

        .pc-action-btn .pc-action-arrow {
            display: none;
        }

        /* Owner-only button */
        .pc-action-btn.owner-only {
            border-color: rgba(196,30,42,0.3);
        }

        /* ========================================
           NOT LOGGED IN STATE
           ======================================== */
        .pc-login-prompt {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px 20px;
            text-align: center;
        }

        .pc-login-title {
            font-family: 'SubsoccerLogo', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .pc-login-subtitle {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .pc-login-btn {
            width: 100%;
            background: #c41e2a;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 2px;
            font-family: 'SubsoccerLogo', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .pc-register-btn {
            width: 100%;
            background: transparent;
            color: #c41e2a;
            border: 1px solid rgba(196,30,42,0.4);
            padding: 16px;
            border-radius: 2px;
            font-family: 'SubsoccerLogo', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .pc-guest-link {
            display: block;
            margin-top: 15px;
            color: #444;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
        }

        /* ========================================
           EDIT PROFILE PANEL
           ======================================== */
        .pc-edit-panel {
            max-width: 400px;
            margin: 0 auto;
            padding: 0 20px;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            opacity: 0;
        }
        .pc-edit-panel.open {
            max-height: 600px;
            opacity: 1;
        }

        .pc-edit-card {
            background: #222222;
            border: 1px solid #444444;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .pc-edit-label {
            font-family: 'Resolve', sans-serif;
            font-size: 0.6rem;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .pc-edit-input {
            width: 100%;
            background: #111111;
            border: 1px solid #444444;
            border-radius: 6px;
            color: #ffffff;
            padding: 12px;
            font-family: 'Resolve', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .pc-edit-input:focus { border-color: #c41e2a; }

        .pc-edit-select {
            width: 100%;
            background: #111111;
            border: 1px solid #444444;
            border-radius: 6px;
            color: #ffffff;
            padding: 12px;
            font-family: 'Resolve', sans-serif;
            font-size: 0.85rem;
            outline: none;
            margin-bottom: 12px;
            -webkit-appearance: none;
            transition: border-color 0.2s;
        }
        .pc-edit-select:focus { border-color: #c41e2a; }

        .pc-edit-file-label {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #111111;
            border: 1px dashed #444444;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            color: #666;
            font-family: 'Resolve', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-bottom: 12px;
            transition: border-color 0.2s, color 0.2s;
        }
        .pc-edit-file-label:hover { border-color: #c41e2a; color: #c41e2a; }

        .pc-save-btn {
            width: 100%;
            background: linear-gradient(135deg, #c41e2a 0%, #a01520 100%);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 2px;
            font-family: 'Resolve', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(196, 30, 42, 0.3);
        }
        .pc-save-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(196, 30, 42, 0.4); }
        .pc-save-btn:active { transform: scale(0.98); }
        .pc-save-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .pc-save-status {
            text-align: center;
            font-family: 'Resolve', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 1px;
            margin-top: 8px;
            min-height: 16px;
            color: #888;
            transition: color 0.3s;
        }

        .pc-logout-btn {
            width: 100%;
            background: transparent;
            color: #ffffff;
            border: 1px solid #444444;
            padding: 12px;
            border-radius: 2px;
            font-family: 'Resolve', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .pc-logout-btn:hover {
            background: rgba(0,0,0,0.05);
        }

        .pc-edit-msg {
            text-align: center;
            font-family: 'Resolve', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 1px;
            margin-top: 8px;
            min-height: 18px;
        }

        /* ========================================
           DARK MODE OVERRIDES
           ======================================== */
        body.dark-mode {
            background: #111111;
            color: #ffffff;
        }

        body.dark-mode .pc-title-player {
            color: #ffffff !important;
        }

        body.dark-mode .pc-header {
            background: #111111;
            border-bottom-color: #333333;
        }

        body.dark-mode .pc-back-btn,
        body.dark-mode .pc-settings-btn {
            color: #ffffff;
        }

        body.dark-mode .pc-stat-card {
            background: #222222;
        }

        body.dark-mode .pc-stat-value {
            color: #ffffff;
        }

        body.dark-mode .pc-stat-label {
            color: #aaaaaa;
        }

        body.dark-mode .pc-login-subtitle {
            color: #aaaaaa;
        }

        body.dark-mode .pc-guest-link {
            color: #aaaaaa;
        }

        body.dark-mode .pc-edit-card {
            background: #222222;
            border-color: #444444;
        }

        body.dark-mode .pc-edit-input,
        body.dark-mode .pc-edit-select {
            background: #111111;
            border-color: #444444;
            color: #ffffff;
        }

        body.dark-mode .pc-edit-file-label {
            background: #111111;
            border-color: #444444;
            color: #aaaaaa;
        }

        body.dark-mode .pc-logout-btn {
            color: #ffffff;
            border-color: #444444;
        }

        body.dark-mode .pc-logout-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        body.dark-mode .pc-edit-label {
            color: #aaaaaa;
        }

        /* Avatar Studio Sections */
        .studio-section {
            padding: 0 20px;
            max-width: 420px;
            margin: 0 auto;
        }
        .studio-section-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .studio-section-label {
            font-family: 'Resolve', sans-serif;
            font-size: 0.6rem;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .studio-section-label i {
            color: #c41e2a;
            font-size: 0.7rem;
        }
        
        /* Avatar Carousel */
        .avatar-carousel-wrap {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .avatar-carousel-track-outer {
            flex: 1;
            overflow: hidden;
            border-radius: 8px;
        }
        .avatar-carousel-track {
            display: flex;
            gap: 10px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .avatar-option {
            flex: 0 0 calc((100% - 20px) / 3);
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: visible;
            border: 3px solid transparent;
            cursor: pointer;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
            background: #1a1a1a;
            position: relative;
        }
        .avatar-option img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            border-radius: 9px;
        }
        .avatar-option.selected {
            border-color: #c41e2a;
            box-shadow: 0 0 16px rgba(196, 30, 42, 0.4), 0 0 40px rgba(196, 30, 42, 0.15);
            transform: scale(1.05);
        }
        .avatar-option.selected::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            bottom: -4px; right: -4px;
            width: 22px; height: 22px;
            background: #c41e2a;
            color: #fff;
            border-radius: 50%;
            font-size: 0.55rem;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #111;
            z-index: 5;
            animation: checkPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes checkPop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .avatar-carousel-btn {
            flex-shrink: 0;
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1px solid #333;
            background: rgba(255,255,255,0.04);
            color: #888;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .avatar-carousel-btn:hover { background: rgba(196,30,42,0.15); color: #fff; border-color: rgba(196,30,42,0.3); }
        .avatar-carousel-btn:disabled { opacity: 0.2; pointer-events: none; }

        /* AI Selfie Block */
        .ai-hero {
            display: flex; flex-direction: column; gap: 10px;
        }
        .ai-upload-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #c41e2a;
            border: 1px solid #c41e2a;
            border-radius: 2px;
            padding: 16px; cursor: pointer;
            font-family: 'Resolve', sans-serif; font-size: 0.7rem; font-weight: bold;
            color: #fff; letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.25s;
            box-shadow: 0 4px 15px rgba(196, 30, 42, 0.2);
        }
        .ai-upload-btn:hover { background: #a01520; }
        .ai-upload-btn.ready {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
            color: #888;
            box-shadow: none;
        }
        .ai-generate-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2px;
            padding: 16px;
            color: #666;
            font-family: 'Resolve', sans-serif; font-size: 0.85rem; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: default; transition: all 0.25s;
            pointer-events: none;
        }
        .ai-generate-btn.ready {
            background: linear-gradient(135deg, #c41e2a 0%, #a01520 100%);
            border: none;
            color: #fff;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(196, 30, 42, 0.2);
        }
        .ai-generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(196, 30, 42, 0.35); }
        .ai-generate-btn:active { transform: scale(0.98); }
        .ai-generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Accordion Profile Details */
        .profile-accordion {
            max-width: 420px;
            margin: 0 auto 30px;
            padding: 0 20px;
        }
        .profile-accordion-btn {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; color: #888;
            font-family: 'Resolve', sans-serif; font-size: 0.75rem; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.2s;
        }
        .profile-accordion-btn:hover { border-color: rgba(255,255,255,0.12); color: #aaa; }
        .profile-accordion-btn .chevron { transition: transform 0.3s; color: #c41e2a; }
        .profile-accordion-btn.open .chevron { transform: rotate(180deg); }
        .profile-accordion-btn.open { border-radius: 2px 2px 0 0; border-bottom-color: transparent; }
        .profile-accordion-body {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-top: none;
            border-radius: 0 0 2px 2px;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease;
        }
        .profile-accordion-body.open { max-height: 500px; opacity: 1; }
        .profile-accordion-inner {
            padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 10px;
        }

        /* AI Generation Overlay */
        .ai-gen-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .ai-gen-overlay.active { display: flex; }
        .ai-gen-icon {
            display: flex; align-items: center; justify-content: center;
            animation: ai-gen-pulse 2s ease-in-out infinite;
        }
        @keyframes ai-gen-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .ai-gen-title {
            font-family: 'Resolve', sans-serif;
            font-size: 1.1rem; font-weight: bold; color: #fff;
            letter-spacing: 3px; text-transform: uppercase;
        }
        .ai-gen-status {
            font-family: 'Resolve', sans-serif;
            font-size: 0.7rem; color: #888;
            letter-spacing: 2px; text-transform: uppercase;
            min-height: 20px;
            transition: opacity 0.3s;
        }
        .ai-gen-progress-wrap {
            width: 260px; height: 4px;
            background: #222; border-radius: 2px;
            overflow: hidden;
        }
        .ai-gen-progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #c41e2a, #ff4757, #c41e2a);
            background-size: 200% 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
            animation: ai-gen-shimmer 1.5s linear infinite;
        }
        @keyframes ai-gen-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .ai-gen-timer {
            font-family: 'Resolve', sans-serif;
            font-size: 0.6rem; color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>



    <!-- HEADER -->
    <div class="pc-header">
        <button class="pc-back-btn" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="pc-header-title">
            <img src="subsoccer_logo.svg" style="height: 24px; cursor: pointer;" alt="Subsoccer" onclick="window.location.href='https://subsoccer.com';">
        </div>
        <button class="pc-settings-btn" onclick="toggleProfileAccordion(); document.getElementById('profile-accordion-body').scrollIntoView({behavior:'smooth', block:'center'})">
            <i class="fas fa-cog"></i>
        </button>
    </div>

    <!-- CARD SHOWCASE -->
    <div class="pc-showcase">
        <div class="subsoccer-font" style="font-size: 3.2rem; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0; text-align: center; line-height: 1;">
            <span class="subsoccer-font pc-title-player" data-i18n="pc_title_player">PLAYER</span> <span class="subsoccer-font" style="color: #c41e2a;" data-i18n="pc_title_card">CARD</span>
        </div>
        <div class="pc-spotlight"></div>
        
        <!-- Pro Card (uses existing CSS from style.css) -->
        <div class="pro-card" onclick="this.classList.toggle('flipped')" style="z-index: 10;">
            <div class="pro-card-flipper">
                <!-- FRONT SIDE -->
                <div class="pro-card-front">
                    <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 12px 15px 6px; z-index: 2;">
                        <div style="font-size: 0.65rem; color: #c41e2a; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">
                            PRO CARD // 2026</div>
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <i class="fa-solid fa-crown" style="color: #c41e2a; font-size: 1.1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8);"></i>
                        </div>
                    </div>

                    <!-- Photo area -->
                    <div style="width: 100%; height: 225px; flex-shrink: 0; background: #1a1a1a; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; z-index: 2; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);">

    <script>
        const SUPA_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
        const SUPA_KEY = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';

        let _sb = null;
        let _currentPlayer = null;
        let _selectedAvatarFile = null;

        function getSb() {
            if (!_sb) {
                _sb = supabase.createClient(SUPA_URL, SUPA_KEY);
            }
            return _sb;
        }

        // Get fresh JWT token via Supabase client (auto-refreshes)
        async function getFreshToken() {
            try {
                const sb = getSb();
                const { data: { session } } = await sb.auth.getSession();
                if (session?.access_token) return session.access_token;
            } catch(e) {
                console.warn('getFreshToken error:', e.message);
            }
            return getUserTokenFromStorage();
        }

        // Read token from localStorage without refreshing (sync helper)
        function getUserTokenFromStorage() {
            try {
                const keys = Object.keys(localStorage).filter(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
                for (const key of keys) {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data?.access_token) return data.access_token;
                }
            } catch(e) {}
            return null;
        }

        // Legacy sync alias (used by loadCustomAvatarHistory etc)
        function getUserToken() {
            return getUserTokenFromStorage();
        }

        // Direct REST API helper — bypasses Supabase JS client's auth layer
        async function directQuery(method, table, params = {}, body = null) {
            const url = new URL(`${SUPA_URL}/rest/v1/${table}`);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            
            // Use fresh JWT for write operations (PATCH/POST), anon key for reads
            const token = (method !== 'GET') ? (await getFreshToken() || SUPA_KEY) : SUPA_KEY;
            
            const opts = {
                method: method,
                headers: {
                    'apikey': SUPA_KEY,
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                }
            };
            if (body) opts.body = JSON.stringify(body);
            
            const res = await fetch(url.toString(), opts);
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`DB ${method} failed (${res.status}): ${errText}`);
            }
            return await res.json();
        }

        function applyPlayerData(player) {
            if (!player) return;
            _currentPlayer = player;
            const name = player.username || 'PLAYER';
            const elo = player.elo || 1500;
            const wins = player.wins || 0;
            const losses = player.losses || 0;
            const matches = wins + losses;
            const ratio = matches > 0 ? Math.round((wins / matches) * 100) : 0;

            document.getElementById('pc-card-name').innerText = name;
            document.getElementById('pc-card-elo').innerText = elo;
            document.getElementById('pc-card-winratio').innerText = ratio + '%';

            if (player.avatar_url) {
                const photo = document.getElementById('pc-card-photo');
                const optAvatarUrl = (player.avatar_url.includes('supabase.co/storage/v1/object/public/'))
                    ? player.avatar_url.split('?')[0].replace('/storage/v1/object/public/', '/storage/v1/render/image/public/') + '?width=512&height=512&resize=cover&quality=85'
                    : player.avatar_url;
                photo.src = optAvatarUrl;
                photo.style.display = 'block';
                document.getElementById('pc-card-icon').style.display = 'none';

                // Check if current avatar is a preset or custom
                const isPreset = player.avatar_url.includes('avatar-human-');
                const track = document.getElementById('avatar-selection');
                
                if (!isPreset && track) {
                    // Load ALL custom avatars from Storage (async, non-blocking)
                    loadCustomAvatarHistory(player).then(() => {
                        // Ensure current avatar is selected after history loads
                        const currentOpt = track.querySelector(`.avatar-option[data-avatar-url="${player.avatar_url.split('?')[0]}"]`);
                        if (currentOpt) {
                            track.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                            currentOpt.classList.add('selected');
                        }
                        updateCarouselButtons();
                    });
                    document.getElementById('selected-avatar-url').value = player.avatar_url;
                } else {
                    // Preset avatar — select matching option
                    document.querySelectorAll('.avatar-option').forEach(el => {
                        if (player.avatar_url.includes(el.getAttribute('data-avatar'))) {
                            el.classList.add('selected');
                            document.getElementById('selected-avatar-url').value = el.getAttribute('data-avatar');
                        } else {
                            el.classList.remove('selected');
                        }
                    });
                }
            }

            // Show/hide remove avatar link
            const removeWrap = document.getElementById('remove-avatar-wrap');
            if (removeWrap) removeWrap.style.display = player.avatar_url ? 'block' : 'none';

            if (player.team_data && player.team_data.name) {
                document.getElementById('pc-card-location').innerText = player.team_data.name;
            } else if (player.country) {
                document.getElementById('pc-card-location').innerText = player.country.toUpperCase();
            }

            document.getElementById('pc-back-elo').innerText = elo;
            document.getElementById('pc-back-ratio').innerText = ratio + '%';
            document.getElementById('pc-back-matches').innerText = matches;
            document.getElementById('pc-back-wins').innerText = wins;
            document.getElementById('pc-back-tourneys').innerText = (player.tournaments_won || 0);

            const tier = elo >= 1800 ? 'LEGEND' : elo >= 1500 ? 'PRO PLAYER' : elo >= 1300 ? 'CHALLENGER' : 'ROOKIE';
            document.getElementById('pc-card-tier').innerText = tier;

            if (player.is_owner || player.is_admin) {
                const modBtn = document.getElementById('pc-mod-btn');
                if(modBtn) modBtn.style.display = 'block';
            }

            // Pre-fill edit form
            document.getElementById('pc-edit-name').value = name;
            if (player.country) {
                setTimeout(() => {
                    const sel = document.getElementById('pc-edit-country');
                    sel.value = player.country;
                }, 500);
            }
        }

        // Toggle accordions
        function toggleProfileAccordion() {
            const btn = document.getElementById('profile-accordion-btn');
            const body = document.getElementById('profile-accordion-body');

            const btn = document.getElementById('studio-accordion-btn');
            const body = document.getElementById('studio-accordion-body');

            body.classList.toggle('open');

                setTimeout(() => body.scrollIntoView({behavior: 'smooth', block: 'end'}), 200);
            }
        }

        // Avatar carousel logic
        let _carouselIndex = 0;
        function avatarCarouselStep(dir) {
            const track = document.getElementById('avatar-selection');
            const items = track.querySelectorAll('.avatar-option');
            const total = items.length;
            const visible = 3;
            const max = Math.max(0, total - visible);
            _carouselIndex = Math.max(0, Math.min(_carouselIndex + dir, max));

            const itemW = items[0].offsetWidth + 12; // 12px gap
            track.style.transform = `translateX(-${_carouselIndex * itemW}px)`;

            updateCarouselButtons();
        }

        function updateCarouselButtons() {
            const track = document.getElementById('avatar-selection');
            const items = track.querySelectorAll('.avatar-option');
            const total = items.length;
            const visible = 3;
            const max = Math.max(0, total - visible);
            document.getElementById('avatar-prev').disabled = _carouselIndex === 0;
            document.getElementById('avatar-next').disabled = _carouselIndex >= max;
        }

        // Load all custom avatars from Supabase Storage for the user
        let _avatarHistoryLoaded = false;
        async function loadCustomAvatarHistory(player) {
            if (!player?.id) return;
            if (_avatarHistoryLoaded) return; // Already loaded, skip
            const track = document.getElementById('avatar-selection');
            if (!track) return;

            // Remove any previously injected custom items
            track.querySelectorAll('.avatar-option[data-custom="true"]').forEach(el => el.remove());

            const currentAvatarBase = player.avatar_url ? player.avatar_url.split('?')[0] : '';
            
            // 1. INSTANT: show from localStorage gallery first (no network wait)
            let avatarUrls = loadAvatarGallery(player.id);
            if (avatarUrls.length > 0) {
                injectAvatarUrls(avatarUrls, currentAvatarBase, track);
                _avatarHistoryLoaded = true;
            }

            // 2. BACKGROUND: refresh from Storage API (may add new entries)
            try {
                // List all files in avatars/ folder matching this user's ID (read-only, anon key is enough)
                const token = SUPA_KEY;
                const listRes = await fetch(`${SUPA_URL}/storage/v1/object/list/event-images`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPA_KEY,
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prefix: 'avatars/',
                        search: `${player.id}_ai_`,
                        limit: 20,
                        offset: 0,
                        sortBy: { column: 'created_at', order: 'desc' }
                    })
                });

                if (listRes.ok) {
                    const files = await listRes.json();
                    if (files && files.length > 0) {
                        const storageUrls = files.map(f => `${SUPA_URL}/storage/v1/object/public/event-images/avatars/${f.name}`);
                        saveAvatarGallery(player.id, storageUrls);
                        
                        // Only re-inject if Storage has different/more items than localStorage
                        if (storageUrls.length !== avatarUrls.length) {
                            track.querySelectorAll('.avatar-option[data-custom="true"]').forEach(el => el.remove());
                            avatarUrls = storageUrls;
                            injectAvatarUrls(avatarUrls, currentAvatarBase, track);
                        }
                    }
                }
            } catch(e) {
                console.warn('Storage list error:', e.message);
            }

            // If nothing loaded yet, show current avatar as single item
            if (!_avatarHistoryLoaded && player.avatar_url && !player.avatar_url.includes('avatar-human-')) {
                avatarUrls = [player.avatar_url.split('?')[0]];
                injectAvatarUrls(avatarUrls, currentAvatarBase, track);
            }
            _avatarHistoryLoaded = true;
        }

        // Inject avatar URLs into carousel
        function injectAvatarUrls(urls, currentAvatarBase, track) {
            // Ensure current avatar is in the list
            if (currentAvatarBase) {
                const hasCurrentBase = urls.some(u => u.includes(currentAvatarBase) || currentAvatarBase.includes(u));
                if (!hasCurrentBase) {
                    urls = [currentAvatarBase, ...urls];
                }
            }

            // Reverse so prepend gives newest-first
            const reversedUrls = [...urls].reverse();
            reversedUrls.forEach(url => {
                const isSelected = currentAvatarBase && (url.includes(currentAvatarBase) || currentAvatarBase.includes(url));
                const opt = document.createElement('div');
                opt.className = 'avatar-option' + (isSelected ? ' selected' : '');
                opt.setAttribute('data-avatar', url);
                opt.setAttribute('data-avatar-url', url);
                opt.setAttribute('data-custom', 'true');
                opt.onclick = function() { selectAvatar(this); };
                const optUrl = (url.includes('supabase.co/storage/v1/object/public/'))
                    ? url.split('?')[0].replace('/storage/v1/object/public/', '/storage/v1/render/image/public/') + `?width=150&height=150&resize=cover&quality=80&v=${Date.now()}`
                    : `${url}?v=${Date.now()}`;
                opt.innerHTML = `<img src="${optUrl}" alt="Custom Avatar" style="border-radius:8px;">`;
                track.insertBefore(opt, track.firstChild);
            });

            // Deselect all presets
            track.querySelectorAll('.avatar-option:not([data-custom])').forEach(el => el.classList.remove('selected'));
        }

        // localStorage avatar gallery helpers
        function saveAvatarGallery(userId, urls) {
            try {
                localStorage.setItem(`subsoccer_avatar_gallery_${userId}`, JSON.stringify(urls));
            } catch(e) {}
        }
        function loadAvatarGallery(userId) {
            try {
                return JSON.parse(localStorage.getItem(`subsoccer_avatar_gallery_${userId}`)) || [];
            } catch(e) { return []; }
        }
        function addToAvatarGallery(userId, newUrl) {
            const gallery = loadAvatarGallery(userId);
            const cleanUrl = newUrl.split('?')[0];
            if (!gallery.some(u => u.includes(cleanUrl) || cleanUrl.includes(u))) {
                gallery.unshift(cleanUrl);
                saveAvatarGallery(userId, gallery);
            }
        }

        function injectSingleCustomAvatar(avatarUrl, track) {
            if (!avatarUrl || !track) return;
            const existing = track.querySelector('.avatar-option[data-custom="true"]');
            if (existing) return; // Already have one

            const opt = document.createElement('div');
            opt.className = 'avatar-option selected';
            opt.setAttribute('data-avatar', avatarUrl);
            opt.setAttribute('data-avatar-url', avatarUrl.split('?')[0]);
            opt.setAttribute('data-custom', 'true');
            opt.onclick = function() { selectAvatar(this); };
            opt.innerHTML = `<img src="${avatarUrl}" alt="My Avatar" style="border-radius:8px;">`;
            track.insertBefore(opt, track.firstChild);

            // Deselect presets
            track.querySelectorAll('.avatar-option:not([data-custom])').forEach(el => el.classList.remove('selected'));
        }

        // Avatar selection
        function selectAvatar(element) {
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            const newSrc = element.getAttribute('data-avatar');
            const isCustom = element.getAttribute('data-custom') === 'true';
            document.getElementById('selected-avatar-url').value = newSrc;
            document.getElementById('selected-avatar-b64').value = '';

            const photo = document.getElementById('pc-card-photo');
            const icon = document.getElementById('pc-card-icon');
            icon.style.display = 'none';
            photo.style.display = 'block';

            if (newSrc === 'ai-custom') {
                // Newly generated AI avatar (not yet saved)
                const img = element.querySelector('img');
                if (img) photo.src = img.src;
            } else if (isCustom || newSrc.startsWith('http')) {
                // Custom avatar from Storage history — use full URL
                photo.src = newSrc;
            } else {
                // Preset avatar
                photo.src = newSrc;
            }

            // Auto-save when an avatar is selected (if user is loaded)
            if (_currentPlayer && _currentPlayer.id) {
                // Small delay to allow UI to update (like the selected ring)
                setTimeout(() => {
                    saveProfile();
                }, 50);
            }
        }

        // ===== PRINT CARD GENERATOR (Topps 2.5" × 3.5" @ 300 DPI = 750×1050px) =====
        // Matches the web .pro-card design: gold border, carbon pattern, overlay info
        async function generatePrintCard() {
            const btn = document.getElementById('btn-print-card');
            const status = document.getElementById('print-card-status');
            if (!_currentPlayer) { status.textContent = 'No player data loaded'; return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:8px;"></i>GENERATING...';
            status.textContent = 'Rendering print-quality card...';

            try {
                // Ensure custom fonts are loaded before canvas rendering
                await document.fonts.ready;

                const W = 750, H = 1050; // 2.5" × 3.5" at 300 DPI
                const canvas = document.createElement('canvas');
                canvas.width = W;
                canvas.height = H;
                const ctx = canvas.getContext('2d');

                // Scale factor vs web card (280×392)
                const S = W / 280; // ~2.68x

                // --- CARD BACKGROUND (carbon fiber pattern like .pro-card-front) ---
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, W, H);

                // Carbon fiber crosshatch pattern
                ctx.fillStyle = 'rgba(26,26,26,0.8)';
                for (let y = 0; y < H; y += Math.round(4 * S)) {
                    for (let x = 0; x < W; x += Math.round(4 * S)) {
                        // Alternate pattern for crosshatch effect
                        const offset = (Math.floor(y / (4 * S)) % 2) * Math.round(2 * S);
                        ctx.fillRect(x + offset, y, Math.round(2 * S), Math.round(2 * S));
                    }
                }

                // Gold/amber border (like .pro-card border)
                const borderW = 2;
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.5)';
                ctx.lineWidth = borderW;
                roundRect(ctx, borderW / 2, borderW / 2, W - borderW, H - borderW, Math.round(2 * S));
                ctx.stroke();

                // Subtle inner shadow at top
                const topShadow = ctx.createLinearGradient(0, 0, 0, 80);
                topShadow.addColorStop(0, 'rgba(0,0,0,0.3)');
                topShadow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = topShadow;
                ctx.fillRect(0, 0, W, 80);

                // --- TOP BAR: PRO CARD // 2026 + Crown ---
                const topPad = Math.round(12 * S);
                const topSidePad = Math.round(15 * S);

                // PRO CARD text
                ctx.fillStyle = '#c41e2a';
                ctx.font = `800 ${Math.round(0.65 * S * 16)}px "Resolve", sans-serif`;
                ctx.textBaseline = 'top';
                ctx.textAlign = 'left';
                ctx.letterSpacing = '1px';
                ctx.fillText('PRO CARD // 2026', topSidePad, topPad);

                // Crown icon (right side)
                const crownSize = Math.round(22 * S);
                const crownR = crownSize / 2;
                const crownCX = W - topSidePad - crownR;
                const crownCY = topPad + Math.round(0.65 * S * 16) / 2;
                
                // Draw crown shape directly on background
                const cs = crownR * 0.7;
                ctx.fillStyle = '#c41e2a';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = Math.round(4 * S);
                ctx.shadowOffsetY = Math.round(2 * S);
                
                // Base line
                ctx.fillRect(crownCX - cs * 0.8, crownCY + cs * 0.5, cs * 1.6, cs * 0.2);

                // Spikes
                ctx.beginPath();
                ctx.moveTo(crownCX - cs * 0.8, crownCY + cs * 0.3); // base left
                ctx.lineTo(crownCX + cs * 0.8, crownCY + cs * 0.3); // base right
                ctx.lineTo(crownCX + cs * 1.0, crownCY - cs * 0.5); // right spike
                ctx.lineTo(crownCX + cs * 0.4, crownCY - cs * 0.1); // inner right
                ctx.lineTo(crownCX, crownCY - cs * 0.8);            // middle spike
                ctx.lineTo(crownCX - cs * 0.4, crownCY - cs * 0.1); // inner left
                ctx.lineTo(crownCX - cs * 1.0, crownCY - cs * 0.5); // left spike
                ctx.closePath();
                ctx.fill();
                
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // --- AVATAR PHOTO AREA ---
                // Web card: 225px of 392px height = ~57.4%
                const photoY = Math.round(34 * S); // after top bar
                const photoH = Math.round(225 * S);
                const photoX = 0;
                const photoW = W;

                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(photoX, photoY, photoW, photoH);

                // Top/bottom subtle borders on photo
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, photoY); ctx.lineTo(W, photoY);
                ctx.moveTo(0, photoY + photoH); ctx.lineTo(W, photoY + photoH);
                ctx.stroke();

                // Load and draw avatar (cover fit, top-center crop)
                const avatarUrl = _currentPlayer.avatar_url;
                if (avatarUrl) {
                    try {
                        const img = await loadImageCORS(avatarUrl);
                        let sx = 0, sy = 0, sw = img.width, sh = img.height;
                        const imgRatio = img.width / img.height;
                        const boxRatio = photoW / photoH;
                        if (imgRatio > boxRatio) {
                            sw = img.height * boxRatio;
                            sx = (img.width - sw) / 2;
                        } else {
                            sh = img.width / boxRatio;
                        }
                        ctx.drawImage(img, sx, sy, sw, sh, photoX, photoY, photoW, photoH);
                    } catch(e) {
                        console.warn('Avatar load failed for print card:', e);
                    }
                }

                // --- BOTTOM INFO AREA (overlays lower portion of photo + extends below) ---
                // Web card: padding 15px, content starts at photo bottom
                const infoY = photoY + photoH;
                const infoH = H - infoY;
                const infoPad = Math.round(15 * S);

                // Info background
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, infoY, W, infoH);

                // Carbon pattern on info area too
                ctx.fillStyle = 'rgba(26,26,26,0.6)';
                for (let y = infoY; y < H; y += Math.round(4 * S)) {
                    for (let x = 0; x < W; x += Math.round(4 * S)) {
                        const offset = (Math.floor((y - infoY) / (4 * S)) % 2) * Math.round(2 * S);
                        ctx.fillRect(x + offset, y, Math.round(2 * S), Math.round(2 * S));
                    }
                }

                // --- Row 1: Location (left) + Logo (right) ---
                const row1Y = infoY + Math.round(12 * S);

                // Location
                const location = _currentPlayer.team_data?.name || (_currentPlayer.country || 'LOCAL ARENA').toUpperCase();
                ctx.fillStyle = '#c41e2a';
                ctx.font = `800 ${Math.round(0.75 * S * 16)}px "Resolve", sans-serif`;
                ctx.textBaseline = 'top';
                ctx.textAlign = 'left';
                ctx.fillText('📍 ' + location, infoPad, row1Y);

                // Subsoccer logo (try image, fallback text)
                try {
                    const logoImg = await loadImageCORS(window.location.origin + '/subsoccer_logo.svg');
                    const logoH = Math.round(18 * S);
                    const logoW = logoH * (logoImg.width / logoImg.height);
                    ctx.drawImage(logoImg, W - infoPad - logoW, row1Y, logoW, logoH);
                } catch(e) {
                    ctx.fillStyle = '#c41e2a';
                    ctx.font = `bold ${Math.round(14 * S)}px "Resolve", sans-serif`;
                    ctx.textAlign = 'right';
                    ctx.fillText('SUBSOCCER', W - infoPad, row1Y + 2);
                    ctx.textAlign = 'left';
                }

                // --- Row 2: Player Name (big) ---
                const playerName = (_currentPlayer.username || 'PLAYER').toUpperCase();
                const nameY = row1Y + Math.round(18 * S);
                ctx.fillStyle = '#ffffff';
                // Web card: 2.6rem at 280px = proportionally smaller to avoid overlap
                ctx.font = `${Math.round(2.2 * S * 16)}px "SubsoccerLogo", sans-serif`;
                ctx.textBaseline = 'top';
                ctx.textAlign = 'left';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = Math.round(4 * S);
                ctx.shadowOffsetY = Math.round(2 * S);
                ctx.fillText(playerName, infoPad, nameY, W - infoPad * 2);
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // --- Row 3: ELO badge (left) + Win Ratio (right), pushed to bottom ---
                const elo = _currentPlayer.elo || 1500;
                const wins = _currentPlayer.wins || 0;
                const losses = _currentPlayer.losses || 0;
                const matches = wins + losses;
                const ratio = matches > 0 ? Math.round((wins / matches) * 100) : 0;
                // --- BOTTOM ROW: All elements share the same bottom edge ---
                // FLIP CARD pill defines the anchor
                const pillCenterY = H - Math.round(22 * S);
                const pillH = Math.round(18 * S);
                const bottomEdge = pillCenterY + pillH / 2; // shared bottom line

                // FLIP CARD pill (centered)
                const pillW = Math.round(130 * S);
                const pillX = (W - pillW) / 2;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                roundRect(ctx, pillX, bottomEdge - pillH, pillW, pillH, pillH / 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = `${Math.round(0.6 * S * 16)}px "Resolve", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('↻  FLIP CARD', W / 2, bottomEdge - pillH / 2);

                // ELO badge (left) — bottom aligned with bottomEdge
                const eloW = Math.round(10 * S * 5.5);
                const eloH = Math.round(28 * S);
                const eloY = bottomEdge - eloH;
                roundRect(ctx, infoPad, eloY, eloW, eloH, Math.round(6 * S), '#c41e2a');
                ctx.fillStyle = '#fff';
                ctx.font = `${Math.round(1.4 * S * 16)}px "SubsoccerLogo", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(elo.toString(), infoPad + eloW / 2, eloY + eloH / 2 + 2);

                // Win Ratio (right) — "45%" bottom aligned with bottomEdge
                const winRatioNumFontSize = Math.round(1.4 * S * 16);
                const winRatioLabelFontSize = Math.round(0.65 * S * 16);
                const winRatioNumY = bottomEdge - winRatioNumFontSize; // number top
                const winRatioLabelY = winRatioNumY - Math.round(4 * S) - winRatioLabelFontSize; // label top

                ctx.textAlign = 'right';
                ctx.fillStyle = '#888';
                ctx.font = `bold ${winRatioLabelFontSize}px "Resolve", sans-serif`;
                ctx.textBaseline = 'top';
                ctx.fillText('WIN RATIO', W - infoPad, winRatioLabelY);
                ctx.fillStyle = '#fff';
                ctx.font = `${winRatioNumFontSize}px "SubsoccerLogo", sans-serif`;
                ctx.fillText(ratio + '%', W - infoPad, winRatioNumY);
                ctx.textAlign = 'left';

                // --- DOWNLOAD FRONT SIDE (-1.png) ---
                await new Promise(resolve => {
                    canvas.toBlob(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `subsoccer-pro-card-${playerName.toLowerCase()}-1.png`;
                        a.click();
                        URL.revokeObjectURL(url);
                        resolve();
                    }, 'image/png');
                });

                // Temporarily disable back side download for all devices.
                // This logic is kept here for when we implement the physical printed card order flow.
                const downloadBackSide = false;

                if (!downloadBackSide) {
                    status.textContent = '✅ Print card downloaded!';
                    setTimeout(() => { status.textContent = ''; }, 3000);
                } else {
                    status.textContent = 'Rendering back side...';

                    // --- GENERATE BACK SIDE (-2.png) ---
                ctx.clearRect(0, 0, W, H);
                
                // Background
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, W, H);

                // Carbon fiber crosshatch pattern
                ctx.fillStyle = 'rgba(26,26,26,0.8)';
                for (let y = 0; y < H; y += Math.round(4 * S)) {
                    for (let x = 0; x < W; x += Math.round(4 * S)) {
                        const offset = (Math.floor(y / (4 * S)) % 2) * Math.round(2 * S);
                        ctx.fillRect(x + offset, y, Math.round(2 * S), Math.round(2 * S));
                    }
                }

                // Gold border
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.5)';
                ctx.lineWidth = borderW;
                roundRect(ctx, borderW / 2, borderW / 2, W - borderW, H - borderW, Math.round(2 * S));
                ctx.stroke();

                // Dossier Header (Top)
                const dossierPadY = Math.round(20 * S);
                const dossierTitleFontSize = Math.round(1.1 * S * 16);
                const dossierTierFontSize = Math.round(0.75 * S * 16);
                
                // We'll draw the header box at the top
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                const headerH = dossierPadY + dossierTitleFontSize + Math.round(5 * S) + dossierTierFontSize + Math.round(15 * S);
                ctx.fillRect(infoPad, infoPad, W - infoPad * 2, headerH);
                
                // Bottom border of header
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(infoPad, infoPad + headerH);
                ctx.lineTo(W - infoPad, infoPad + headerH);
                ctx.stroke();

                ctx.fillStyle = '#c41e2a';
                ctx.font = `${dossierTitleFontSize}px "SubsoccerLogo", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText('PLAYER DOSSIER', W / 2, infoPad + dossierPadY);
                
                ctx.fillStyle = '#fff';
                ctx.font = `${dossierTierFontSize}px "Resolve", sans-serif`;
                ctx.fillText('NEW RECRUIT', W / 2, infoPad + dossierPadY + dossierTitleFontSize + Math.round(5 * S));

                // Center the rest of the stats vertically in the remaining space
                const remainingSpaceY = infoPad + headerH;
                const remainingSpaceH = H - remainingSpaceY - Math.round(40 * S); // Leave room for FLIP CARD
                
                // Calculate grid total height
                const cellH = Math.round(70 * S);
                const gap = Math.round(10 * S);
                const totalStatsH = cellH * 2 + gap + cellH + Math.round(10 * S); // 2 rows + 1 row for tourneys
                
                // Start Y to vertically center the stats block
                const statsStartY = remainingSpaceY + (remainingSpaceH - totalStatsH) / 2;

                // 2x2 Grid
                const gridY = statsStartY;
                const gridW = W - infoPad * 2;
                const cellW = (gridW - gap) / 2;

                const renderCell = (x, y, label, val, isSubsoccerFont) => {
                    ctx.fillStyle = 'rgba(255,255,255,0.03)';
                    roundRect(ctx, x, y, cellW, cellH, Math.round(4 * S));
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                    ctx.stroke();

                    ctx.fillStyle = '#888';
                    ctx.font = `${Math.round(0.6 * S * 16)}px "Resolve", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillText(label, x + cellW / 2, y + Math.round(12 * S));

                    ctx.fillStyle = '#fff';
                    if (isSubsoccerFont) {
                        ctx.font = `${Math.round(1.4 * S * 16)}px "SubsoccerLogo", sans-serif`;
                    } else {
                        ctx.font = `bold ${Math.round(1.2 * S * 16)}px "Resolve", sans-serif`;
                    }
                    ctx.fillText(val, x + cellW / 2, y + Math.round(34 * S));
                };

                renderCell(infoPad, gridY, 'GLOBAL RATING', elo.toString(), true);
                renderCell(infoPad + cellW + gap, gridY, 'WIN RATIO', ratio + '%', true);
                renderCell(infoPad, gridY + cellH + gap, 'MATCHES', matches.toString(), false);
                renderCell(infoPad + cellW + gap, gridY + cellH + gap, 'WINS', wins.toString(), false);

                // Tournaments Won Box
                const tournY = gridY + (cellH + gap) * 2;
                ctx.fillStyle = 'rgba(196,30,42,0.1)';
                roundRect(ctx, infoPad, tournY, gridW, cellH, Math.round(4 * S));
                ctx.fill();
                ctx.strokeStyle = 'rgba(196,30,42,0.3)';
                ctx.stroke();

                ctx.fillStyle = '#c41e2a';
                ctx.font = `${Math.round(0.6 * S * 16)}px "Resolve", sans-serif`;
                ctx.fillText('TOURNAMENTS WON', W / 2, tournY + Math.round(12 * S));
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${Math.round(1.2 * S * 16)}px "Resolve", sans-serif`;
                const tourneys = _currentPlayer.tournaments_won || 0;
                ctx.fillText(tourneys.toString(), W / 2, tournY + Math.round(34 * S));

                // Flip Card Text (anchored to bottom)
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = `${Math.round(0.65 * S * 16)}px "Resolve", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('↻  FLIP CARD', W / 2, H - Math.round(15 * S));

                // --- DOWNLOAD BACK SIDE (-2.png) ---
                await new Promise(resolve => {
                    canvas.toBlob(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `subsoccer-pro-card-${playerName.toLowerCase()}-2.png`;
                        a.click();
                        URL.revokeObjectURL(url);
                        resolve();
                    }, 'image/png');
                });

                status.textContent = '✅ Both sides downloaded!';
                setTimeout(() => { status.textContent = ''; }, 3000);
                } // end if(downloadBackSide)

            } catch(err) {
                console.error('Print card generation failed:', err);
                status.textContent = '❌ Generation failed: ' + err.message;
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-download" style="margin-right:8px;"></i>DOWNLOAD PRINT CARD';
        }

        // Helper: load image with CORS
        function loadImageCORS(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = reject;
                // Add cache buster for CORS
                const separator = url.includes('?') ? '&' : '?';
                img.src = url + separator + 'v=' + Date.now();
            });
        }

        // Helper: rounded rectangle
        function roundRect(ctx, x, y, w, h, r, fill) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            if (fill) { ctx.fillStyle = fill; ctx.fill(); }
        }

        /**
         * Fetches an image from a URL and compresses it to a 512x512 JPEG blob
         */
        async function compressImageUrl(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxDim = 512;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxDim) {
                            height = Math.round((height * maxDim) / width);
                            width = maxDim;
                        }
                    } else {
                        if (height > maxDim) {
                            width = Math.round((width * maxDim) / height);
                            height = maxDim;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob(
                        (blob) => {
                            if (blob) {
                                resolve(blob);
                            } else {
                                reject(new Error('Canvas toBlob returned null'));
                            }
                        },
                        'image/jpeg',
                        0.8
                    );
                };
                img.onerror = (err) => reject(err);
                const separator = url.includes('?') ? '&' : '?';
                img.src = url + separator + 'v=' + Date.now();
            });
        }

                            'select': '*'
                        });
                        if (players && players[0]) {
                            applyPlayerData(players[0]);
                            localStorage.setItem('subsoccer-user', JSON.stringify(players[0]));
                            loadCountries();
                            console.log('✅ Profile loaded via session:', players[0].username);
                            return;
                        }
                    }
                } catch(e) {
                    console.warn('Session load failed:', e.message);
                }
                console.warn('⚠️ No profile data available — showing default card');
            }
        })();

        async function exportPrintableCard() {
            try {
                const btn = document.getElementById('btn-download-card');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="color:#000;"></i> GENERATING TOPPS CARD...';

                // Ensure perfect 2.5x3.5" (750x1050 px @ 300DPI) format
                const cardFront = document.querySelector('.pro-card-front');
                const scaleTarget = 750 / 280; // Scale from 280px CSS width to 750px high-res width
                
                const canvas = await html2canvas(cardFront, {
                    scale: scaleTarget,
                    useCORS: true,
                    backgroundColor: '#0a0a0a',
                    logging: false
                });

                const dataUrl = canvas.toDataURL('image/png', 1.0);
                
                // Prompt download
                const link = document.createElement('a');
                link.download = 'subsoccer-pro-card.png';
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                btn.innerHTML = originalHtml;
            } catch (error) {
                console.error("Error generating card:", error);
                alert("Generation failed. Please try on a desktop browser.");
            }
        }

        // Initialize Dark Mode based on storage/url
        (function() {
            const params = new URLSearchParams(window.location.search);
            const fromUrl = params.get('dark') === '1';
            const fromStorage = localStorage.getItem('subsoccer-dark-mode') === '1';
            if (fromUrl || fromStorage) {
                document.body.classList.add('dark-mode');
                if (fromUrl) localStorage.setItem('subsoccer-dark-mode', '1');
            }
        })();
    </script>
