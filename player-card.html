<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Subsoccer - Player Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=4">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Override global Resolve !important from style.css line 1259 */
        .subsoccer-font {
            font-family: 'Subsoccer', 'SubsoccerLogo', sans-serif !important;
            font-weight: normal !important;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: #111111;
            
            color: #ffffff;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        /* ========================================
           HEADER
           ======================================== */
        .pc-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: #111111;
            border-bottom: 1px solid #333333;
            padding: 15px 20px;
            padding-top: calc(15px + env(safe-area-inset-top, 20px));
            position: relative;
            z-index: 99;
        }
        
        .pc-back-btn {
            background: none;
            border: none;
            color: #ffffff;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .pc-header-title {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .pc-settings-btn {
            background: none;
            border: none;
            color: #ffffff;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.05rem;
        }

        /* ========================================
           CARD SHOWCASE (stadion-tausta)
           ======================================== */
        .pc-showcase {
            width: 100%;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            position: relative;
            padding: 20px 0 0;
            background: transparent;
        }

        .pc-spotlight {
            display: none;
        }

        .pc-title-player {
            color: #ffffff;
        }

        .pro-card-flipper {
            box-shadow: none !important;
        }

        /* ========================================
           STATS DASHBOARD (alla kortin)
           ======================================== */
        .pc-stats {
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
            padding: 0 0 15px;
        }

        .pc-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 15px;
        }

        .pc-stat-card {
            background: #222222;
            border: none;
            border-radius: 2px;
            padding: 10px 4px;
            text-align: center;
        }

        .pc-stat-value {
            font-family: 'Resolve', sans-serif !important;
            font-weight: bold !important;
            font-size: 1.2rem;
            color: #ffffff;
            line-height: 1;
        }

        .pc-stat-label {
            font-family: 'Resolve', sans-serif;
            font-size: 0.5rem;
            color: #666;
            letter-spacing: 1px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* ========================================
           ACTION BUTTONS
           ======================================== */
        .pc-actions {
            max-width: 400px;
            margin: 0 auto;
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pc-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #c41e2a !important;
            border: none !important;
            border-radius: 2px;
            padding: 14px 20px;
            color: #ffffff !important;
            font-family: 'Resolve', sans-serif;
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
            text-transform: capitalize;
        }
        .pc-action-btn:active { transform: scale(0.97); }
        
        .pc-action-btn i {
            color: #ffffff !important;
        }

        .pc-action-btn .pc-action-arrow {
            display: none;
        }

        /* Owner-only button */
        .pc-action-btn.owner-only {
            border-color: rgba(196,30,42,0.3);
        }

        /* ========================================
           NOT LOGGED IN STATE
           ======================================== */
        .pc-login-prompt {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px 20px;
            text-align: center;
        }

        .pc-login-title {
            font-family: 'SubsoccerLogo', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .pc-login-subtitle {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .pc-login-btn {
            width: 100%;
            background: #c41e2a;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 2px;
            font-family: 'SubsoccerLogo', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .pc-register-btn {
            width: 100%;
            background: transparent;
            color: #c41e2a;
            border: 1px solid rgba(196,30,42,0.4);
            padding: 16px;
            border-radius: 2px;
            font-family: 'SubsoccerLogo', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .pc-guest-link {
            display: block;
            margin-top: 15px;
            color: #444;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
        }

        /* ========================================
           EDIT PROFILE PANEL
           ======================================== */
        .pc-edit-panel {
            max-width: 400px;
            margin: 0 auto;
            padding: 0 20px;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            opacity: 0;
        }
        .pc-edit-panel.open {
            max-height: 600px;
            opacity: 1;
        }

        .pc-edit-card {
            background: #222222;
            border: 1px solid #444444;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .pc-edit-label {
            font-family: 'Resolve', sans-serif;
            font-size: 0.6rem;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .pc-edit-input {
            width: 100%;
            background: #111111;
            border: 1px solid #444444;
            border-radius: 6px;
            color: #ffffff;
            padding: 12px;
            font-family: 'Resolve', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .pc-edit-input:focus { border-color: #c41e2a; }

        .pc-edit-select {
            width: 100%;
            background: #111111;
            border: 1px solid #444444;
            border-radius: 6px;
            color: #ffffff;
            padding: 12px;
            font-family: 'Resolve', sans-serif;
            font-size: 0.85rem;
            outline: none;
            margin-bottom: 12px;
            -webkit-appearance: none;
            transition: border-color 0.2s;
        }
        .pc-edit-select:focus { border-color: #c41e2a; }

        .pc-edit-file-label {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #111111;
            border: 1px dashed #444444;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            color: #666;
            font-family: 'Resolve', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-bottom: 12px;
            transition: border-color 0.2s, color 0.2s;
        }
        .pc-edit-file-label:hover { border-color: #c41e2a; color: #c41e2a; }

        .pc-save-btn {
            width: 100%;
            background: linear-gradient(135deg, #c41e2a 0%, #a01520 100%);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 2px;
            font-family: 'Resolve', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(196, 30, 42, 0.3);
        }
        .pc-save-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(196, 30, 42, 0.4); }
        .pc-save-btn:active { transform: scale(0.98); }
        .pc-save-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .pc-save-status {
            text-align: center;
            font-family: 'Resolve', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 1px;
            margin-top: 8px;
            min-height: 16px;
            color: #888;
            transition: color 0.3s;
        }

        .pc-logout-btn {
            width: 100%;
            background: transparent;
            color: #ffffff;
            border: 1px solid #444444;
            padding: 12px;
            border-radius: 2px;
            font-family: 'Resolve', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .pc-logout-btn:hover {
            background: rgba(0,0,0,0.05);
        }

        .pc-edit-msg {
            text-align: center;
            font-family: 'Resolve', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 1px;
            margin-top: 8px;
            min-height: 18px;
        }

        /* ========================================
           DARK MODE OVERRIDES
           ======================================== */
        body.dark-mode {
            background: #111111;
            color: #ffffff;
        }

        body.dark-mode .pc-title-player {
            color: #ffffff !important;
        }

        body.dark-mode .pc-header {
            background: #111111;
            border-bottom-color: #333333;
        }

        body.dark-mode .pc-back-btn,
        body.dark-mode .pc-settings-btn {
            color: #ffffff;
        }

        body.dark-mode .pc-stat-card {
            background: #222222;
        }

        body.dark-mode .pc-stat-value {
            color: #ffffff;
        }

        body.dark-mode .pc-stat-label {
            color: #aaaaaa;
        }

        body.dark-mode .pc-login-subtitle {
            color: #aaaaaa;
        }

        body.dark-mode .pc-guest-link {
            color: #aaaaaa;
        }

        body.dark-mode .pc-edit-card {
            background: #222222;
            border-color: #444444;
        }

        body.dark-mode .pc-edit-input,
        body.dark-mode .pc-edit-select {
            background: #111111;
            border-color: #444444;
            color: #ffffff;
        }

        body.dark-mode .pc-edit-file-label {
            background: #111111;
            border-color: #444444;
            color: #aaaaaa;
        }

        body.dark-mode .pc-logout-btn {
            color: #ffffff;
            border-color: #444444;
        }

        body.dark-mode .pc-logout-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        body.dark-mode .pc-edit-label {
            color: #aaaaaa;
        }

        /* Avatar Studio Sections */
        .studio-section {
            padding: 0 20px;
            max-width: 420px;
            margin: 0 auto;
        }
        .studio-section-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .studio-section-label {
            font-family: 'Resolve', sans-serif;
            font-size: 0.6rem;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .studio-section-label i {
            color: #c41e2a;
            font-size: 0.7rem;
        }
        
        /* Avatar Carousel */
        .avatar-carousel-wrap {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .avatar-carousel-track-outer {
            flex: 1;
            overflow: hidden;
            border-radius: 8px;
        }
        .avatar-carousel-track {
            display: flex;
            gap: 10px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .avatar-option {
            flex: 0 0 calc((100% - 20px) / 3);
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: visible;
            border: 3px solid transparent;
            cursor: pointer;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
            background: #1a1a1a;
            position: relative;
        }
        .avatar-option img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            border-radius: 9px;
        }
        .avatar-option.selected {
            border-color: #c41e2a;
            box-shadow: 0 0 16px rgba(196, 30, 42, 0.4), 0 0 40px rgba(196, 30, 42, 0.15);
            transform: scale(1.05);
        }
        .avatar-option.selected::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            bottom: -4px; right: -4px;
            width: 22px; height: 22px;
            background: #c41e2a;
            color: #fff;
            border-radius: 50%;
            font-size: 0.55rem;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #111;
            z-index: 5;
            animation: checkPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes checkPop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .avatar-carousel-btn {
            flex-shrink: 0;
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1px solid #333;
            background: rgba(255,255,255,0.04);
            color: #888;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .avatar-carousel-btn:hover { background: rgba(196,30,42,0.15); color: #fff; border-color: rgba(196,30,42,0.3); }
        .avatar-carousel-btn:disabled { opacity: 0.2; pointer-events: none; }

        /* AI Selfie Block */
        .ai-hero {
            display: flex; flex-direction: column; gap: 10px;
        }
        .ai-upload-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2px;
            padding: 16px; cursor: pointer;
            font-family: 'Resolve', sans-serif; font-size: 0.7rem; font-weight: bold;
            color: #aaa; letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.25s;
        }
        .ai-upload-btn:hover { border-color: rgba(196,30,42,0.4); color: #fff; background: rgba(196,30,42,0.05); }
        .ai-upload-btn.ready {
            border-color: rgba(76,175,80,0.5);
            color: #4CAF50;
            background: rgba(76,175,80,0.05);
        }
        .ai-generate-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: linear-gradient(135deg, #c41e2a 0%, #a01520 100%);
            border: none;
            border-radius: 2px;
            padding: 16px;
            color: #fff;
            font-family: 'Resolve', sans-serif; font-size: 0.85rem; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(196, 30, 42, 0.25);
        }
        .ai-generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(196, 30, 42, 0.35); }
        .ai-generate-btn:active { transform: scale(0.98); }
        .ai-generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Accordion Profile Details */
        .profile-accordion {
            max-width: 420px;
            margin: 0 auto 30px;
            padding: 0 20px;
        }
        .profile-accordion-btn {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; color: #888;
            font-family: 'Resolve', sans-serif; font-size: 0.75rem; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.2s;
        }
        .profile-accordion-btn:hover { border-color: rgba(255,255,255,0.12); color: #aaa; }
        .profile-accordion-btn .chevron { transition: transform 0.3s; color: #c41e2a; }
        .profile-accordion-btn.open .chevron { transform: rotate(180deg); }
        .profile-accordion-btn.open { border-radius: 2px 2px 0 0; border-bottom-color: transparent; }
        .profile-accordion-body {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-top: none;
            border-radius: 0 0 2px 2px;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease;
        }
        .profile-accordion-body.open { max-height: 500px; opacity: 1; }
        .profile-accordion-inner {
            padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 10px;
        }

        /* AI Generation Overlay */
        .ai-gen-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .ai-gen-overlay.active { display: flex; }
        .ai-gen-icon {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c41e2a, #ff4757);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff;
            animation: ai-gen-pulse 2s ease-in-out infinite;
        }
        @keyframes ai-gen-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(196, 30, 42, 0.4); }
            50% { transform: scale(1.08); box-shadow: 0 0 30px 10px rgba(196, 30, 42, 0.2); }
        }
        .ai-gen-title {
            font-family: 'Resolve', sans-serif;
            font-size: 1.1rem; font-weight: bold; color: #fff;
            letter-spacing: 3px; text-transform: uppercase;
        }
        .ai-gen-status {
            font-family: 'Resolve', sans-serif;
            font-size: 0.7rem; color: #888;
            letter-spacing: 2px; text-transform: uppercase;
            min-height: 20px;
            transition: opacity 0.3s;
        }
        .ai-gen-progress-wrap {
            width: 260px; height: 4px;
            background: #222; border-radius: 2px;
            overflow: hidden;
        }
        .ai-gen-progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #c41e2a, #ff4757, #c41e2a);
            background-size: 200% 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
            animation: ai-gen-shimmer 1.5s linear infinite;
        }
        @keyframes ai-gen-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .ai-gen-timer {
            font-family: 'Resolve', sans-serif;
            font-size: 0.6rem; color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>



    <!-- HEADER -->
    <div class="pc-header">
        <button class="pc-back-btn" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="pc-header-title">
            <img src="subsoccer_logo.svg" style="height: 24px; cursor: pointer;" alt="Subsoccer" onclick="window.location.href='https://subsoccer.com';">
        </div>
        <button class="pc-settings-btn" onclick="toggleEditPanel()">
            <i class="fas fa-cog"></i>
        </button>
    </div>

    <!-- CARD SHOWCASE -->
    <div class="pc-showcase">
        <div class="subsoccer-font" style="font-size: 3.2rem; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0; text-align: center; line-height: 1;">
            <span class="subsoccer-font pc-title-player">PLAYER</span> <span class="subsoccer-font" style="color: #c41e2a;">CARD</span>
        </div>
        <div class="pc-spotlight"></div>
        
        <!-- Pro Card (uses existing CSS from style.css) -->
        <div class="pro-card" onclick="this.classList.toggle('flipped')" style="z-index: 10;">
            <div class="pro-card-flipper">
                <!-- FRONT SIDE -->
                <div class="pro-card-front">
                    <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 6px 15px; z-index: 2;">
                        <div style="font-size: 0.65rem; color: #c41e2a; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">
                            PRO CARD // 2026</div>
                        <div style="display: flex; gap: 5px;">
                            <div style="background: #111; color: #c41e2a; width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.7rem; box-shadow: 0 2px 5px rgba(0,0,0,0.5);">
                                <i class="fa-solid fa-crown"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Photo area -->
                    <div style="width: 100%; height: 225px; flex-shrink: 0; background: #1a1a1a; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; z-index: 2; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <i class="fa-solid fa-user-astronaut" id="pc-card-icon" style="font-size: 3rem; color: #333;"></i>
                        <img src="" id="pc-card-photo" alt="Player Avatar" crossorigin="anonymous" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; display: none;">
                    </div>

                    <!-- Bottom info -->

    <script>
        const SUPA_URL = 'https://ujxmmrsmdwrgcwatdhvx.supabase.co';
        const SUPA_KEY = 'sb_publishable_hMb0ml4fl2A9GLqm28gemg_CAE5vY8t';

        let _sb = null;
        let _currentPlayer = null;
        let _selectedAvatarFile = null;

        function getSb() {
            if (!_sb) {
                _sb = supabase.createClient(SUPA_URL, SUPA_KEY);
            }
            return _sb;
        }

        // Get fresh JWT token via Supabase client (auto-refreshes)
        async function getFreshToken() {
            try {
                const sb = getSb();
                const { data: { session } } = await sb.auth.getSession();
                if (session?.access_token) return session.access_token;
            } catch(e) {
                console.warn('getFreshToken error:', e.message);
            }
            return getUserTokenFromStorage();
        }

        // Read token from localStorage without refreshing (sync helper)
        function getUserTokenFromStorage() {
            try {
                const keys = Object.keys(localStorage).filter(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
                for (const key of keys) {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data?.access_token) return data.access_token;
                }
            } catch(e) {}
            return null;
        }

        // Legacy sync alias (used by loadCustomAvatarHistory etc)
        function getUserToken() {
            return getUserTokenFromStorage();
        }

        // Direct REST API helper — bypasses Supabase JS client's auth layer
        async function directQuery(method, table, params = {}, body = null) {
            const url = new URL(`${SUPA_URL}/rest/v1/${table}`);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            
            // Use fresh JWT for write operations (PATCH/POST), anon key for reads
            const token = (method !== 'GET') ? (await getFreshToken() || SUPA_KEY) : SUPA_KEY;
            
            const opts = {
                method: method,
                headers: {
                    'apikey': SUPA_KEY,
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                }
            };
            if (body) opts.body = JSON.stringify(body);
            
            const res = await fetch(url.toString(), opts);
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`DB ${method} failed (${res.status}): ${errText}`);
            }
            return await res.json();
        }

        function applyPlayerData(player) {
            if (!player) return;
            _currentPlayer = player;
            const name = player.username || 'PLAYER';
            const elo = player.elo || 1500;
            const wins = player.wins || 0;
            const losses = player.losses || 0;
            const matches = wins + losses;
            const ratio = matches > 0 ? Math.round((wins / matches) * 100) : 0;

            document.getElementById('pc-card-name').innerText = name;
            document.getElementById('pc-card-elo').innerText = elo;
            document.getElementById('pc-card-winratio').innerText = ratio + '%';

            if (player.avatar_url) {
                const photo = document.getElementById('pc-card-photo');
                photo.src = player.avatar_url;
                photo.style.display = 'block';
                document.getElementById('pc-card-icon').style.display = 'none';

                // Check if current avatar is a preset or custom
                const isPreset = player.avatar_url.includes('avatar-human-');
                const track = document.getElementById('avatar-selection');
                
                if (!isPreset && track) {
                    // Load ALL custom avatars from Storage (async, non-blocking)
                    loadCustomAvatarHistory(player).then(() => {
                        // Ensure current avatar is selected after history loads
                        const currentOpt = track.querySelector(`.avatar-option[data-avatar-url="${player.avatar_url.split('?')[0]}"]`);
                        if (currentOpt) {
                            track.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                            currentOpt.classList.add('selected');
                        }
                        updateCarouselButtons();
                    });
                    document.getElementById('selected-avatar-url').value = player.avatar_url;
                } else {
                    // Preset avatar — select matching option
                    document.querySelectorAll('.avatar-option').forEach(el => {
                        if (player.avatar_url.includes(el.getAttribute('data-avatar'))) {
                            el.classList.add('selected');
                            document.getElementById('selected-avatar-url').value = el.getAttribute('data-avatar');
                        } else {
                            el.classList.remove('selected');
                        }
                    });
                }
            }

            // Show/hide remove avatar link
            const removeWrap = document.getElementById('remove-avatar-wrap');
            if (removeWrap) removeWrap.style.display = player.avatar_url ? 'block' : 'none';

            if (player.team_data && player.team_data.name) {
                document.getElementById('pc-card-location').innerText = player.team_data.name;
            } else if (player.country) {
                document.getElementById('pc-card-location').innerText = player.country.toUpperCase();
            }

            document.getElementById('pc-back-elo').innerText = elo;
            document.getElementById('pc-back-ratio').innerText = ratio + '%';
            document.getElementById('pc-back-matches').innerText = matches;
            document.getElementById('pc-back-wins').innerText = wins;
            document.getElementById('pc-back-tourneys').innerText = (player.tournaments_won || 0);

            const tier = elo >= 1800 ? 'LEGEND' : elo >= 1500 ? 'PRO PLAYER' : elo >= 1300 ? 'CHALLENGER' : 'ROOKIE';
            document.getElementById('pc-card-tier').innerText = tier;

            if (player.is_owner || player.is_admin) {
                const modBtn = document.getElementById('pc-mod-btn');
                if(modBtn) modBtn.style.display = 'block';
            }

            // Pre-fill edit form
            document.getElementById('pc-edit-name').value = name;
            if (player.country) {
                setTimeout(() => {
                    const sel = document.getElementById('pc-edit-country');
                    sel.value = player.country;
                }, 500);
            }
        }

        // Toggle accordion
        function toggleProfileAccordion() {
            const btn = document.getElementById('profile-accordion-btn');
            const body = document.getElementById('profile-accordion-body');
            btn.classList.toggle('open');
            body.classList.toggle('open');
            if(body.classList.contains('open')) {
                setTimeout(() => body.scrollIntoView({behavior: 'smooth', block: 'end'}), 200);
            }
        }

        // Avatar carousel logic
        let _carouselIndex = 0;
        function avatarCarouselStep(dir) {
            const track = document.getElementById('avatar-selection');
            const items = track.querySelectorAll('.avatar-option');
            const total = items.length;
            const visible = 3;
            const max = Math.max(0, total - visible);
            _carouselIndex = Math.max(0, Math.min(_carouselIndex + dir, max));

            const itemW = items[0].offsetWidth + 12; // 12px gap
            track.style.transform = `translateX(-${_carouselIndex * itemW}px)`;

            updateCarouselButtons();
        }

        function updateCarouselButtons() {
            const track = document.getElementById('avatar-selection');
            const items = track.querySelectorAll('.avatar-option');
            const total = items.length;
            const visible = 3;
            const max = Math.max(0, total - visible);
            document.getElementById('avatar-prev').disabled = _carouselIndex === 0;
            document.getElementById('avatar-next').disabled = _carouselIndex >= max;
        }

        // Load all custom avatars from Supabase Storage for the user
        let _avatarHistoryLoaded = false;
        async function loadCustomAvatarHistory(player) {
            if (!player?.id) return;
            if (_avatarHistoryLoaded) return; // Already loaded, skip
            const track = document.getElementById('avatar-selection');
            if (!track) return;

            // Remove any previously injected custom items
            track.querySelectorAll('.avatar-option[data-custom="true"]').forEach(el => el.remove());

            const currentAvatarBase = player.avatar_url ? player.avatar_url.split('?')[0] : '';
            
            // 1. INSTANT: show from localStorage gallery first (no network wait)
            let avatarUrls = loadAvatarGallery(player.id);
            if (avatarUrls.length > 0) {
                injectAvatarUrls(avatarUrls, currentAvatarBase, track);
                _avatarHistoryLoaded = true;
            }

            // 2. BACKGROUND: refresh from Storage API (may add new entries)
            try {
                // List all files in avatars/ folder matching this user's ID (read-only, anon key is enough)
                const token = SUPA_KEY;
                const listRes = await fetch(`${SUPA_URL}/storage/v1/object/list/event-images`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPA_KEY,
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prefix: 'avatars/',
                        search: `${player.id}_ai_`,
                        limit: 20,
                        offset: 0,
                        sortBy: { column: 'created_at', order: 'desc' }
                    })
                });

                if (listRes.ok) {
                    const files = await listRes.json();
                    if (files && files.length > 0) {
                        const storageUrls = files.map(f => `${SUPA_URL}/storage/v1/object/public/event-images/avatars/${f.name}`);
                        saveAvatarGallery(player.id, storageUrls);
                        
                        // Only re-inject if Storage has different/more items than localStorage
                        if (storageUrls.length !== avatarUrls.length) {
                            track.querySelectorAll('.avatar-option[data-custom="true"]').forEach(el => el.remove());
                            avatarUrls = storageUrls;
                            injectAvatarUrls(avatarUrls, currentAvatarBase, track);
                        }
                    }
                }
            } catch(e) {
                console.warn('Storage list error:', e.message);
            }

            // If nothing loaded yet, show current avatar as single item
            if (!_avatarHistoryLoaded && player.avatar_url && !player.avatar_url.includes('avatar-human-')) {
                avatarUrls = [player.avatar_url.split('?')[0]];
                injectAvatarUrls(avatarUrls, currentAvatarBase, track);
            }
            _avatarHistoryLoaded = true;
        }

        // Inject avatar URLs into carousel
        function injectAvatarUrls(urls, currentAvatarBase, track) {
            // Ensure current avatar is in the list
            if (currentAvatarBase) {
                const hasCurrentBase = urls.some(u => u.includes(currentAvatarBase) || currentAvatarBase.includes(u));
                if (!hasCurrentBase) {
                    urls = [currentAvatarBase, ...urls];
                }
            }

            // Reverse so prepend gives newest-first
            const reversedUrls = [...urls].reverse();
            reversedUrls.forEach(url => {
                const isSelected = currentAvatarBase && (url.includes(currentAvatarBase) || currentAvatarBase.includes(url));
                const opt = document.createElement('div');
                opt.className = 'avatar-option' + (isSelected ? ' selected' : '');
                opt.setAttribute('data-avatar', url);
                opt.setAttribute('data-avatar-url', url);
                opt.setAttribute('data-custom', 'true');
                opt.onclick = function() { selectAvatar(this); };
                opt.innerHTML = `<img src="${url}?v=${Date.now()}" alt="Custom Avatar" style="border-radius:8px;">`;
                track.insertBefore(opt, track.firstChild);
            });

            // Deselect all presets
            track.querySelectorAll('.avatar-option:not([data-custom])').forEach(el => el.classList.remove('selected'));
        }

        // localStorage avatar gallery helpers
        function saveAvatarGallery(userId, urls) {
            try {
                localStorage.setItem(`subsoccer_avatar_gallery_${userId}`, JSON.stringify(urls));
            } catch(e) {}
        }
        function loadAvatarGallery(userId) {
            try {
                return JSON.parse(localStorage.getItem(`subsoccer_avatar_gallery_${userId}`)) || [];
            } catch(e) { return []; }
        }
        function addToAvatarGallery(userId, newUrl) {
            const gallery = loadAvatarGallery(userId);
            const cleanUrl = newUrl.split('?')[0];
            if (!gallery.some(u => u.includes(cleanUrl) || cleanUrl.includes(u))) {
                gallery.unshift(cleanUrl);
                saveAvatarGallery(userId, gallery);
            }
        }

        function injectSingleCustomAvatar(avatarUrl, track) {
            if (!avatarUrl || !track) return;
            const existing = track.querySelector('.avatar-option[data-custom="true"]');
            if (existing) return; // Already have one

            const opt = document.createElement('div');
            opt.className = 'avatar-option selected';
            opt.setAttribute('data-avatar', avatarUrl);
            opt.setAttribute('data-avatar-url', avatarUrl.split('?')[0]);
            opt.setAttribute('data-custom', 'true');
            opt.onclick = function() { selectAvatar(this); };
            opt.innerHTML = `<img src="${avatarUrl}" alt="My Avatar" style="border-radius:8px;">`;
            track.insertBefore(opt, track.firstChild);

            // Deselect presets
            track.querySelectorAll('.avatar-option:not([data-custom])').forEach(el => el.classList.remove('selected'));
        }

        // Avatar selection
        function selectAvatar(element) {
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            const newSrc = element.getAttribute('data-avatar');
            const isCustom = element.getAttribute('data-custom') === 'true';
            document.getElementById('selected-avatar-url').value = newSrc;
            document.getElementById('selected-avatar-b64').value = '';

            const photo = document.getElementById('pc-card-photo');
            const icon = document.getElementById('pc-card-icon');
            icon.style.display = 'none';
            photo.style.display = 'block';

            if (newSrc === 'ai-custom') {
                // Newly generated AI avatar (not yet saved)
                const img = element.querySelector('img');
                if (img) photo.src = img.src;
            } else if (isCustom || newSrc.startsWith('http')) {
                // Custom avatar from Storage history — use full URL
                photo.src = newSrc;
            } else {
                // Preset avatar
                photo.src = newSrc;
            }
        }

        function removeAvatar(e) {
            if (e) e.preventDefault();
            if (!confirm('Remove your avatar?')) return;
            
            // Reset card to default silhouette
            const photo = document.getElementById('pc-card-photo');
            const icon = document.getElementById('pc-card-icon');
            photo.style.display = 'none';
            photo.src = '';
            icon.style.display = 'block';
            
            // Deselect all carousel items
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
            
            // Remove ALL injected custom avatars from carousel
            document.querySelectorAll('.avatar-option[data-custom="true"]').forEach(el => el.remove());
            
            // Set hidden fields for save
            document.getElementById('selected-avatar-url').value = '__remove__';
            document.getElementById('selected-avatar-b64').value = '';
            
            // Hide remove button
            document.getElementById('remove-avatar-wrap').style.display = 'none';
            
            updateCarouselButtons();
        }

        // Sync name live
        document.getElementById('pc-edit-name').addEventListener('input', function(e) {
            const val = e.target.value.trim().toUpperCase() || 'PLAYER';
            document.getElementById('pc-card-name').innerText = val;
        });

        // Load countries
        async function loadCountries() {
            try {
                const sb = getSb();
                const { data } = await sb.from('countries').select('name, code').order('name');
                const sel = document.getElementById('pc-edit-country');
                if (data) {
                    data.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.code.toLowerCase();
                        opt.innerText = c.name;
                        sel.appendChild(opt);
                    });
                }
            } catch(e) { console.log('Countries:', e.message); }
        }

        let _aiSelfieB64 = null;

        function handleSelfieSelect(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const lbl = document.getElementById('ai-selfie-label');
                const btn = document.getElementById('ai-upload-label');
                
                lbl.innerText = 'SELFIE READY';
                btn.classList.add('ready');

                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_DIM = 512;

                        if (width > height) {
                            if (width > MAX_DIM) {
                                height *= MAX_DIM / width;
                                width = MAX_DIM;
                            }
                        } else {
                            if (height > MAX_DIM) {
                                width *= MAX_DIM / height;
                                height = MAX_DIM;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        _aiSelfieB64 = dataUrl.split(',')[1];
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        async function generateAIAvatar(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-generate-ai');
            const msg = document.getElementById('pc-ai-msg');
            
            if (!_aiSelfieB64) {
                msg.style.color = '#E30613';
                msg.innerText = 'TAKE A SELFIE FIRST!';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> GENERATING...';
            msg.innerText = '';

            // Show overlay with progress
            const overlay = document.getElementById('ai-gen-overlay');
            const statusEl = document.getElementById('ai-gen-status');
            const progressBar = document.getElementById('ai-gen-progress');
            const timerEl = document.getElementById('ai-gen-timer');
            overlay.classList.add('active');
            progressBar.style.width = '0%';

            const stages = [
                { at: 0, text: 'Analyzing your photo...', pct: 5 },
                { at: 3, text: 'Detecting facial features...', pct: 15 },
                { at: 7, text: 'Applying street art style...', pct: 25 },
                { at: 12, text: 'Rendering jersey & outfit...', pct: 35 },
                { at: 18, text: 'Building stadium background...', pct: 50 },
                { at: 25, text: 'Adding lighting & details...', pct: 65 },
                { at: 35, text: 'Polishing final render...', pct: 78 },
                { at: 50, text: 'Almost there...', pct: 88 },
                { at: 70, text: 'Finalizing your avatar...', pct: 94 },
            ];
            let elapsed = 0;
            const timerInterval = setInterval(() => {
                elapsed++;
                timerEl.innerText = elapsed + 's';
                const stage = [...stages].reverse().find(s => elapsed >= s.at);
                if (stage) {
                    statusEl.innerText = stage.text;
                    progressBar.style.width = stage.pct + '%';
                }
            }, 1000);

            try {
                const clientTimeout = new AbortController();
                const clientTimer = setTimeout(() => clientTimeout.abort(), 130000); // 130s
                
                const res = await fetch('/.netlify/functions/generate-avatar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_b64: _aiSelfieB64 }),
                    signal: clientTimeout.signal
                });
                
                clearTimeout(clientTimer);
                
                let data;
                try {
                    data = await res.json();
                } catch (parseErr) {
                    throw new Error('Generation timed out. Please try again.');
                }
                if (!res.ok) throw new Error(data.error || 'Failed to generate');
                
                const b64Url = 'data:image/png;base64,' + data.image_b64;
                const track = document.getElementById('avatar-selection');
                const newOpt = document.createElement('div');
                newOpt.className = 'avatar-option selected';
                newOpt.innerHTML = `<img src="${b64Url}" alt="Custom AI">`;
                newOpt.setAttribute('data-avatar', 'ai-custom');
                newOpt.onclick = function() { selectAvatar(this); document.getElementById('selected-avatar-b64').value = data.image_b64; };
                
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                track.prepend(newOpt);

                _carouselIndex = 0;
                track.style.transform = 'translateX(0)';
                document.getElementById('avatar-prev').disabled = true;
                const total = track.querySelectorAll('.avatar-option').length;
                document.getElementById('avatar-next').disabled = total <= 3;
                
                document.getElementById('selected-avatar-url').value = 'ai-custom';
                document.getElementById('selected-avatar-b64').value = data.image_b64;
                
                // Update live preview
                const photo = document.getElementById('pc-card-photo');
                document.getElementById('pc-card-icon').style.display = 'none';
                photo.src = b64Url;
                photo.style.display = 'block';

                msg.style.color = '#c41e2a';
                msg.innerText = 'AI AVATAR CREATED! REMEMBER TO SAVE.';
            } catch (err) {
                msg.style.color = '#E30613';
                if (err.message === 'POLICY_VIOLATION') {
                    msg.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> IMAGE REJECTED: SAFETY POLICY VIOLATION';
                } else {
                    msg.innerText = err.message;
                }
            } finally {
                clearInterval(timerInterval);
                overlay.classList.remove('active');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-bolt"></i> GENERATE AVATAR';
            }
        }

        // Save profile
        async function saveProfile() {
            const btn = document.getElementById('pc-save-btn');
            const msg = document.getElementById('pc-edit-msg');
            btn.disabled = true;
            btn.innerText = 'SAVING...';
            msg.innerText = '';

            try {
                // Get user ID from _currentPlayer (set by loadProfile)
                let userId = _currentPlayer?.id;
                console.log('Save: _currentPlayer =', _currentPlayer ? JSON.stringify({id: _currentPlayer.id, username: _currentPlayer.username}) : 'null');
                
                // UUID format check
                const isUUID = (s) => /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);
                
                // Fallback: localStorage
                if (!userId || !isUUID(userId)) {
                    try {
                        const cached = localStorage.getItem('subsoccer-user');
                        const cachedId = cached ? JSON.parse(cached)?.id : null;
                        if (cachedId && isUUID(cachedId)) userId = cachedId;
                    } catch(e) {}
                }

                // Fallback: username lookup via direct REST (always if userId is not a valid UUID)
                if ((!userId || !isUUID(userId)) && _currentPlayer?.username) {
                    console.log('Looking up UUID for username:', _currentPlayer.username);
                    try {
                        const results = await directQuery('GET', 'players', {
                            'username': `ilike.${_currentPlayer.username}`,
                            'select': 'id'
                        });
                        if (results && results[0]?.id) {
                            userId = results[0].id;
                            _currentPlayer.id = userId;
                            console.log('Found UUID:', userId);
                        }
                    } catch(e) {
                        console.warn('Username lookup failed:', e.message);
                    }
                }

                console.log('Save: using userId =', userId, isUUID(userId) ? '(valid UUID)' : '(NOT a UUID!)');

                if (!userId || userId === 'guest' || userId === 'spectator') {
                    msg.style.color = '#E30613';
                    msg.innerText = 'NOT LOGGED IN — PLEASE LOG IN AGAIN';
                    btn.disabled = false;
                    btn.innerText = 'SAVE AVATAR';
                    return;
                }

                const updates = {};
                const nameInput = document.getElementById('pc-edit-name');
                if (nameInput) {
                    const newName = nameInput.value.trim().toUpperCase();
                    if (newName && newName !== _currentPlayer?.username) {
                        updates.username = newName;
                    }
                }

                const countrySelect = document.getElementById('pc-edit-country');
                if (countrySelect && countrySelect.value) {
                    updates.country = countrySelect.value;
                }

                const avatarUrl = document.getElementById('selected-avatar-url').value;
                const avatarB64 = document.getElementById('selected-avatar-b64').value;

                if (avatarB64) {
                    // AI-generated avatar: upload via Supabase JS client (handles auth automatically)
                    const path = `avatars/${userId}_ai_${Date.now()}.png`;
                    const byteCharacters = atob(avatarB64);
                    const byteNumbers = new Array(byteCharacters.length);
                    for (let i = 0; i < byteCharacters.length; i++) {
                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                    }
                    const byteArray = new Uint8Array(byteNumbers);
                    const blob = new Blob([byteArray], {type: 'image/png'});

                    const sb = getSb();
                    const { error: uploadErr } = await sb.storage.from('event-images').upload(path, blob, {
                        cacheControl: '3600',
                        upsert: true
                    });
                    if (uploadErr) throw new Error('Upload failed: ' + uploadErr.message);
                    
                    const { data: urlData } = sb.storage.from('event-images').getPublicUrl(path);
                    updates.avatar_url = urlData.publicUrl + '?v=' + Date.now();
                } else if (avatarUrl === '__remove__') {
                    // User clicked "Remove avatar"
                    updates.avatar_url = null;
                } else if (avatarUrl && avatarUrl !== 'ai-custom') {
                    // Check if it's actually different from current (strip query params for comparison)
                    const currentBase = (_currentPlayer?.avatar_url || '').split('?')[0];
                    const newBase = avatarUrl.split('?')[0];
                    if (newBase !== currentBase) {
                        if (avatarUrl.startsWith('avatar-')) {
                            updates.avatar_url = window.location.origin + '/' + avatarUrl;
                        } else {
                            updates.avatar_url = avatarUrl;
                        }
                    }
                }

                if (Object.keys(updates).length === 0) {
                    msg.style.color = '#888';
                    msg.innerText = 'NO CHANGES DETECTED';
                    btn.disabled = false;
                    btn.innerText = 'SAVE AVATAR';
                    return;
                }

                console.log('Saving via Supabase client:', JSON.stringify(updates));
                
                // Use Supabase JS client for DB update (handles auth automatically)
                const sb = getSb();
                const { data: result, error: dbErr } = await sb.from('players').update(updates).eq('id', userId).select();
                
                if (dbErr) throw new Error('Save failed: ' + dbErr.message);
                if (!result || result.length === 0) {
                    throw new Error('Update blocked — session may have expired. Please log in again.');
                }
                
                console.log('✅ DB update confirmed:', JSON.stringify(result));

                // Update localStorage & _currentPlayer with DB-confirmed data
                const confirmed = Array.isArray(result) ? result[0] : result;
                Object.assign(_currentPlayer, confirmed);
                localStorage.setItem('subsoccer-user', JSON.stringify(_currentPlayer));

                // Add to avatar gallery localStorage
                if (updates.avatar_url && updates.avatar_url !== null) {
                    addToAvatarGallery(userId, updates.avatar_url);
                }

                msg.style.color = '#4CAF50';
                msg.innerText = '✓ SAVED SUCCESSFULLY';
                btn.disabled = false;
                btn.innerText = 'SAVE AVATAR';

                setTimeout(() => location.reload(), 800);
            } catch(e) {
                console.error('Save error:', e);
                msg.style.color = '#E30613';
                msg.innerText = e.message || 'SAVE FAILED';
                btn.disabled = false;
                btn.innerText = 'SAVE AVATAR';
            }
        }

        // Logout
        async function logoutPlayer() {
            if (!confirm('Log out?')) return;
            try {
                const sb = getSb();
                await sb.auth.signOut();
            } catch(e) {}
            Object.keys(localStorage).forEach(key => {
                if (key.startsWith('sb-') || key.includes('supabase') || key === 'subsoccer-user') {
                    localStorage.removeItem(key);
                }
            });
            window.location.href = 'index.html';
        }

        // Load profile
        (async function loadProfile() {
            // 1. Try localStorage first (instant, no network)
            const cached = localStorage.getItem('subsoccer-user');
            let cachedUser = null;
            if (cached) {
                try {
                    cachedUser = JSON.parse(cached);
                    applyPlayerData(cachedUser);
                    loadCountries();
                    console.log('✅ Profile loaded from localStorage:', cachedUser.username);
                } catch(e) {}
            }
            
            // 2. Refresh from DB via direct REST
            let userId = cachedUser?.id;
            
            // 2a. If no ID but we have username, look up by username first
            if (!userId && cachedUser?.username) {
                try {
                    console.log('No cached ID, looking up by username:', cachedUser.username);
                    const lookup = await directQuery('GET', 'players', {
                        'username': `ilike.${cachedUser.username}`,
                        'select': '*'
                    });
                    if (lookup && lookup[0]) {
                        userId = lookup[0].id;
                        applyPlayerData(lookup[0]);
                        localStorage.setItem('subsoccer-user', JSON.stringify(lookup[0]));
                        console.log('✅ Profile refreshed from DB (by username):', lookup[0].username);
                        return;
                    }
                } catch(e) {
                    console.warn('Username lookup failed:', e.message);
                }
            }
            
            // 2b. Refresh by ID
            if (userId) {
                try {
                    const players = await directQuery('GET', 'players', {
                        'id': `eq.${userId}`,
                        'select': '*'
                    });
                    if (players && players[0]) {
                        applyPlayerData(players[0]);
                        localStorage.setItem('subsoccer-user', JSON.stringify(players[0]));
                        console.log('✅ Profile refreshed from DB:', players[0].username);
                    }
                } catch(e) {
                    console.warn('DB refresh failed (using cache):', e.message);
                }
                return;
            }

            // 3. If no cached ID, try URL params
            const params = new URLSearchParams(window.location.search);
            const uid = params.get('uid');
            if (uid) {
                try {
                    const players = await directQuery('GET', 'players', {
                        'id': `eq.${uid}`,
                        'select': '*'
                    });
                    if (players && players[0]) {
                        applyPlayerData(players[0]);
                        localStorage.setItem('subsoccer-user', JSON.stringify(players[0]));
                        loadCountries();
                        console.log('✅ Profile loaded via URL uid:', players[0].username);
                        return;
                    }
                } catch(e) {
                    console.warn('URL uid load failed:', e.message);
                }
            }
            
            // 4. Last resort: try Supabase session (may hang, but cache already loaded)
            if (!cachedUser) {
                try {
                    const sb = getSb();
                    const sessionResult = await Promise.race([
                        sb.auth.getSession(),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('SESSION_TIMEOUT')), 5000))
                    ]);
                    const session = sessionResult?.data?.session;
                    if (session?.user?.id) {
                        const players = await directQuery('GET', 'players', {
                            'id': `eq.${session.user.id}`,
                            'select': '*'
                        });
                        if (players && players[0]) {
                            applyPlayerData(players[0]);
                            localStorage.setItem('subsoccer-user', JSON.stringify(players[0]));
                            loadCountries();
                            console.log('✅ Profile loaded via session:', players[0].username);
                            return;
                        }
                    }
                } catch(e) {
                    console.warn('Session load failed:', e.message);
                }
                console.warn('⚠️ No profile data available — showing default card');
            }
        })();

        async function exportPrintableCard() {
            try {
                const btn = document.getElementById('btn-download-card');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="color:#000;"></i> GENERATING TOPPS CARD...';

                // Ensure perfect 2.5x3.5" (750x1050 px @ 300DPI) format
                const cardFront = document.querySelector('.pro-card-front');
                const scaleTarget = 750 / 280; // Scale from 280px CSS width to 750px high-res width
                
                const canvas = await html2canvas(cardFront, {
                    scale: scaleTarget,
                    useCORS: true,
                    backgroundColor: '#0a0a0a',
                    logging: false
                });

                const dataUrl = canvas.toDataURL('image/png', 1.0);
                
                // Prompt download
                const link = document.createElement('a');
                link.download = 'subsoccer-pro-card.png';
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                btn.innerHTML = originalHtml;
            } catch (error) {
                console.error("Error generating card:", error);
                alert("Generation failed. Please try on a desktop browser.");
            }
        }

        // Initialize Dark Mode based on storage/url
        (function() {
            const params = new URLSearchParams(window.location.search);
            const fromUrl = params.get('dark') === '1';
            const fromStorage = localStorage.getItem('subsoccer-dark-mode') === '1';
            if (fromUrl || fromStorage) {
                document.body.classList.add('dark-mode');
                if (fromUrl) localStorage.setItem('subsoccer-dark-mode', '1');
            }
        })();
    </script>
