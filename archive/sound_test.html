<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subsoccer Sound Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: #ffd700;
            /* Subsoccer Gold */
            margin-bottom: 5px;
        }

        p {
            color: #aaa;
            margin-bottom: 40px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        button {
            background: #1a1a1a;
            border: 2px solid #333;
            color: white;
            padding: 25px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.96);
            background: #2a2a2a;
        }

        button.playing {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .freq-label {
            font-size: 0.9rem;
            color: #ffd700;
            font-weight: normal;
        }

        .hint {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
            font-style: italic;
        }
    </style>
</head>

<body>

    <h1>SOITTIMEN ÄÄNITESTI</h1>
    <p>Paina nappeja soittaaksesi maalin äänisignaaleja anturille.</p>

    <div class="btn-container">
        <button id="btn-goal-1" onclick="playBeep(2000, this)">
            MAALI 1 (Pelaaja 1)
            <span class="freq-label">2000 Hz taajuus</span>
        </button>

        <button id="btn-goal-2" onclick="playBeep(3500, this)">
            MAALI 2 (Pelaaja 2)
            <span class="freq-label">3500 Hz taajuus</span>
        </button>
    </div>

    <div class="hint">Nosta puhelimen äänenvoimakkuus maksimiin ja aseta se anturin lähelle.</div>

    <script>
        // Web Audio API Context
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(frequency, buttonElement) {
            initAudio();

            // Visuaalinen palaute
            buttonElement.classList.add('playing');
            setTimeout(() => buttonElement.classList.remove('playing'), 200);

            // Audio Oskillaattori
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine'; // Puhdas siniaalto kuten alkuperäisessäkin
            oscillator.frequency.value = frequency;

            // Attack ja Release, jottei ääni "napsahda" alussa ja lopussa
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.05);

            // Määritä kesto 0.1 sekuntia jotta se rekisteröityisi anturiin, mutta ei jäisi piippaamaan liian pitkään
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime + 0.1);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.15);
        }
    </script>
</body>

</html>
