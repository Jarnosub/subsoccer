<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Subsoccer - Flick Greybox</title>

    <!-- iOS Native App / PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Subsoccer">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Russo+One&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --sub-red: #E30613;
            --sub-black: #0A0A0A;
            --sub-neon: #00FFCC;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--sub-black);
            color: #fff;
            font-family: 'Russo One', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .mini-player-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #C5A059; /* Subsoccer Gold */
            border-left: 4px solid #C5A059;
            padding: 8px 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Russo One', sans-serif;
            transform: scale(0.9);
            transform-origin: top left;
        }

        .mini-player-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: #222;
        }

        .mini-player-name {
            font-size: 1rem;
            color: #fff;
            line-height: 1.1;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .mini-player-elo {
            font-family: 'Open Sans', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            color: #C5A059;
            letter-spacing: 1px;
        }

        /* Physics Canvas overlay */
        #physics-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: auto; /* Allow touch and flick interactions */
            touch-action: none; /* Prevent browser scrolling while swiping */
            z-index: 50; /* Above camera, below UI */
        }

        /* Start Button */
        .start-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: linear-gradient(135deg, var(--sub-red) 0%, #a00 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 8px 30px rgba(227, 6, 19, 0.6);
        }

        /* Displays (HUD Style mapped to sides) */
        .display-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .stat-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.7rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 1.8rem;
            line-height: 1;
            font-family: 'Russo One', sans-serif;
            color: #fff;
        }

    </style>
</head>

<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> LOBBY</a>
        
        <!-- Mini Player Card for social media recordings -->
        <div class="mini-player-card" id="mini-player-card">
            <img src="placeholder-silhouette-5-wide.png" class="mini-player-avatar" id="mini-player-avatar" alt="Avatar">
            <div>
                <div class="mini-player-name" id="mini-player-name">GUEST</div>
                <div class="mini-player-elo" id="mini-player-elo">1300 ELO</div>
            </div>
        </div>
    </div>

    <style>
        .hud-container {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .hud-item {
            text-align: center;
            width: 100%;
        }

        .border-bottom {
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 15px;
        }

        .stat-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.7rem;
            color: #ddd;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 2rem;
            line-height: 1;
            font-family: 'Russo One', sans-serif;
            color: #fff;
        }
    </style>
    <div class="display-panel">
        <div class="hud-container">
            <div class="hud-item border-bottom">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time-value">45</div>
            </div>
            <div class="hud-item border-bottom">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score-value">0</div>
            </div>
            <div class="hud-item">
                <div class="stat-label">SPEED</div>
                <div class="stat-value" id="speed-value" style="color: #00FFCC; text-shadow: 0 0 10px rgba(0,255,204,0.5);">0<span style="font-size:1rem; margin-left:2px; color:#fff; text-shadow: none;">KM/H</span></div>
            </div>
        </div>
    </div>

    <!-- The actual flick physics canvas -->
    <canvas id="physics-canvas"></canvas>

    <div id="start-menu" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 15px; z-index: 200;">
        <button id="btn-start-touch" class="start-btn" style="position: relative; left: 0; top: 0; transform: none;">PLAY ON TOUCHSCREEN</button>
        <button id="btn-start-trackman" class="start-btn" style="position: relative; left: 0; top: 0; transform: none; background: transparent; border: 2px solid #E30613; color: #E30613; padding: 12px 30px; font-size: 1rem;">CONNECT THE TRACKMAN</button>
    </div>    <!-- Game dependencies -->
    <script src="sound-effects.js"></script>
    <script src="vision-engine.js"></script>
    <script src="flick-game.js"></script>
    <script>
        // Populate Mini Player Card
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const lsData = localStorage.getItem('subsoccer-user');
                if (lsData) {
                    const user = JSON.parse(lsData);
                    document.getElementById('mini-player-name').textContent = user.username ? user.username.toUpperCase() : 'PLAYER';
                    document.getElementById('mini-player-elo').textContent = (user.elo || 1300) + ' ELO';
                    
                    if (user.avatar_url) {
                        document.getElementById('mini-player-avatar').src = user.avatar_url;
                    }
                }
            } catch (e) {
                console.warn('Could not load user data for player card', e);
            }
        });
    </script>
</body>

</html>
