<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Subsoccer - Flick Greybox</title>

    <!-- App / PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Subsoccer">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Russo+One&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'SubsoccerLogo';
            src: url('fonts/Subsoccer-2-Regular.woff2') format('woff2');
        }

        :root {
            --sub-red: #E30613;
            --sub-black: #0A0A0A;
            --sub-neon: #00FFCC;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--sub-black);
            color: #fff;
            font-family: 'Russo One', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        .top-bar {
            position: absolute;
            top: calc(env(safe-area-inset-top, 0px) + 20px);
            left: calc(env(safe-area-inset-left, 0px) + 20px);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            z-index: 100;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .mini-player-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #C5A059; /* Subsoccer Gold */
            border-left: 4px solid #C5A059;
            padding: 8px 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Russo One', sans-serif;
            transform: scale(0.9);
            transform-origin: top left;
        }

        .mini-player-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: #222;
        }

        .mini-player-name {
            font-size: 1rem;
            color: #fff;
            line-height: 1.1;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .mini-player-elo {
            font-family: 'Open Sans', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            color: #C5A059;
            letter-spacing: 1px;
        }

        /* Physics Canvas overlay */
        #physics-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: auto; /* Allow touch and flick interactions */
            touch-action: none; /* Prevent browser scrolling while swiping */
            z-index: 50; /* Above camera, below UI */
        }

        /* Start Button */
        .start-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: linear-gradient(135deg, var(--sub-red) 0%, #a00 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.85rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(227, 6, 19, 0.4);
            transition: transform 0.2s, background 0.2s;
        }

        /* Start Menu Container */
        #start-menu {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 200;
            width: 90%;
            max-width: 320px;
        }

        .start-menu-btn {
            position: relative;
            left: 0;
            top: 0;
            transform: none;
            width: 100%;
            font-family: 'Open Sans', sans-serif;
            letter-spacing: 2px;
            text-align: center;
        }

        #btn-start-trackman {
            background: linear-gradient(135deg, #FFD700 0%, #d4af37 100%);
            color: #000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* Displays (HUD Style mapped to sides) */
        .display-panel {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 20px);
            right: calc(env(safe-area-inset-right, 0px) + 20px);
            z-index: 100;
        }

        .stat-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.7rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 1.8rem;
            line-height: 1;
            font-family: 'Russo One', sans-serif;
            color: #fff;
        }

    </style>
</head>

<body>

    <div class="top-bar">
        <div style="display: flex; gap: 10px;">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> LOBBY</a>
            <button id="btn-sound-toggle" class="back-btn" style="border: none; cursor: pointer; background: rgba(0,0,0,0.5); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; padding: 0;" title="Toggle Sound"><i class="fa-solid fa-volume-xmark"></i></button>
        </div>
        
        <!-- Mini Player Card for social media recordings -->
        <div class="mini-player-card" id="mini-player-card">
            <img src="placeholder-silhouette-5-wide.png" class="mini-player-avatar" id="mini-player-avatar" alt="Avatar">
            <div>
                <div class="mini-player-name" id="mini-player-name">GUEST</div>
                <div class="mini-player-elo" id="mini-player-elo">1300 ELO</div>
            </div>
        </div>
    </div>

    <style>
        .hud-container {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .hud-item {
            text-align: center;
            width: 100%;
        }

        .border-bottom {
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 15px;
        }

        .stat-label {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.7rem;
            color: #ddd;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 2rem;
            line-height: 1;
            font-family: 'Russo One', sans-serif;
            color: #fff;
        }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) and (orientation: portrait) {
            #start-menu {
                flex-direction: row;
                max-width: 500px;
                width: 95%;
                top: 65%; /* Center of the grass */
                transform: translate(-50%, -50%) scale(0.9);
                gap: 10px;
            }
            .start-menu-btn {
                padding: 12px 10px;
                font-size: 0.8rem;
            }
            .display-panel {
                top: auto;
                bottom: calc(env(safe-area-inset-bottom, 0px) + 30px); /* Leave safe space */
                right: 50%;
                transform: translateX(50%);
                width: 90%;
                max-width: 400px;
            }
            .hud-container {
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
                gap: 5px;
                padding: 10px 5px;
            }
            .hud-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .border-bottom {
                border-bottom: none;
                border-right: 1px solid rgba(255, 255, 255, 0.2);
                padding-bottom: 0;
            }
            .stat-value {
                font-size: 1.4rem;
            }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            .display-panel {
                top: calc(env(safe-area-inset-top, 0px) + 10px);
                right: calc(env(safe-area-inset-right, 0px) + 10px);
            }
            .hud-container {
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 8px;
                padding: 10px 15px;
                border-radius: 12px;
                transform: scale(0.85);
                transform-origin: top right;
            }
            .hud-item {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            .border-bottom {
                border-bottom: 1px solid rgba(255, 255, 255, 0.2);
                border-right: none;
                padding-bottom: 8px;
                padding-right: 0;
            }
            .stat-value {
                font-size: 1.3rem;
            }
            .stat-label {
                font-size: 0.6rem;
                margin-bottom: 0;
            }
            .top-bar {
                top: calc(env(safe-area-inset-top, 0px) + 10px);
                left: calc(env(safe-area-inset-left, 0px) + 10px);
                transform: scale(0.85);
                transform-origin: top left;
            }
            #start-menu {
                flex-direction: row;
                max-width: 600px;
                width: 90%;
                top: auto;
                bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
                transform: translate(-50%, 0) scale(0.85);
            }
        }
        
        #online-players-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
            pointer-events: none;
            align-items: flex-end;
        }
        
        .online-player-badge {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.4);
            color: #00FFCC;
            padding: 4px 8px;
            font-size: 0.65rem;
            font-family: 'Open Sans', sans-serif;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            animation: slideIn 0.3s ease-out;
            transition: opacity 0.5s;
        }
        
        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
    <div class="display-panel">
        <div class="hud-container">
            <div class="hud-item border-bottom">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time-value">45</div>
            </div>
            <div class="hud-item border-bottom">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score-value">0</div>
            </div>
            <div id="opp-score-box" class="hud-item border-bottom" style="transition: background-color 0.3s;">
                <div class="stat-label" style="color: #E30613;">OPPONENT</div>
                <div class="stat-value" id="opp-score-value">0</div>
            </div>
            <div class="hud-item">
                <div class="stat-label">SPEED</div>
                <div class="stat-value" id="speed-value" style="color: #00FFCC; text-shadow: 0 0 10px rgba(0,255,204,0.5);">0<span style="font-size:1rem; margin-left:2px; color:#fff; text-shadow: none;">KM/H</span></div>
            </div>
        </div>
        <div id="online-players-list" style="margin-top: 10px;"></div>
    </div>

    <!-- The actual flick physics canvas -->
    <canvas id="physics-canvas"></canvas>

    <div id="start-menu">
        <button id="btn-start-touch" class="start-btn start-menu-btn">PLAY AGAIN (TOUCH)</button>
        <button id="btn-start-trackman" class="start-btn start-menu-btn">CONNECT TO SUBSOCCER</button>
    </div>
    
    <div id="challenge-popup" style="display: none; position: absolute; top: 15%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 2px solid #00FFCC; padding: 25px; text-align: center; z-index: 300; border-radius: 12px; width: 85%; max-width: 320px; box-shadow: 0 0 25px rgba(0,255,204,0.3); flex-direction: column; align-items: center; gap: 10px; backdrop-filter: blur(10px);">
        <i class="fa-solid fa-gamepad" style="font-size: 2.5rem; color: #00FFCC; text-shadow: 0 0 10px #00FFCC;"></i>
        <h3 style="color: #fff; font-family: 'Open Sans', sans-serif; font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; margin-top: 10px;">CHALLENGER WAITING</h3>
        <p style="color: #aaa; font-family: 'Open Sans', sans-serif; font-size: 0.85rem;">Another player wants to play.</p>
        <button id="btn-accept-challenge" class="start-btn" style="position: relative; left: 0; bottom: 0; transform: none; width: 100%; border-radius: 8px; font-size: 0.9rem; margin-top: 15px; background: linear-gradient(135deg, #00FFCC 0%, #00997A 100%); box-shadow: 0 4px 15px rgba(0,255,204,0.4); border: none; color: #000; font-family: 'Open Sans', sans-serif; font-weight: 800;">ACCEPT BATTLE</button>
        <button id="btn-decline-challenge" style="background: transparent; border: none; color: #666; font-family: 'Open Sans', sans-serif; font-size: 0.8rem; margin-top: 5px; cursor: pointer; text-transform: uppercase;">DECLINE</button>
    </div>
    <div id="waiting-popup" style="display: none; position: absolute; top: 15%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 2px solid #E30613; padding: 25px; text-align: center; z-index: 300; border-radius: 12px; width: 85%; max-width: 320px; box-shadow: 0 0 25px rgba(227,6,19,0.3); flex-direction: column; align-items: center; gap: 10px; backdrop-filter: blur(10px);">
        <i class="fa-solid fa-hourglass-half" style="font-size: 2.5rem; color: #E30613; text-shadow: 0 0 10px #E30613; animation: pulse 1.5s infinite;"></i>
        <h3 style="color: #fff; font-family: 'Open Sans', sans-serif; font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; margin-top: 10px;">WAITING FOR OPPONENT</h3>
        <p style="color: #aaa; font-family: 'Open Sans', sans-serif; font-size: 0.85rem;">Waiting for them to accept...</p>
        <button id="btn-practice-mode" class="start-btn" style="position: relative; left: 0; bottom: 0; transform: none; width: 100%; border-radius: 8px; font-size: 0.9rem; margin-top: 15px; background: linear-gradient(135deg, #FFD700 0%, #E6A800 100%); box-shadow: 0 4px 15px rgba(255,215,0,0.4); border: none; color: #000; font-family: 'Open Sans', sans-serif; font-weight: 800;">PLAY PRACTICE</button>
        <button id="btn-cancel-waiting" style="background: transparent; border: none; color: #666; font-family: 'Open Sans', sans-serif; font-size: 0.8rem; margin-top: 5px; cursor: pointer; text-transform: uppercase;">CANCEL</button>
    </div>

    <div id="countdown-popup" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 400; text-align: center; flex-direction: column; align-items: center; gap: 10px; pointer-events: none;">
        <h2 style="color: #fff; font-family: 'SubsoccerLogo', sans-serif; font-size: 2.5rem; margin: 0; letter-spacing: 4px;">GET READY</h2>
        <div id="countdown-value" style="color: #fff; font-family: 'SubsoccerLogo', sans-serif; font-size: 6rem; line-height: 1;">3</div>
    </div>
    <!-- Game dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="sound-effects.js"></script>
    <script src="vision-engine.js"></script>
    <script src="flick-network.js"></script>
    <script src="flick-game.js"></script>
    <script>
        // Populate Mini Player Card
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const lsData = localStorage.getItem('subsoccer-user');
                if (lsData) {
                    const user = JSON.parse(lsData);
                    document.getElementById('mini-player-name').textContent = user.username ? user.username.toUpperCase() : 'PLAYER';
                    document.getElementById('mini-player-elo').textContent = (user.elo || 1300) + ' ELO';
                    
                    if (user.avatar_url) {
                        document.getElementById('mini-player-avatar').src = user.avatar_url;
                    }
                }
            } catch (e) {
                console.warn('Could not load user data for player card', e);
            }
        });
    </script>
</body>

</html>
