<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subsoccer Prototyper (TV & Remote)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #111;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #left-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #333;
        }
        #right-pane {
            width: 420px; /* Typical mobile width */
            display: flex;
            flex-direction: column;
            background: #000;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .header {
            background: #222;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .header button:hover {
            background: #444;
        }
        iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="left-pane">
        <div class="header">
            <span>📺 TV SCREEN (tv.html)</span>
            <button onclick="document.getElementById('tv-frame').contentWindow.location.reload()">RELOAD TV</button>
        </div>
        <iframe id="tv-frame" src=""></iframe>
    </div>
    <div id="right-pane">
        <div class="header">
            <span>📱 REMOTE (lounge-remote.html)</span>
            <button onclick="document.getElementById('remote-frame').contentWindow.location.reload()">RELOAD REMOTE</button>
        </div>
        <iframe id="remote-frame" src=""></iframe>
    </div>
    
    <script>
        const query = window.location.search;
        document.getElementById('tv-frame').src = `tv.html${query}`;
        document.getElementById('remote-frame').src = `lounge-remote.html${query}`;
    </script>
</body>
</html>
