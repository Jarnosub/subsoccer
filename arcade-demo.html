<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subsoccer Arcade - Interactive Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; height: 100vh; overflow: hidden; display: flex; font-family: sans-serif; }
        
        .tv-container {
            flex: 1;
            min-width: 0; /* Estää containeria puskemasta ulos puhelimen tieltä */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            position: relative;
            padding: 2rem;
            box-sizing: border-box;
        }
        
        #tv-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tv-scale-box {
            /* Pakottaa iframen AINA 1920x1080 resoluutioon jotta Kioskin fontit säilyvät oikein */
            width: 1920px;
            height: 1080px;
            position: absolute;
            transform-origin: center center;
            border: 24px solid #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 0 30px rgba(255,255,255,0.05);
            background: #000;
            overflow: hidden;
        }

        .tv-scale-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .phone-container {
            flex-shrink: 0; /* Estää puhelinta litistymästä! */
            width: 400px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            border-left: 1px solid #222;
            box-shadow: -15px 0 40px rgba(0,0,0,0.8);
            padding: 1rem;
            box-sizing: border-box;
        }

        .phone-frame {
            width: 360px;
            height: 780px;
            border: 14px solid #222;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,1);
            position: relative;
            background: #000;
            overflow: hidden;
        }

        /* Fake iPhone Notch */
        .phone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 28px;
            background: #222;
            border-bottom-left-radius: 14px;
            border-bottom-right-radius: 14px;
            z-index: 100;
        }

        .phone-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>

    <!-- LEFT: The 55" TV Kiosk Mockup -->
    <div class="tv-container">
        <div id="tv-wrapper">
            <div class="tv-scale-box" id="tv-scale-box">
                <iframe src="tv.html" title="Subsoccer Kiosk TV"></iframe>
            </div>
        </div>
    </div>

    <!-- RIGHT: The Mobile Phone Remote Mockup -->
    <div class="phone-container">
        <div class="phone-frame">
            <iframe src="lounge-remote.html" title="Subsoccer Mobile Remote"></iframe>
        </div>
    </div>

    <!-- AUTO-SCALER SCRIPT FOR THE TV IFRAME -->
    <script>
        function resizeTv() {
            const wrapper = document.getElementById('tv-wrapper');
            const scaleBox = document.getElementById('tv-scale-box');
            
            // Available space in wrapper
            const W = wrapper.clientWidth;
            const H = wrapper.clientHeight;
            
            // Fixed iframe resolution
            const targetW = 1920 + 48; // borders
            const targetH = 1080 + 48;
            
            // Calculate scale to perfectly Fit within available space
            const scaleX = W / targetW;
            const scaleY = H / targetH;
            const scale = Math.min(scaleX, scaleY);
            
            scaleBox.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', resizeTv);
        // Pieni viive varmistaa tyylien latautumisen ensin
        setTimeout(resizeTv, 50);
    </script>
</body>
</html>
