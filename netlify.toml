[build]
  functions = "netlify/functions"

[functions]
  timeout = 26

[dev]
  functions = "netlify/functions"
  staticServerPort = 3999
  port = 8787

# White Label Brands: /brands/SLUG/ → single brands/index.html
# Assets (brand.json, images) pass through because they match real files
[[redirects]]
  from = "/brands/*/index.html"
  to = "/brands/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/brands/*/"
  to = "/brands/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/create-payment-intent"
  to = "/.netlify/functions/create-payment-intent"
  status = 200
  force = true

# Security headers applied to all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    X-XSS-Protection = "1; mode=block"

# Long-term cache for images (including WebP)
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS and JS — shorter cache (can change with versioning)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
