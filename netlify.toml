[build]
  functions = "netlify/functions"

[dev]
  functions = "netlify/functions"
  staticServerPort = 3999
  port = 8787

# White Label Brands: /brands/SLUG/ → single brands/index.html
# Assets (brand.json, images) pass through because they match real files
[[redirects]]
  from = "/brands/*/index.html"
  to = "/brands/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/brands/*/"
  to = "/brands/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/create-payment-intent"
  to = "/.netlify/functions/create-payment-intent"
  status = 200
  force = true

# Security headers applied to all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    X-XSS-Protection = "1; mode=block"
    # Security fix #14: Content Security Policy
    # 'unsafe-inline' required because app uses inline scripts/styles extensively
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://js.stripe.com https://js.sentry.io https://browser.sentry-cdn.com https://*.sentry-cdn.com https://upload.wikimedia.org https://html2canvas.hertzen.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: blob: https: http:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://nominatim.openstreetmap.org https://api.openai.com https://js.sentry.io https://*.sentry.io https://*.ingest.sentry.io https://api.stripe.com https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org; frame-src https://js.stripe.com; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self';"

# Long-term cache for images (including WebP)
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS and JS — short cache during development (5 min)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300"

# HTML — no cache (always fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
