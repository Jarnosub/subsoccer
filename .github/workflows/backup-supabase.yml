name: Nightly Supabase Data Backup

on:
  schedule:
    - cron: '0 2 * * *' # Aja joka yö klo 02:00 UTC (klo 05:00 Suomen aikaa)
  workflow_dispatch: # Mahdollistaa manuaalisen käynnistyksen GitHubin kautta

permissions:
  contents: read # Security: read-only, backups are NOT committed to the repo

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase Client
        run: npm install @supabase/supabase-js

      - name: Run backup script
        run: node scripts/backup-supabase.js

      # Security fix #17: Backups are generated but NOT pushed to the repo.
      # Database dumps should not be stored in version control.
      # Consider uploading to a secure storage (e.g. S3, Google Cloud Storage) instead.
      - name: Summary
        run: |
          echo "✅ Backup script completed successfully."
          echo "⚠️  Backups are NOT committed to the repo for security reasons."
          echo "💡 To persist backups, configure an external storage destination."
